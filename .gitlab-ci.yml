stages:
  - test
  - reproducibility
  - release

test:
  stage: test
  image: node:20-alpine
  rules:                                    # skip on the mirror-relock schedule (nothing to test there)
    - if: '$RELOCK_MIRROR == "true"'
      when: never
    - when: on_success
  script:
    - npm ci
    - npm run build
    - npm test
  artifacts:
    paths:
      - dist/index.html
      - dist/integrity.json
    expire_in: 1 day
    when: on_success

# End-to-end tests against the in-repo stateful mock S3. Split into the engine-agnostic
# node-integration layer and a cross-engine + mobile browser matrix. The Playwright image
# ships chromium+firefox+webkit with their deps, so all three run in CI (WebKit cannot run on
# a stock host — see GitLab #47). Chromium + Firefox are BLOCKING (#48 Part 2: green track
# record across all device profiles). WebKit runs as a separate advisory job: its three
# engine-specific emulation gaps are skipped in-suite with documented reasons (e2eTest skipOn,
# see engine-quirks.mjs); flip it to blocking once it has its own green track record.
# JUnit -> MR test summary; the browser jobs also upload on-failure screenshots + console
# logs (artifacts, when: always).
.e2e-base:
  stage: test
  image: mcr.microsoft.com/playwright:v1.60.0-jammy
  allow_failure: true
  interruptible: true
  rules:
    - if: '$RELOCK_MIRROR == "true"'
      when: never
    - when: on_success
  cache:
    key:
      files: [package-lock.json]
    paths: [node_modules/]
  variables:
    E2E_JUNIT: "1"
  before_script:
    - npm ci
  artifacts:
    when: always
    reports:
      junit: junit-e2e.xml
    expire_in: 1 week

e2e-node:
  extends: .e2e-base
  script:
    - npm run test:e2e node

.e2e-browser-base:
  extends: .e2e-base
  script:
    - npm run test:e2e browser
  artifacts:
    when: always
    reports:
      junit: junit-e2e.xml
    paths:
      - test/e2e/artifacts/
    expire_in: 1 week

e2e-browser:
  extends: .e2e-browser-base
  allow_failure: false
  parallel:
    matrix:
      - E2E_ENGINE: [chromium, firefox]
        E2E_DEVICE: ["", "Pixel 5", "iPhone 13"]

e2e-browser-webkit:
  extends: .e2e-browser-base
  parallel:
    matrix:
      - E2E_ENGINE: [webkit]
        E2E_DEVICE: ["", "Pixel 5", "iPhone 13"]

# Re-applies the GitHub mirror's `collaborators_only` interaction limit, which GitHub auto-expires
# after 6 months (there is no permanent setting on a public, non-archived repo). Runs ONLY from a
# dedicated Pipeline Schedule that sets RELOCK_MIRROR=true — never on normal pushes — using a masked,
# protected GH_MIRROR_TOKEN CI variable (a GitHub token with repo admin on HidayahTech/bucketer).
# One-time setup: GitLab → Settings → CI/CD → Variables (add GH_MIRROR_TOKEN) and Pipeline schedules
# (add a monthly schedule with variable RELOCK_MIRROR=true). The whole point of the read-only mirror
# is that GitHub gets nothing but the push, so this keeps outside PRs/comments blocked indefinitely.
relock-github-mirror:
  stage: test
  image: alpine:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $RELOCK_MIRROR == "true"'
  script:
    - apk add --no-cache curl
    - |
      curl -sf -X PUT \
        -H "Authorization: Bearer $GH_MIRROR_TOKEN" \
        -H "Accept: application/vnd.github+json" \
        https://api.github.com/repos/HidayahTech/bucketer/interaction-limits \
        -d '{"limit":"collaborators_only","expiry":"six_months"}'
    - echo "Re-applied collaborators_only interaction limit on the GitHub mirror."

# Guards the invariant the in-app integrity check depends on: the build must
# be bit-identical across runs given the same source. If anything ever leaks
# nondeterminism into the build (timestamps, RNG, unpinned tooling), this job
# catches it on the release tag before the release artifact is uploaded.
reproducibility:
  stage: reproducibility
  image: node:20-alpine
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - npm ci
    - npm run build
    - mv dist /tmp/build-a
    - npm run build
    - diff /tmp/build-a/index.html dist/index.html
    - diff /tmp/build-a/integrity.json dist/integrity.json
    - echo "Reproducibility verified — two consecutive builds are byte-identical."

release:
  stage: release
  image: node:20-alpine
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  needs:
    - test
    - reproducibility
  script:
    - node scripts/release.mjs
