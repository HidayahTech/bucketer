stages:
  - test
  - release

test:
  stage: test
  image: node:20-alpine
  script:
    - npm ci
    - npm run build
    - npm test
  artifacts:
    paths:
      - dist/index.html
    expire_in: 1 day
    when: on_success

release:
  stage: release
  image: node:20-alpine
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  needs:
    - test
  script:
    - node scripts/release.mjs
