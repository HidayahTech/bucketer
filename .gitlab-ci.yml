stages:
  - test
  - reproducibility
  - release

test:
  stage: test
  image: node:20-alpine
  rules:                                    # skip on the mirror-relock schedule (nothing to test there)
    - if: '$RELOCK_MIRROR == "true"'
      when: never
    - when: on_success
  script:
    - npm ci
    - npm run build
    - npm test
  artifacts:
    paths:
      - dist/index.html
      - dist/integrity.json
    expire_in: 1 day
    when: on_success

# End-to-end tests against the in-repo stateful mock S3 server: the node-integration layer
# (real lib functions over HTTP) and the browser layer (Playwright drives the built UI). The
# Playwright image ships Chromium, so no browser download is needed. allow_failure keeps this
# non-blocking while it stabilizes; flip it to required once it has a green track record.
e2e:
  stage: test
  image: mcr.microsoft.com/playwright:v1.60.0-jammy
  allow_failure: true
  rules:                                    # skip on the mirror-relock schedule
    - if: '$RELOCK_MIRROR == "true"'
      when: never
    - when: on_success
  script:
    - npm ci
    - npm run test:e2e

# Re-applies the GitHub mirror's `collaborators_only` interaction limit, which GitHub auto-expires
# after 6 months (there is no permanent setting on a public, non-archived repo). Runs ONLY from a
# dedicated Pipeline Schedule that sets RELOCK_MIRROR=true — never on normal pushes — using a masked,
# protected GH_MIRROR_TOKEN CI variable (a GitHub token with repo admin on HidayahTech/bucketer).
# One-time setup: GitLab → Settings → CI/CD → Variables (add GH_MIRROR_TOKEN) and Pipeline schedules
# (add a monthly schedule with variable RELOCK_MIRROR=true). The whole point of the read-only mirror
# is that GitHub gets nothing but the push, so this keeps outside PRs/comments blocked indefinitely.
relock-github-mirror:
  stage: test
  image: alpine:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $RELOCK_MIRROR == "true"'
  script:
    - apk add --no-cache curl
    - |
      curl -sf -X PUT \
        -H "Authorization: Bearer $GH_MIRROR_TOKEN" \
        -H "Accept: application/vnd.github+json" \
        https://api.github.com/repos/HidayahTech/bucketer/interaction-limits \
        -d '{"limit":"collaborators_only","expiry":"six_months"}'
    - echo "Re-applied collaborators_only interaction limit on the GitHub mirror."

# Guards the invariant the in-app integrity check depends on: the build must
# be bit-identical across runs given the same source. If anything ever leaks
# nondeterminism into the build (timestamps, RNG, unpinned tooling), this job
# catches it on the release tag before the release artifact is uploaded.
reproducibility:
  stage: reproducibility
  image: node:20-alpine
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - npm ci
    - npm run build
    - mv dist /tmp/build-a
    - npm run build
    - diff /tmp/build-a/index.html dist/index.html
    - diff /tmp/build-a/integrity.json dist/integrity.json
    - echo "Reproducibility verified — two consecutive builds are byte-identical."

release:
  stage: release
  image: node:20-alpine
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  needs:
    - test
    - reproducibility
  script:
    - node scripts/release.mjs
