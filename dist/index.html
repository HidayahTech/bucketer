<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="build-id" content="2026-05-22T21:32:30.078Z">
  <title>Bucketer</title>
  <link rel="icon" href="favicon.ico">
</head>
<body>
  <div id="app"></div>
  <style>/* ── Reset & base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f8f9fa;
  --surface: #ffffff;
  --surface-raised: #f1f3f5;
  --border: #dee2e6;
  --border-focus: #35c4e0;
  --text: #212529;
  --text-muted: #6c757d;
  --text-danger: #c92a2a;
  --text-success: #2f9e44;
  --text-warn: #e67700;
  --accent: #1aa3c0;
  --accent-hover: #158fa8;
  --danger: #e03131;
  --danger-hover: #c92a2a;
  --success-bg: #ebfbee;
  --warn-bg: #fff9db;
  --danger-bg: #fff5f5;
  --info-bg: #e0f7fb;
  --font: system-ui, -apple-system, "Segoe UI", sans-serif;
  --mono: "Cascadia Code", "Fira Code", "Consolas", monospace;
  --radius: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --transition: 140ms ease;
}

html { font-size: 15px; }
body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.5; }

/* ── Layout ───────────────────────────────────────────────────────────────── */
#app { display: flex; flex-direction: column; min-height: 100vh; }

.app-header {
  background: #1b2438;
  color: #fff;
  padding: .75rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  box-shadow: 0 2px 4px rgba(0,0,0,.25);
}
.app-logo { height: 2rem; width: auto; display: block; }
.app-header .spacer { flex: 1; }
.app-header .header-status { font-size: .8rem; opacity: .85; }

.app-body { flex: 1; display: flex; gap: 0; }

.sidebar {
  width: 300px;
  min-width: 260px;
  max-width: 360px;
  border-right: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  padding: 1rem;
  gap: 1rem;
  overflow-y: auto;
}

.main-content { flex: 1; padding: 1rem; overflow-y: auto; min-width: 0; }

/* ── Banners ──────────────────────────────────────────────────────────────── */
.banner {
  border-radius: var(--radius);
  padding: .75rem 1rem;
  font-size: .85rem;
  display: flex;
  gap: .75rem;
  align-items: flex-start;
  margin-bottom: 1rem;
}
.banner-info    { background: var(--info-bg);    border: 1px solid #74c0fc; }
.banner-warn    { background: var(--warn-bg);    border: 1px solid #ffd43b; color: var(--text-warn); }
.banner-danger  { background: var(--danger-bg);  border: 1px solid #ffa8a8; color: var(--text-danger); }
.banner-success { background: var(--success-bg); border: 1px solid #8ce99a; color: var(--text-success); }
.banner .banner-body { flex: 1; }
.banner .banner-title { font-weight: 600; margin-bottom: .2rem; }
.banner .banner-close {
  background: none; border: none; cursor: pointer; padding: 0 .25rem;
  color: inherit; opacity: .6; font-size: 1rem; line-height: 1;
}
.banner .banner-close:hover { opacity: 1; }

/* ── Forms ────────────────────────────────────────────────────────────────── */
.form-group { display: flex; flex-direction: column; gap: .3rem; }
.form-group label { font-size: .8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; }
.form-group input,
.form-group select {
  padding: .45rem .6rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: .9rem;
  font-family: var(--font);
  background: var(--surface);
  color: var(--text);
  width: 100%;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px rgba(74,173,247,.2);
}
.form-group .hint { font-size: .75rem; color: var(--text-muted); }

/* ── Buttons ──────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: .4rem;
  padding: .45rem .85rem; border-radius: var(--radius);
  border: 1px solid transparent; cursor: pointer;
  font-size: .9rem; font-family: var(--font); font-weight: 500;
  transition: background var(--transition), border-color var(--transition), color var(--transition);
  white-space: nowrap;
  user-select: none;
}
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-primary   { background: var(--accent);   color: #fff; }
.btn-primary:not(:disabled):hover  { background: var(--accent-hover); }
.btn-danger    { background: var(--danger);   color: #fff; }
.btn-danger:not(:disabled):hover   { background: var(--danger-hover); }
.btn-ghost     { background: transparent; border-color: var(--border); color: var(--text); }
.btn-ghost:not(:disabled):hover    { background: var(--surface-raised); }
.btn-sm { padding: .3rem .6rem; font-size: .8rem; }

/* ── Section headings ─────────────────────────────────────────────────────── */
.section-heading {
  font-size: .75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--text-muted); margin-bottom: .5rem;
}

/* ── Credential panel ─────────────────────────────────────────────────────── */
.cred-panel { display: flex; flex-direction: column; gap: .75rem; }
.cred-panel .btn-row { display: flex; gap: .5rem; flex-wrap: wrap; }

/* ── Connection status badge ──────────────────────────────────────────────── */
.status-badge {
  display: inline-flex; align-items: center; gap: .35rem;
  font-size: .8rem; padding: .2rem .55rem;
  border-radius: 999px; font-weight: 500;
}
.status-badge .dot { width: 7px; height: 7px; border-radius: 50%; }
.status-disconnected { background: #f1f3f5; color: var(--text-muted); }
.status-disconnected .dot { background: var(--text-muted); }
.status-connecting   { background: #fff9db; color: var(--text-warn); }
.status-connecting .dot { background: var(--text-warn); animation: pulse 1s infinite; }
.status-connected    { background: var(--success-bg); color: var(--text-success); }
.status-connected .dot { background: var(--text-success); }
.status-failed       { background: var(--danger-bg); color: var(--text-danger); }
.status-failed .dot  { background: var(--text-danger); }

@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }

/* ── File browser ─────────────────────────────────────────────────────────── */
.breadcrumb { display: flex; align-items: center; gap: .3rem; flex-wrap: wrap; font-size: .85rem; margin-bottom: .75rem; }
.breadcrumb .crumb { color: var(--accent); cursor: pointer; }
.breadcrumb .crumb:hover { text-decoration: underline; }
.breadcrumb .sep { color: var(--text-muted); }
.breadcrumb .current { color: var(--text); font-weight: 500; }

.file-table {
  width: 100%;
  border-collapse: collapse;
  font-size: .9rem;
}
.file-table thead th {
  text-align: left;
  padding: .35rem .6rem;
  border-bottom: 2px solid var(--border);
  font-size: .72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--text-muted);
  white-space: nowrap;
  user-select: none;
}
.file-table thead th.col-sortable { cursor: pointer; }
.file-table thead th.col-sortable:hover { color: var(--text); }
.file-table thead th.col-sort-active { color: var(--accent); }
.sort-indicator { margin-left: .35rem; font-size: .65rem; opacity: .7; }
.col-sort-active .sort-indicator { opacity: 1; }

.file-table td {
  padding: .45rem .6rem;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.file-table tbody tr:last-child td { border-bottom: none; }
.file-table tbody .file-row:hover td { background: var(--surface-raised); }

.col-name { width: 99%; }
.col-name .file-icon { margin-right: .45rem; }
.col-name .file-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 40ch; display: inline-block; vertical-align: middle; }
.col-name .file-name-previewable { color: var(--accent); cursor: pointer; }
.col-name .file-name-previewable:hover { text-decoration: underline; }
.col-name .file-dir  { color: var(--accent); font-weight: 500; }
.col-size     { white-space: nowrap; color: var(--text-muted); font-size: .85rem; padding-left: 1.5rem; }
.col-modified { white-space: nowrap; color: var(--text-muted); font-size: .85rem; padding-left: 1rem; }
.col-actions  { white-space: nowrap; text-align: right; padding-left: .5rem; }

.empty-state { color: var(--text-muted); font-size: .9rem; padding: 2rem 0; text-align: center; }

.load-more-bar { display: flex; justify-content: center; padding: 1rem 0; }

/* ── Upload zone ──────────────────────────────────────────────────────────── */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  text-align: center;
  color: var(--text-muted);
  font-size: .9rem;
  transition: border-color var(--transition), background var(--transition);
}
.upload-zone:hover,
.upload-zone.drag-over { border-color: var(--accent); background: var(--info-bg); color: var(--accent); }

/* ── Upload queue ─────────────────────────────────────────────────────────── */
.upload-queue { display: flex; flex-direction: column; gap: .5rem; }
.upload-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: .6rem .75rem;
  font-size: .85rem;
}
.upload-item-header { display: flex; align-items: center; gap: .5rem; }
.upload-item-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
.upload-item-size { color: var(--text-muted); white-space: nowrap; }
.upload-item-status { color: var(--text-muted); white-space: nowrap; font-size: .8rem; }
.upload-item-status.uploading { color: var(--accent); }
.upload-item-status.done      { color: var(--text-success); }
.upload-item-status.error     { color: var(--text-danger); }
.upload-item-status.paused    { color: var(--text-warn); }

.progress-bar-wrap {
  margin-top: .4rem;
  height: 4px; background: var(--surface-raised);
  border-radius: 999px; overflow: hidden;
}
.progress-bar { height: 100%; background: var(--accent); border-radius: 999px; transition: width .3s; }
.upload-meta { display: flex; justify-content: space-between; color: var(--text-muted); font-size: .75rem; margin-top: .25rem; }

.upload-error-detail {
  margin-top: .4rem; padding: .4rem .5rem;
  background: var(--danger-bg); border-radius: var(--radius);
  font-size: .78rem; color: var(--text-danger);
}
.upload-error-detail summary { cursor: pointer; font-weight: 600; }
.upload-error-detail pre { white-space: pre-wrap; word-break: break-all; margin-top: .25rem; font-family: var(--mono); font-size: .75rem; }

/* ── Capability badges ────────────────────────────────────────────────────── */
.cap-list { display: flex; flex-direction: column; gap: .3rem; font-size: .8rem; }
.cap-item { display: flex; align-items: center; gap: .4rem; }
.cap-item .cap-icon { width: 14px; text-align: center; }
.cap-item .cap-label { flex: 1; }
.cap-permitted { color: var(--text-success); }
.cap-denied    { color: var(--text-danger); }
.cap-unknown   { color: var(--text-muted); }

/* ── Spinner ──────────────────────────────────────────────────────────────── */
.spinner {
  width: 16px; height: 16px;
  border: 2px solid currentColor;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Error block ──────────────────────────────────────────────────────────── */
.error-block {
  background: var(--danger-bg); border: 1px solid #ffa8a8;
  border-radius: var(--radius); padding: .75rem 1rem;
  font-size: .85rem; color: var(--text-danger);
}
.error-block .error-title { font-weight: 600; margin-bottom: .25rem; }
.error-block details { margin-top: .4rem; }
.error-block summary { cursor: pointer; font-size: .8rem; font-weight: 600; }
.error-block pre { margin-top: .3rem; white-space: pre-wrap; word-break: break-all; font-family: var(--mono); font-size: .75rem; }

/* ── CORS setup guide ─────────────────────────────────────────────────────── */
.cors-guide {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: .85rem;
}
.cors-guide summary {
  padding: .55rem .75rem;
  cursor: pointer;
  font-weight: 600;
  color: var(--text-warn);
  user-select: none;
  list-style: none;
}
.cors-guide summary::before { content: '▶ '; font-size: .7rem; }
.cors-guide[open] summary::before { content: '▼ '; }
.cors-guide-body {
  padding: .6rem .75rem .75rem;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: .5rem;
}
.cors-note { color: var(--text-muted); line-height: 1.5; }
.cors-note-warn { color: var(--text-warn); font-weight: 500; }
.setup-steps {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.cors-cmd {
  background: #1e1e2e;
  color: #cdd6f4;
  padding: .6rem .75rem;
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: .75rem;
  white-space: pre-wrap;
  word-break: break-all;
  overflow-x: auto;
}

/* ── Upload log ───────────────────────────────────────────────────────────── */
.upload-log { margin: 1rem 0; }
.log-status { text-align: center; width: 1.5rem; font-weight: 700; }
.log-done   { color: var(--text-success); }
.log-error  { color: var(--text-danger); cursor: help; }
.log-name, .log-dest { max-width: 22ch; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.log-dest   { color: var(--text-muted); font-size: .85rem; }
.log-num    { white-space: nowrap; color: var(--text-muted); font-size: .85rem; padding-left: 1rem; }

/* ── Confirmation modal ───────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
}
.modal-dialog {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: 0 8px 24px rgba(0,0,0,.2);
  padding: 1.25rem 1.5rem;
  min-width: 320px; max-width: 480px; width: 100%;
  display: flex; flex-direction: column; gap: .75rem;
}
.modal-title { font-size: 1rem; font-weight: 700; }
.modal-body { display: flex; flex-direction: column; gap: .5rem; font-size: .875rem; }
.modal-filename {
  font-family: var(--mono); font-size: .8rem;
  background: var(--surface-raised); border-radius: var(--radius);
  padding: .3rem .5rem;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.modal-caveat { color: var(--text-muted); line-height: 1.5; }
.modal-error {
  color: var(--text-danger); background: var(--danger-bg);
  border-radius: var(--radius); padding: .35rem .5rem; font-size: .8rem;
}
.modal-actions { display: flex; justify-content: flex-end; gap: .5rem; }

/* ── Preview modal ───────────────────────────────────────────────────────── */
.preview-dialog {
  min-width: 0;
  max-width: min(92vw, 960px);
  width: min(92vw, 960px);
}
.preview-title {
  display: flex;
  align-items: center;
  gap: .5rem;
}
.preview-filename {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-family: var(--mono);
  font-size: .85rem;
}
.preview-close {
  flex-shrink: 0;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1rem;
  color: var(--text-muted);
  padding: .15rem .35rem;
  border-radius: var(--radius);
}
.preview-close:hover { color: var(--text); background: var(--surface-raised); }
.preview-body {
  display: flex;
  align-items: center;
  gap: .5rem;
  min-height: 120px;
}
.preview-content {
  position: relative;
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.preview-tap-zone {
  position: absolute; top: 0; bottom: 0; width: 50%;
  cursor: pointer; z-index: 1;
}
.preview-tap-prev { left: 0; }
.preview-tap-next { right: 0; }
.preview-nav {
  flex-shrink: 0;
  align-self: center;
  background: var(--surface-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-muted);
  padding: .6rem .35rem;
  font-size: 1.5rem; line-height: 1; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  min-height: 2.5rem;
  transition: background var(--transition), color var(--transition);
}
.preview-nav:hover:not(:disabled) { background: var(--border); color: var(--text); }
.preview-nav:disabled { opacity: .25; cursor: default; }
.preview-counter { font-size: .75rem; font-weight: 400; color: var(--text-muted); white-space: nowrap; }
.preview-media {
  max-width: 100%;
  max-height: 72vh;
  object-fit: contain;
  border-radius: var(--radius);
  display: block;
}
.preview-audio {
  width: 100%;
  min-width: 280px;
}

/* ── Hidden versions panel ───────────────────────────────────────────────── */
.hidden-versions-bar {
  margin-top: 1rem;
  padding-top: .75rem;
  border-top: 1px solid var(--border);
}
.hidden-versions {
  margin-top: 1rem;
  padding-top: .75rem;
  border-top: 1px solid var(--border);
}
.hidden-versions-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: .75rem;
}
.version-badge {
  display: inline-block;
  font-size: .72rem;
  font-weight: 600;
  padding: .15rem .45rem;
  border-radius: 999px;
  white-space: nowrap;
}
.version-badge-dm  { background: var(--danger-bg); color: var(--text-danger); }
.version-badge-old { background: var(--surface-raised); color: var(--text-muted); }
.col-version-id    { font-family: var(--mono); font-size: .75rem; color: var(--text-muted); }
.hidden-versions-note {
  font-size: .8rem; color: var(--text-muted); line-height: 1.5;
  margin: 0 0 .75rem;
}

/* ── Scrollbar polish ─────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Responsive ───────────────────────────────────────────────────────────── */
@media (max-width: 640px) {
  .app-body { flex-direction: column; }
  .sidebar { width: 100%; max-width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
}

/* ── Disconnected splash ──────────────────────────────────────────────────── */
.splash {
  max-width: 560px; margin: 3rem auto; padding: 2rem;
  background: var(--surface); border-radius: var(--radius);
  box-shadow: var(--shadow); border: 1px solid var(--border);
}
.splash h2 { margin-bottom: 1rem; }
.splash-divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
.splash-info { display: flex; flex-direction: column; gap: 1.25rem; }
.splash-info-section { display: flex; flex-direction: column; gap: .5rem; font-size: .85rem; color: var(--text-muted); }
.splash-info-heading { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); }
.splash-info-section p { line-height: 1.55; }
.splash-info-list { padding-left: 1.25rem; display: flex; flex-direction: column; gap: .3rem; }
.splash-info-list li { line-height: 1.55; }
.splash-info-section code { font-family: var(--mono); font-size: .8rem; background: var(--surface-raised); padding: .1rem .3rem; border-radius: 3px; }

/* ── S3 primer accordion (sidebar) ───────────────────────────────────────── */
.s3-primer { font-size: .82rem; color: var(--text-muted); }
.s3-primer-summary {
  cursor: pointer; font-size: .75rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .06em;
  color: var(--text-muted); list-style: none;
  display: flex; align-items: center; gap: .4rem;
  user-select: none;
}
.s3-primer-summary::-webkit-details-marker { display: none; }
.s3-primer-summary::before { content: '▶'; font-size: .6rem; transition: transform var(--transition); }
.s3-primer[open] .s3-primer-summary::before { transform: rotate(90deg); }
.s3-primer-body { display: flex; flex-direction: column; gap: .6rem; margin-top: .75rem; line-height: 1.55; }
