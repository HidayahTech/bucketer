        .bk-icon-inner { transform-box: fill-box; transform-origin: center; }

        /* Per-icon vectors pointing from each icon's center to the hole at (24, 87).
           Values are in the icon's local (rotated) coordinate space so the icon
           lands on the hole in world space despite its parent rotation. */
        .bk-icon-1 .bk-icon-inner { --tx: -11px; --ty: 31px; }
        .bk-icon-2 .bk-icon-inner { --tx: -34px; --ty: 42px; }
        .bk-icon-3 .bk-icon-inner { --tx: -20px; --ty: 17px; }
        .bk-icon-4 .bk-icon-inner { --tx:  -6px; --ty:  7px; }
        .bk-icon-5 .bk-icon-inner { --tx: -43px; --ty:  7px; }
        .bk-icon-6 .bk-icon-inner { --tx: -29px; --ty:  0px; }

        /* Hole \u2014 visible during leak, mop, bandage; hidden during refill + full */
        .bk-hole { opacity: 0; transition: opacity 0.3s; }
        .logo-phase-leak    .bk-hole,
        .logo-phase-mop     .bk-hole,
        .logo-phase-bandage .bk-hole { opacity: 1; }

        /* Drip animation \u2014 6 staggered drips during leak */
        .bk-drip { opacity: 0; }
        .logo-phase-leak .bk-drip-1 { animation: bk-drip 0.6s ease-in 0.5s forwards; }
        .logo-phase-leak .bk-drip-2 { animation: bk-drip 0.6s ease-in 1.3s forwards; }
        .logo-phase-leak .bk-drip-3 { animation: bk-drip 0.6s ease-in 2.1s forwards; }
        .logo-phase-leak .bk-drip-4 { animation: bk-drip 0.6s ease-in 2.9s forwards; }
        .logo-phase-leak .bk-drip-5 { animation: bk-drip 0.6s ease-in 3.7s forwards; }
        .logo-phase-leak .bk-drip-6 { animation: bk-drip 0.6s ease-in 4.5s forwards; }

        @keyframes bk-drip {
          0%   { opacity: 1; transform: translateY(0); }
          85%  { opacity: 1; transform: translateY(28px); }
          100% { opacity: 0; transform: translateY(30px); }
        }

        /* Icons \u2014 drain (shrink + fade) sequentially during leak */
        .logo-phase-leak .bk-icon-1 .bk-icon-inner { animation: bk-drain 0.85s ease-in 0.2s forwards; }
        .logo-phase-leak .bk-icon-2 .bk-icon-inner { animation: bk-drain 0.85s ease-in 1.0s forwards; }
        .logo-phase-leak .bk-icon-3 .bk-icon-inner { animation: bk-drain 0.85s ease-in 1.8s forwards; }
        .logo-phase-leak .bk-icon-4 .bk-icon-inner { animation: bk-drain 0.85s ease-in 2.6s forwards; }
        .logo-phase-leak .bk-icon-5 .bk-icon-inner { animation: bk-drain 0.85s ease-in 3.4s forwards; }
        .logo-phase-leak .bk-icon-6 .bk-icon-inner { animation: bk-drain 0.85s ease-in 4.2s forwards; }

        /* During mop and bandage, icons stay hidden */
        .logo-phase-mop     .bk-icon-inner,
        .logo-phase-bandage .bk-icon-inner { opacity: 0; transform: scale(0); }

        @keyframes bk-drain {
          0%   { opacity: 1; transform: translate(0, 0) scale(1); }
          70%  { opacity: 1; transform: translate(calc(var(--tx) * 0.85), calc(var(--ty) * 0.85)) scale(0.65); }
          100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.05); }
        }

        /* Puddle \u2014 6 stacked ellipses, each fades in as a drip lands */
        .bk-puddle { opacity: 0; }
        .logo-phase-leak .bk-puddle-1 { animation: bk-puddle 0.3s ease-out 1.0s forwards; }
        .logo-phase-leak .bk-puddle-2 { animation: bk-puddle 0.3s ease-out 1.8s forwards; }
        .logo-phase-leak .bk-puddle-3 { animation: bk-puddle 0.3s ease-out 2.6s forwards; }
        .logo-phase-leak .bk-puddle-4 { animation: bk-puddle 0.3s ease-out 3.4s forwards; }
        .logo-phase-leak .bk-puddle-5 { animation: bk-puddle 0.3s ease-out 4.2s forwards; }
        .logo-phase-leak .bk-puddle-6 { animation: bk-puddle 0.3s ease-out 5.0s forwards; }

        /* During mop, each puddle ring fades out timed to a mop plunge */
        .logo-phase-mop .bk-puddle { opacity: 0.55; }
        .logo-phase-mop .bk-puddle-6 { animation: bk-puddle-fade 0.25s ease-out 0.55s forwards; }
        .logo-phase-mop .bk-puddle-5 { animation: bk-puddle-fade 0.25s ease-out 0.85s forwards; }
        .logo-phase-mop .bk-puddle-4 { animation: bk-puddle-fade 0.25s ease-out 1.25s forwards; }
        .logo-phase-mop .bk-puddle-3 { animation: bk-puddle-fade 0.25s ease-out 1.55s forwards; }
        .logo-phase-mop .bk-puddle-2 { animation: bk-puddle-fade 0.25s ease-out 1.85s forwards; }
        .logo-phase-mop .bk-puddle-1 { animation: bk-puddle-fade 0.25s ease-out 2.15s forwards; }

        @keyframes bk-puddle {
          0%   { opacity: 0; }
          100% { opacity: 0.55; }
        }

        @keyframes bk-puddle-fade {
          0%   { opacity: 0.55; }
          100% { opacity: 0; }
        }

        /* Mop \u2014 enters from right, attacks puddle at three spots with angled plunges */
        .bk-mop { opacity: 0; transform: translate(60px, 0) rotate(0deg); transform-box: fill-box; transform-origin: 50% 0%; }
        .logo-phase-mop .bk-mop { animation: bk-mop 2.4s ease-in-out 0.15s forwards; }

        @keyframes bk-mop {
          0%   { opacity: 0; transform: translate(60px, 0) rotate(0deg); }
          8%   { opacity: 1; transform: translate(28px, 0)  rotate(0deg); }

          /* Right attack: two angled plunges */
          16%  { opacity: 1; transform: translate(26px, 2px) rotate(-22deg); }
          22%  { opacity: 1; transform: translate(28px, 0)   rotate(14deg); }
          28%  { opacity: 1; transform: translate(26px, 2px) rotate(-18deg); }

          /* Travel to center */
          35%  { opacity: 1; transform: translate(6px, -1px) rotate(0deg); }

          /* Center attack: two angled plunges */
          43%  { opacity: 1; transform: translate(4px, 2px)  rotate(20deg); }
          50%  { opacity: 1; transform: translate(8px, 0)    rotate(-16deg); }
          57%  { opacity: 1; transform: translate(4px, 2px)  rotate(18deg); }

          /* Travel to left */
          65%  { opacity: 1; transform: translate(-16px, -1px) rotate(0deg); }

          /* Left attack: two angled plunges */
          73%  { opacity: 1; transform: translate(-18px, 2px) rotate(-20deg); }
          80%  { opacity: 1; transform: translate(-14px, 0)   rotate(16deg); }
          87%  { opacity: 1; transform: translate(-18px, 2px) rotate(-14deg); }

          /* Exit left */
          95%  { opacity: 1; transform: translate(-50px, 0)  rotate(0deg); }
          100% { opacity: 0; transform: translate(-70px, 0)  rotate(0deg); }
        }

        /* Refill \u2014 icons drop in from above the rim, sequentially */
        .logo-phase-refill .bk-icon-1 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 0.0s backwards; }
        .logo-phase-refill .bk-icon-2 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 0.4s backwards; }
        .logo-phase-refill .bk-icon-3 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 0.8s backwards; }
        .logo-phase-refill .bk-icon-4 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 1.2s backwards; }
        .logo-phase-refill .bk-icon-5 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 1.6s backwards; }
        .logo-phase-refill .bk-icon-6 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 2.0s backwards; }

        @keyframes bk-settle {
          0%   { opacity: 0; transform: translateY(-70px) scale(1); }
          70%  { opacity: 1; transform: translateY(2px) scale(1); }
          100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Bandages \u2014 slide in from the left during the bandage phase, form an X */
        .bk-bandaid { opacity: 0; transform-box: fill-box; transform-origin: center; }

        /* Final resting state, visible whenever patched */
        .bk-patched.logo-phase-full   .bk-bandaid-1,
        .bk-patched.logo-phase-refill .bk-bandaid-1 { opacity: 1; transform: translateX(0) rotate(45deg); }
        .bk-patched.logo-phase-full   .bk-bandaid-2,
        .bk-patched.logo-phase-refill .bk-bandaid-2 { opacity: 1; transform: translateX(0) rotate(-45deg); }

        /* Bandage phase: slide in sequentially from the left */
        .bk-patched.logo-phase-bandage .bk-bandaid-1 {
          animation: bk-bandaid-in-1 0.5s cubic-bezier(.34,1.3,.64,1) 0.15s forwards;
        }
        .bk-patched.logo-phase-bandage .bk-bandaid-2 {
          animation: bk-bandaid-in-2 0.5s cubic-bezier(.34,1.3,.64,1) 0.65s forwards;
        }

        @keyframes bk-bandaid-in-1 {
          0%   { opacity: 0; transform: translateX(-50px) rotate(45deg); }
          70%  { opacity: 1; transform: translateX(3px)   rotate(45deg); }
          100% { opacity: 1; transform: translateX(0)     rotate(45deg); }
        }
        @keyframes bk-bandaid-in-2 {
          0%   { opacity: 0; transform: translateX(-50px) rotate(-45deg); }
          70%  { opacity: 1; transform: translateX(3px)   rotate(-45deg); }
          100% { opacity: 1; transform: translateX(0)     rotate(-45deg); }
        }

,{version:"1.12.15",date:"2026-06-01",title:"README badges",changes:["Add pipeline status, latest release, and AGPL v3 license badges to README"]},{version:"1.12.14",date:"2026-06-01",title:"CI release job",changes:["Added scripts/release.mjs \u2014 uploads dist/index.html to the Package Registry and creates a GitLab Release with CHANGELOG description and asset link",".gitlab-ci.yml now has two stages: test and release","Release job runs only on version tags (v*.*.*), depends on the test job, uses CI_JOB_TOKEN (no PAT needed)","Test job passes dist/index.html as an artifact to the release job"]},{version:"1.12.13",date:"2026-06-01",title:"Auto-tag on push",changes:["Pre-push hook now runs npm run build before npm test (full local validation)","Pre-push hook auto-creates an annotated version tag if one does not exist for the current package.json version","push.followTags true configured by npm install via the prepare script \u2014 tags travel with every push automatically","CLAUDE.md updated to document the tagging guarantee"]},{version:"1.12.12",date:"2026-06-01",title:"Build before test in GitLab CI",changes:["GitLab CI now runs npm run build before npm test","CI validates the build from source in a clean environment, then tests its own output rather than the committed dist file"]},{version:"1.12.11",date:"2026-06-01",title:"Link copyright footer to HidayahTech website",changes:["Copyright notice in the app footer now links to https://hidayahtech.com","Link inherits the muted footer color; accent color on hover"]},{version:"1.12.10",date:"2026-06-01",title:"Add copyright footer to app UI",changes:['Added a footer bar at the bottom of the app displaying "Copyright \xA9 2026 HidayahTech, LLC"',"Styled with --text-muted and a top border; adapts to dark mode automatically"]},{version:"1.12.9",date:"2026-06-01",title:"Add copyright notices",changes:["Added Copyright (C) 2026 HidayahTech, LLC to the top of all 24 source files (src/**/*.js, src/**/*.jsx)","build.mjs injects the notice into the generated src/lib/changelog.js so it survives rebuilds","Added copyright line to top of LICENSE file","Added License section to README.md with copyright and AGPL-3.0 reference"]},{version:"1.12.8",date:"2026-06-01",title:"Extract preparePutBody and add BUG-003 tests",changes:["Extracted preparePutBody(file) from UploadQueue.jsx into src/lib/upload-queue.js (exported)","uploadSmall now calls preparePutBody(file) instead of inlining the conversion","BUG-003 regression tests added to test/calc-part-size.test.js: returns Uint8Array, never Blob, content preserved, empty file produces empty array","Added **Coverage:** line for BUG-003 in BUG-LOG.md","Test count: 272 \u2192 276"]},{version:"1.12.7",date:"2026-06-01",title:"Document test suite in CLAUDE.md and update BUG-LOG",changes:['Added "Test Suite" section to CLAUDE.md: lists all 14 test files with their scope, explains the two-layer structure (unit vs build-output), and documents how to add new tests',"Updated BUG-LOG.md: added **Coverage:** lines to BUG-001, BUG-002, BUG-007, BUG-008, BUG-012, BUG-013, BUG-015 linking each to its implementing test file and suite"]},{version:"1.12.6",date:"2026-06-01",title:"Fill remaining test gaps",changes:["mimeType() tests added to test/media.test.js: 11 tests covering MIME type lookup, case-insensitivity, unknown/no-extension returns null, nested path handling","Upload log tests added to test/indexeddb-storage.test.js: saveUploadLogEntry, loadUploadLog (newest-first ordering, field preservation), clearUploadLog","Test count: 256 \u2192 272"]},{version:"1.12.5",date:"2026-06-01",title:"Extract corsJson and buildFileIdentityWithHash; add tests",changes:["Extracted corsJson(origin) from SetupGuide.jsx into src/lib/cors-config.js (exported)","New test/cors-config.test.js: 11 tests \u2014 structure, AllowedMethods (BUG-012), AllowedHeaders (SDK headers must be explicit), ExposeHeaders","Extracted buildFileIdentityWithHash(file) into src/lib/indexeddb.js (exported); UploadQueue.jsx now calls it instead of inlining the three-line pattern","BUG-008 regression tests added to test/indexeddb-storage.test.js: contentHash present, deterministic, content-sensitive","The SDK headers amz-sdk-invocation-id and amz-sdk-request must appear explicitly \u2014 the x-amz-* wildcard does not cover them"]},{version:"1.12.4",date:"2026-06-01",title:"Extract collectParts and add BUG-007 tests",changes:["Extracted collectParts(client, {bucket, key, uploadId}) from UploadQueue.jsx into src/lib/upload-queue.js (exported)","ListPartsCommand import moved from the component to the lib module","New test/collect-parts.test.js: 7 tests using a mock S3 client","BUG-007 regression tests: two-page and three-page pagination, stops on IsTruncated=false, handles missing Parts field, preserves ETag through pagination"]},{version:"1.12.3",date:"2026-06-01",title:"Add s3-client.js tests",changes:["New test/s3-client.test.js: 12 tests for createS3Client region resolution and forcePathStyle","Region priority: regionOverride > extractRegion() > us-east-1 fallback; all three tiers tested","R2 region is always auto; B2 and AWS extract from endpoint subdomain","forcePathStyle true for B2 and MinIO; false for R2, AWS, generic"]},{version:"1.12.2",date:"2026-06-01",title:"Add file-entries.js tests",changes:["New test/file-entries.test.js: 10 tests for collectFileEntries using a pure JS FileSystemEntry mock","Flat list, nested folder traversal, mixed root entries, and correct relative path construction","Pagination invariant: folders with 150 and 250 files (simulated with batches of 100) must collect all entries \u2014 not just the first 100","Error resilience: unreadable file entries are silently skipped without throwing"]},{version:"1.12.1",date:"2026-06-01",title:"Add storage.js tests",changes:["New test/storage.test.js: 23 tests covering the full credential and settings persistence layer","Security invariant: secretKey must go to sessionStorage, not localStorage; asserted at the storage-value level","Credential round-trip: all fields saved and loaded correctly; provider returns null (not empty string) when absent","clearCredentials wipes both stores; clearCapabilities resets to defaults","Settings round-trips for all settings functions: maxKeys, partConcurrency, partSizeMB, fileConcurrency","listingCacheTTL edge case: 0 (disable cache) must not be treated as falsy \u2014 checked explicitly","loadCapabilities returns defaults when storage is empty or contains corrupted JSON"]},{version:"1.12.0",date:"2026-06-01",title:"IndexedDB resume record and file hash tests",changes:["Added fake-indexeddb as devDependency to provide an in-memory IndexedDB in Node","New test/indexeddb-storage.test.js: 11 tests covering saveResumeRecord, loadResumeRecord, deleteResumeRecord, and computeFileHash","Resume record tests: round-trip fidelity, null return for missing key, overwrite at same key, independent keys","Delete tests: removal confirmed, no-op delete resolves cleanly, sibling keys are preserved","computeFileHash tests: determinism, content sensitivity, and the partial-hash invariant (only head+tail 64 KB are hashed \u2014 two files with identical endpoints but different middle produce the same hash)"]},{version:"1.11.9",date:"2026-06-01",title:"Extract calcPartSize and add tests",changes:["Moved calcPartSize from UploadQueue.jsx into src/lib/upload-queue.js (exported) so it can be tested without loading JSX","New test/calc-part-size.test.js: 11 tests covering the 5 MB floor, 10,000-part ceiling, preferred size override, and falsy preferred values","Also fixed test/build.test.js to operate on the HTML frame and JS bundle separately \u2014 whole-file string matching produced false positives when changelog text contained tag-like strings as data"]},{version:"1.11.8",date:"2026-06-01",title:"Add build output structural tests",changes:["New test/build.test.js: 14 assertions on dist/index.html verifying production build invariants","BUG-001 regression: placeholder must not survive into dist; output must be a valid HTML document","BUG-002 regression: Preact JSX transform must be active; no React runtime artifacts in output","BUG-012 regression: CORS template must include DELETE in AllowedMethods","Version consistency: app-version meta tag must match package.json version","Single-bundle assertions: HTML frame has no injected tags before the bundle; no external script or stylesheet references"]},{version:"1.11.7",date:"2026-06-01",title:"Add indexeddb pure-function tests",changes:["New test/indexeddb-pure.test.js: 18 tests covering pure functions and localStorage-based tab conflict detection","BUG-015 regression tests: uploadExpiryWarningMs('b2') must return null; R2 and generic must return 7 days","buildFileIdentity and fileIdentityMatches: identity construction and all three mismatch cases","Tab conflict detection: this-tab vs other-tab discrimination, inactive cleanup, multi-key independence, other-tab entry not removed by this tab's markUploadInactive"]},{version:"1.11.6",date:"2026-06-01",title:"Add url-params test suite",changes:["New test/url-params.test.js: 19 tests covering buildShareUrl, readUrlParams, hasUrlParams, and pushPrefixHistory","BUG-013 regression test: params must live in the hash fragment, never the query string","Credential exclusion test: keyId and secretKey must never appear in share URLs","pushPrefixHistory tests: hash vs query string, pushState vs replaceState, param preservation, root navigation removes prefix key"]},{version:"1.11.5",date:"2026-06-01",title:"Improve test suite quality",changes:["Removed redundant lookup-table assertions from media.test.js; kept one representative per category plus tests that exercise actual logic (case-insensitivity, path handling, charset stripping)","Added explicit HTML/JS security invariant tests to mediaKind and mimeKind (these kinds must resolve to 'text', never a rendered type)","Added hostname false-positive tests to detectProvider: provider domain in a URL path or as a hostname suffix must not match","Added MinIO and DO Spaces to defaultMaxKeys coverage","Added Code-vs-name precedence test to parseS3Error","Removed misleading BUG-007 comment from leafName tests",'Removed "all tasks eventually complete" from UploadQueue tests (no specific invariant)',"Test count: 133 \u2192 117 (16 removed were duplicate code-path assertions)"]},{version:"1.11.4",date:"2026-06-01",title:"Apply intent comments to all source files",changes:["Added WHY-focused comments to all JS/JSX source files documenting design intent, spec references, and non-obvious invariants","Covers all 9 lib/ modules and all 14 components including Browser.jsx and UploadQueue.jsx","Key invariants documented: resume record saved before first part upload, text preview forces text/plain for security, listing cache invalidated on every mutation, rename uses copy-before-delete, dragCounter debounce for nested drag events"]},{version:"1.11.3",date:"2026-06-01",title:"Anchor provider detection to hostname",changes:["Provider detection now parses the endpoint URL and tests patterns against the hostname only, preventing false matches on paths or query strings","Detection regexes anchored with $ to prevent suffix-based misdetection"]},{version:"1.11.2",date:"2026-06-01",title:"Document update poller in README",changes:["Expanded security model section to explicitly state the update poll targets the app's own URL only, never a third-party host, and stops once a new build is detected"]},{version:"1.11.1",date:"2026-06-01",title:"Sandbox PDF preview iframe",changes:['Added sandbox="" to the PDF preview <iframe> \u2014 disables scripts, forms, popups, same-origin access, and top navigation; native PDF rendering is unaffected']},{version:"1.11.0",date:"2026-06-01",title:"SVG favicon, drop favicon.ico",changes:["Favicon is now an inline SVG data URL \u2014 the same SVG already imported for the app logo is reused, adding zero bytes to the bundle","dist/favicon. ntry to CHANGELOG.md"]},{version:"1.10.4",date:"2026-06-01",title:"AGPL-3.0 license",changes:["Added LICENSE file: GNU Affero General Public License v3.0 (AGPL-3.0)"]},{version:"1.10.3",date:"2026-06-01",title:"README correction",changes:["Fixed README: dist/index.html and dist/favicon.ico are committed to the repo (not gitignored) \u2014 updated docs to reflect this and explain the rationale (auditability)"]},{version:"1.10.2",date:"2026-05-31",title:"Developer tooling cleanup",changes:["Moved @anthropic-ai/claude-code out of project dependencies into a gitignored .tools/ directory \u2014 it no longer appears in package.json or package-lock.json","Added .tools/ to .gitignore","Updated CLAUDE.md with Claude Code setup instructions and corrected the workflow note about the package"]},{version:"1.10.1",date:"2026-05-28",title:"Spec drift documentation",changes:["Added SPEC-DRIFT.md \u2014 documents all implementation drift from spec v0.15, including features implemented beyond original scope"]},{version:"1.10.0",date:"2026-05-28",title:"Smarter update check",changes:["Update check now uses a HEAD request as a fast first step \u2014 if ETag/Last-Modified headers match, no body is fetched at all","Falls back to a 512-byte Range request to compare build IDs when HEAD is inconclusive, instead of fetching the full page every poll","Once a real update is confirmed, fetches the full page with default cache mode so the browser can cache it for the user's subsequent reload",'Update banner now shows the specific version number: "Version 1.10.0 is available."']},{version:"1.9.0",date:"2026-05-28",title:"Build invariants and app-version metadata",changes:['App version is now embedded in the built HTML as a <meta name="app-version"> tag, available to the update checker',"Build script enforces a build invariants check: both build-id and app-version meta tags must fall within the first 512 bytes of the output, matching the update checker's range fetch boundary","Build fails loudly w
