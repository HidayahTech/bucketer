        .bk-icon-inner { transform-box: fill-box; transform-origin: center; }

        /* Per-icon vectors pointing from each icon's center to the hole at (24, 87).
           Values are in the icon's local (rotated) coordinate space so the icon
           lands on the hole in world space despite its parent rotation. */
        .bk-icon-1 .bk-icon-inner { --tx: -11px; --ty: 31px; }
        .bk-icon-2 .bk-icon-inner { --tx: -34px; --ty: 42px; }
        .bk-icon-3 .bk-icon-inner { --tx: -20px; --ty: 17px; }
        .bk-icon-4 .bk-icon-inner { --tx:  -6px; --ty:  7px; }
        .bk-icon-5 .bk-icon-inner { --tx: -43px; --ty:  7px; }
        .bk-icon-6 .bk-icon-inner { --tx: -29px; --ty:  0px; }

        /* Hole \u2014 visible during leak, mop, bandage; hidden during refill + full */
        .bk-hole { opacity: 0; transition: opacity 0.3s; }
        .logo-phase-leak    .bk-hole,
        .logo-phase-mop     .bk-hole,
        .logo-phase-bandage .bk-hole { opacity: 1; }

        /* Drip animation \u2014 6 staggered drips during leak */
        .bk-drip { opacity: 0; }
        .logo-phase-leak .bk-drip-1 { animation: bk-drip 0.6s ease-in 0.5s forwards; }
        .logo-phase-leak .bk-drip-2 { animation: bk-drip 0.6s ease-in 1.3s forwards; }
        .logo-phase-leak .bk-drip-3 { animation: bk-drip 0.6s ease-in 2.1s forwards; }
        .logo-phase-leak .bk-drip-4 { animation: bk-drip 0.6s ease-in 2.9s forwards; }
        .logo-phase-leak .bk-drip-5 { animation: bk-drip 0.6s ease-in 3.7s forwards; }
        .logo-phase-leak .bk-drip-6 { animation: bk-drip 0.6s ease-in 4.5s forwards; }

        @keyframes bk-drip {
          0%   { opacity: 1; transform: translateY(0); }
          85%  { opacity: 1; transform: translateY(28px); }
          100% { opacity: 0; transform: translateY(30px); }
        }

        /* Icons \u2014 drain (shrink + fade) sequentially during leak */
        .logo-phase-leak .bk-icon-1 .bk-icon-inner { animation: bk-drain 0.85s ease-in 0.2s forwards; }
        .logo-phase-leak .bk-icon-2 .bk-icon-inner { animation: bk-drain 0.85s ease-in 1.0s forwards; }
        .logo-phase-leak .bk-icon-3 .bk-icon-inner { animation: bk-drain 0.85s ease-in 1.8s forwards; }
        .logo-phase-leak .bk-icon-4 .bk-icon-inner { animation: bk-drain 0.85s ease-in 2.6s forwards; }
        .logo-phase-leak .bk-icon-5 .bk-icon-inner { animation: bk-drain 0.85s ease-in 3.4s forwards; }
        .logo-phase-leak .bk-icon-6 .bk-icon-inner { animation: bk-drain 0.85s ease-in 4.2s forwards; }

        /* During mop and bandage, icons stay hidden */
        .logo-phase-mop     .bk-icon-inner,
        .logo-phase-bandage .bk-icon-inner { opacity: 0; transform: scale(0); }

        @keyframes bk-drain {
          0%   { opacity: 1; transform: translate(0, 0) scale(1); }
          70%  { opacity: 1; transform: translate(calc(var(--tx) * 0.85), calc(var(--ty) * 0.85)) scale(0.65); }
          100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.05); }
        }

        /* Puddle \u2014 6 stacked ellipses, each fades in as a drip lands */
        .bk-puddle { opacity: 0; }
        .logo-phase-leak .bk-puddle-1 { animation: bk-puddle 0.3s ease-out 1.0s forwards; }
        .logo-phase-leak .bk-puddle-2 { animation: bk-puddle 0.3s ease-out 1.8s forwards; }
        .logo-phase-leak .bk-puddle-3 { animation: bk-puddle 0.3s ease-out 2.6s forwards; }
        .logo-phase-leak .bk-puddle-4 { animation: bk-puddle 0.3s ease-out 3.4s forwards; }
        .logo-phase-leak .bk-puddle-5 { animation: bk-puddle 0.3s ease-out 4.2s forwards; }
        .logo-phase-leak .bk-puddle-6 { animation: bk-puddle 0.3s ease-out 5.0s forwards; }

        /* During mop, each puddle ring fades out timed to a mop plunge */
        .logo-phase-mop .bk-puddle { opacity: 0.55; }
        .logo-phase-mop .bk-puddle-6 { animation: bk-puddle-fade 0.25s ease-out 0.55s forwards; }
        .logo-phase-mop .bk-puddle-5 { animation: bk-puddle-fade 0.25s ease-out 0.85s forwards; }
        .logo-phase-mop .bk-puddle-4 { animation: bk-puddle-fade 0.25s ease-out 1.25s forwards; }
        .logo-phase-mop .bk-puddle-3 { animation: bk-puddle-fade 0.25s ease-out 1.55s forwards; }
        .logo-phase-mop .bk-puddle-2 { animation: bk-puddle-fade 0.25s ease-out 1.85s forwards; }
        .logo-phase-mop .bk-puddle-1 { animation: bk-puddle-fade 0.25s ease-out 2.15s forwards; }

        @keyframes bk-puddle {
          0%   { opacity: 0; }
          100% { opacity: 0.55; }
        }

        @keyframes bk-puddle-fade {
          0%   { opacity: 0.55; }
          100% { opacity: 0; }
        }

        /* Mop \u2014 enters from right, attacks puddle at three spots with angled plunges */
        .bk-mop { opacity: 0; transform: translate(60px, 0) rotate(0deg); transform-box: fill-box; transform-origin: 50% 0%; }
        .logo-phase-mop .bk-mop { animation: bk-mop 2.4s ease-in-out 0.15s forwards; }

        @keyframes bk-mop {
          0%   { opacity: 0; transform: translate(60px, 0) rotate(0deg); }
          8%   { opacity: 1; transform: translate(28px, 0)  rotate(0deg); }

          /* Right attack: two angled plunges */
          16%  { opacity: 1; transform: translate(26px, 2px) rotate(-22deg); }
          22%  { opacity: 1; transform: translate(28px, 0)   rotate(14deg); }
          28%  { opacity: 1; transform: translate(26px, 2px) rotate(-18deg); }

          /* Travel to center */
          35%  { opacity: 1; transform: translate(6px, -1px) rotate(0deg); }

          /* Center attack: two angled plunges */
          43%  { opacity: 1; transform: translate(4px, 2px)  rotate(20deg); }
          50%  { opacity: 1; transform: translate(8px, 0)    rotate(-16deg); }
          57%  { opacity: 1; transform: translate(4px, 2px)  rotate(18deg); }

          /* Travel to left */
          65%  { opacity: 1; transform: translate(-16px, -1px) rotate(0deg); }

          /* Left attack: two angled plunges */
          73%  { opacity: 1; transform: translate(-18px, 2px) rotate(-20deg); }
          80%  { opacity: 1; transform: translate(-14px, 0)   rotate(16deg); }
          87%  { opacity: 1; transform: translate(-18px, 2px) rotate(-14deg); }

          /* Exit left */
          95%  { opacity: 1; transform: translate(-50px, 0)  rotate(0deg); }
          100% { opacity: 0; transform: translate(-70px, 0)  rotate(0deg); }
        }

        /* Refill \u2014 icons drop in from above the rim, sequentially */
        .logo-phase-refill .bk-icon-1 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 0.0s backwards; }
        .logo-phase-refill .bk-icon-2 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 0.4s backwards; }
        .logo-phase-refill .bk-icon-3 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 0.8s backwards; }
        .logo-phase-refill .bk-icon-4 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 1.2s backwards; }
        .logo-phase-refill .bk-icon-5 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 1.6s backwards; }
        .logo-phase-refill .bk-icon-6 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 2.0s backwards; }

        @keyframes bk-settle {
          0%   { opacity: 0; transform: translateY(-70px) scale(1); }
          70%  { opacity: 1; transform: translateY(2px) scale(1); }
          100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Bandages \u2014 slide in from the left during the bandage phase, form an X */
        .bk-bandaid { opacity: 0; transform-box: fill-box; transform-origin: center; }

        /* Final resting state, visible whenever patched */
        .bk-patched.logo-phase-full   .bk-bandaid-1,
        .bk-patched.logo-phase-refill .bk-bandaid-1 { opacity: 1; transform: translateX(0) rotate(45deg); }
        .bk-patched.logo-phase-full   .bk-bandaid-2,
        .bk-patched.logo-phase-refill .bk-bandaid-2 { opacity: 1; transform: translateX(0) rotate(-45deg); }

        /* Bandage phase: slide in sequentially from the left */
        .bk-patched.logo-phase-bandage .bk-bandaid-1 {
          animation: bk-bandaid-in-1 0.5s cubic-bezier(.34,1.3,.64,1) 0.15s forwards;
        }
        .bk-patched.logo-phase-bandage .bk-bandaid-2 {
          animation: bk-bandaid-in-2 0.5s cubic-bezier(.34,1.3,.64,1) 0.65s forwards;
        }

        @keyframes bk-bandaid-in-1 {
          0%   { opacity: 0; transform: translateX(-50px) rotate(45deg); }
          70%  { opacity: 1; transform: translateX(3px)   rotate(45deg); }
          100% { opacity: 1; transform: translateX(0)     rotate(45deg); }
        }
        @keyframes bk-bandaid-in-2 {
          0%   { opacity: 0; transform: translateX(-50px) rotate(-45deg); }
          70%  { opacity: 1; transform: translateX(3px)   rotate(-45deg); }

ion-prefix scan pre-detects collisions (and intra-batch duplicate target keys); a colliding object is skipped with both source and destination left untouched. Skips are surfaced in the move panel (src/components/MoveQueue.jsx) distinctly from genuine failures. If a copy succeeds but the source delete is denied, the object now exists in both places \u2014 this is reported as a distinct error and the source is left in place (never auto-deleted).","**Cross-provider** \u2014 server-side copy is permitted by the existing CORS template (PUT + x-amz-copy-source via the x-amz-* rule) on all supported providers; no CORS change is needed. Move is gated on both write (upload) and delete capabilities.","**Key remapping** (src/lib/move-key.js) preserves a moved folder's own name and nested sub-prefix structure under the destination, including the 0-byte folder-marker object."]},{version:"1.24.0",date:"2026-06-18",title:"Duplicate detection: durable results + scrollable report",changes:['**Durable scan results** \u2014 a scan is no longer discarded when the report closes. Results are persisted per (endpoint, bucket) in a new IndexedDB store (bucketer_dedup_scans; DB schema bumped v2 \u2192 v3) and **restored on reopen**, so a large scan never has to be repeated. Keeper choices and byte-for-byte verifications are saved as they are made (transient progress flags are stripped, so a reload never shows a stuck spinner). The report shows a "Last scan: \u2026 \xB7 N objects \xB7 timestamp \xB7 restored from cache" line with **Re-scan** and **Clear saved** controls. Persistence is best-effort: when IndexedDB is unavailable it degrades to a no-op rather than failing the scan. New module src/lib/dedup-scan-store.js.',"**Scrollable, wider report** \u2014 the duplicates dialog is now min(94vw, 920px) wide and height-capped at 88vh, with the match list scrolling inside the dialog instead of overflowing the viewport. Long keys/paths wrap rather than truncating.","**Test infrastructure** \u2014 test/helpers/with-dom.js now installs a non-recursive performance.now(). jsdom's own performance.now() recurses into itself once installed as the global performance, overflowing the stack under an async component re-render; this removes that long-standing hazard and unblocks async component tests."]},{version:"1.23.0",date:"2026-06-17",title:"Duplicate detection (iteration 1: scan + verify, read-only)",changes:["**Tiered, provider-agnostic detection** (src/lib/dedup-scan.js) \u2014 narrows candidates cheaply: free size grouping \u2192 one HeadObject per same-size object (deriving a trusted single-part ETag-MD5, our content-hash stamp, and the multipart/encryption flags) \u2192 an opportunistic, **AWS-only** GetObjectAttributes checksum adapter. The engine only ever lists and HEADs; it never mutates an object.","**Byte-for-byte verification is the only deletion gate** (src/lib/verify-bytes.js). No hash decides identity: MD5 and SHA-1 are broken for collision resistance and even SHA-256 is a hash, so matches are shown as **candidates** and a streaming byte-for-byte comparison (immune to any hash collision, low memory, early-abort) is what promotes a group to **verified**.","**Content-hash stamp on upload** \u2014 every upload now records x-amz-meta-bucketer-content-hash with a self-describing value (sha256-ht64k:<hex>, the existing head/tail sample) as a cheap candidate filter for future scans. The hash is computed once and reused for the multipart resume record. Works on every provider, including those that expose no usable server-side checksum.","**Strict, fail-loud provider adapter** (src/lib/provider-checksum.js) \u2014 accepts a provider checksum only in an exact full-object shape, falls back to the universal tiers otherwise, and console.warns genuinely unexpected shapes so they can be reported and the adapter refined from real data. Other providers get an adapter only once probe output confirms one.","**Report UI** (src/components/DuplicatesModal.jsx) \u2014 candidate/verified badges, per-group keep-selection (default: oldest copy), and read-only per-object download/preview/copy-link. **Delete others** and **Move others** render as disabled stubs in this iteration."]},{version:"1.22.4",date:"2026-06-16",title:"Fix: upload completion no longer resets browser to root (BUG-029)",changes:[]},{version:"1.22.3",date:"2026-06-14",title:"Chore: reconcile package-lock.json version",changes:[]},{version:"1.22.2",date:"2026-06-14",title:"Internal: extract ConfirmDialog from StorageModal",changes:[]},{version:"1.22.1",date:"2026-06-13",title:"Move integrity check pre-auth into the version modal",changes:[]},{version:"1.22.0",date:"2026-06-13",title:"Build integrity check (honest-host)",changes:["**Honest framing** \u2014 the match/mismatch UI explicitly states that this proves the host is serving the canonical artifact, not that the running JavaScript was not modified. A malicious host could rewrite both.","**Build pipeline** \u2014 build.mjs now emits dist/integrity.json alongside dist/index.html (sha256 in an extensible hashes object \u2014 sha512/blake3 can be added later without a schema migration).","**Release pipeline** \u2014 scripts/release.mjs uploads the manifest to the same GitLab Generic Package Registry path as the HTML and lists it among the Release assets.","**CI reproducibility guard** \u2014 .gitlab-ci.yml gains a reproducibility stage that builds twice and diffs both index.html and integrity.json. The release job now depends on this stage. Catches any future regression that leaks nondeterminism into the build.","**Result states** \u2014 match (green), mismatch (red with both hashes), no-manifest (yellow, for versions predating this feature), unknown-algorithm (yellow), network error (yellow).","Default off \u2014 enabling the toggle is the only thing that triggers any network call to GitLab."]},{version:"1.21.1",date:"2026-06-12",title:"Fix custom metadata invisible in browser (BUG-028)",changes:[]},{version:"1.21.0",date:"2026-06-12",title:"File modification time tracking",changes:[]},{version:"1.20.0",date:"2026-06-11",title:"In-page preview on download links",changes:["**PreviewMedia component** (src/components/PreviewMedia.jsx) \u2014 shared renderer for image, audio, video, PDF, and text kinds; replaces the equivalent inline JSX in Browser.","**DownloadPage preview** \u2014 detects the file type from the extension and renders the appropriate preview element using the presigned URL as the source directly. Text files are fetched in a useEffect (range-limited to 100 KB, same as the browser preview).","**Browser refactor** \u2014 preview rendering in Browser.jsx now delegates to PreviewMedia with no behaviour change."]},{version:"1.19.0",date:"2026-06-11",title:"Presigned URL sharing",changes:["**Share via Bucketer** button in the file copy-link popover (single-file only; preset durations: 1 h, 24 h, 7 d).","**DownloadPage** \u2014 recipients open the link in Bucketer and see a clean download card showing the file name, expiry countdown, and a Download button. No S3 credentials required.",'**Expired link handling** \u2014 if the presigned URL has passed its expiry, the download button is replaced with an "This link has expired" notice.',"**base64url encoding** \u2014 synchronous, universally supported (including Safari), no compression API required."]},{version:"1.18.0",date:"2026-06-11",title:"Adaptive upload concurrency",changes:["**Adaptive/Manual toggle** in Settings (adaptive is the default). In adaptive mode the part and file concurrency sliders are hidden.","**Sort-by-size**: files in a batch are enqueued smallest-first so small files complete quickly and part concurrency scales up sooner for large files.","**Budget rebalancer**: as active uploads drop, partsPerFile scales up automatically (4 files \u2192 4 parts/file, 2 files \u2192 8 parts/file, 1 file \u2192 16 parts/file), keeping total in-flight streams near 16.","**Per-file probe** (files \u2265 100 MB): uploads one warm-up part then times a baseline and candidate (+4) concurrency phase; holds the faster result for the rest of the file. Inconclusive probes (measurement < 10 ms) fall back to baseline.","**Memory cap**: part concurrency is clamped so total ArrayBuffer usage across all concurrent files stays within 200 MiB, preventing tab crashes on very large files where calcPartSize raises the part size beyond 5 MiB.","**Strategy column** in Upload history showing mode, peak part concurrency, and probe outcome per file.","**Console debug output** via localStorage.setItem('s3b_debug_concurrency', '1'): logs rebalance events (only when partsPerFile changes) and per-file file-complete summaries with speed and probe results.","New pure module src/lib/concurrency-strategy.js (calcAdaptiveConcurrency, createProbeState, resolveProbe, capConcurrencyByMemory) \u2014 fully unit-tested."]},{version:"1.17.0",date:"2026-06-08",title:"Component decomposition: extract sub-components from UploadQueue and Browser",changes:["BatchSummary.jsx, UploadItem.jsx, ErrorDetailsPanel.jsx \u2014 from UploadQueue.jsx (1053L \u2192 697L)","CopyLinkPopover.jsx, Breadcrumb.jsx, SortTh.jsx \u2014 from Browser.jsx (1130L \u2192 1015L)"]},{version:"1.16.0",date:"2026-06-08",title:"Code simplification: shared utilities, deduplication, indexeddb split",changes:["**lib/constants.js**: centralises MULTIPART_THRESHOLD, LARGE_FILE_WARN, PRESIGN_EXPIRES, TEXT_PREVIEW_LIMIT, COPY_LINK_PRESETS, and concurrency defaults previously scattered across UploadQueue.jsx and Browser.jsx. One place to change a threshold.","**lib/upload-status.js**: isActive / isFailed / isSettled / isPaused / isDone / isAborted predicate functions, replacing inline i.status === 'uploading' || i.status === 'resuming' || ... chains duplicated 4+ times in UploadQueue.jsx.","**lib/upload-cleanup.js**: abortMultipartSession(client, params) \u2014 abort + deleteResumeRecord were copy-pasted in three best-effort cleanup paths; now a single tested helper with a doc comment explaining which callers must stay inline (those that surface errors to the UI).","**lib/sort.js**: nameComparator / numericComparator factories extracted from Browser.jsx. Locale-comparison options (sensitivity: 'base') defined in one place.","**lib/validate-object-name.js**: shared validation (non-empty, no slashes) for both rename and folder-create; rules cannot silently diverge between the two callers.","**lib/purge-versions.js**: purgeAllVersions() and collectHiddenVersions() extracted from HiddenVersions.jsx. The 57-line async pagination + batched DeleteObjectsCommand loop is now independently testable with a mock S3 client (6 new tests).","**lib/indexeddb.js \u2192 barrel over four focused modules**: indexeddb-core.js (shared openDB, schema constants), resume-records.js, file-identity.js, active-uploads.js, upload-log.js. Each module owns one concern; the barrel preserves all existing import paths.","**lib/storage.js factory refactor**: 8 near-identical load<Setting> / save<Setting> function pairs collapsed into a makeSettingAccessors() factory. All exported function names are identical \u2014 callers are unchanged.",`**hooks/useDoubleClickSafety.js**: the "prime for 3 s, confirm on second click" timer pattern was duplicated between the main UploadQueue cancel-all button and BatchSummary's per-batch cancel button. Extracted as a hook + pure applyClickSafety() function (tested with injected timer stubs).`,"**hooks/useInterpolatedProgress.js**: rAF byte-counter animation extracted from UploadItem. Pure interpolateBytes() function tested separately from the Preact hook.","**hooks/useWindowDragDrop.js**: ~60 lines of dragenter / dragleave / dragover event listener setup, counter management, and the handleWindowDrop file-entry resolver extracted from App.jsx.","**hooks/useModalStates.js**: App-level changelog / about / storage modal open-state grouped so new modals have a canonical home.","**UploadQueue.jsx** (\u221275 lines): uses useDoubleClickSafety, useInterpolatedProgress, status predicates, abortMultipartSession, and constants. ErrorDetailsPanel extracted as a named sub-component. MultipartFailureConsequence moved to its own file (components/MultipartFailureConsequence.jsx) since it has no dependency on UploadQueue state.","**Browser.jsx** (\u221271 lines): CopyLinkPopover and BatchCopyLinkPopover merged into one parameterised component \u2014 fileKey for single, fileKeys for batch. Uses nameComparator / numericComparator, validateObjectName, and constants.","**App.jsx** (\u221267 lines): dead statusLabel variable removed (declared but never read). Drag-drop logic extracted to useWindowDragDrop; modal open-state extracted to useModalStates.","**HiddenVersions.jsx** (\u221241 lines): delegates purge to purgeAllVersions(); uses collectHiddenVersions.","**StorageModal.jsx**: internal Confirm sub-component renamed ConfirmDialog for clarity."]},{version:"1.15.6",date:"2026-06-07",title:"Credential form and profile management bug fixes",changes:['**Region inference restored for loaded profiles (BUG-026)**: loading a saved profile silently marked the region as "user-edited" regardless of whether its stored value matched what the endpoint would give. The _initExtractedRegion IIFE bailed out early when initial.regionOverride was set, making the comparison against the extracted value impossible. Removed the early bail; now the stored region is compared to the extracted one and treated as inferred (allowing endpoint changes to update it) when they match. The "Auto-filled from endpoint URL" hint also reappears for profile-loaded regions that are endpoint-derived.',"**Post-disconnect form repopulated from selected profile (BUG-027)**: disconnecting cleared credentials to all-empty but left selectedProfileId pointing to the last profile, leaving the splash screen with a highlighted profile row and a blank form. Clicking the row was a no-op (same key, no CredentialForm remount). handleDisconnect now repopulates credentials and liveFormData from the selected profile minus the secret key, so the user only needs to re-enter the secret key to reconnect.",'**Default profile name now includes provider (Issue 3)**: defaultName in ProfilePicker read formData.provider, which is absent when liveFormData comes from live form edits (those carry providerOverride instead). Now resolves providerOverride || provider || detectProvider(endpoint) so the suggested name reflects what the form shows \u2014 "B2 \u2014 my-bucket" instead of just "my-bucket".','**Profile delete requires confirmation (Issue 4)**: clicking \u2715 on a profile row previously deleted it immediately with no undo. Now shows an inline "Delete? [Confirm] [Cancel]" confirmation in the row; the Confirm button is styled in danger-red. Clicking the row itself also dismisses the confirmation without selecting the profile.']},{version:"1.15.5",date:"2026-06-07",title:"Bidirectional endpoint\u2194region inference in credential form",changes:['**Region auto-filled from endpoint**: the region field is now always visible and is automatically populated when the endpoint URL embeds a region (B2, Wasabi, AWS, DO Spaces). Previously the extracted region was only shown as a sidebar hint; now it appears as an editable value with an "Auto-filled from endpoint URL" indicator.',`**Endpoint auto-filled from provider + region**: selecting a provider from the override dropdown and typing a region constructs and auto-fills the canonical endpoint URL ("Auto-filled from provider and region"). Provider-specific exceptions are handled: Wasabi's us-east-1 produces https://s3.wasabisys.com (bare legacy hostname) rather than the na\xEFve template. R2 auto-fills the region with 'auto' (endpoint requires account ID and cannot be constructed). MinIO and Generic providers do not infer endpoints.`,"**Endpoint patterns verified against official docs** (all fetched 2026-06-04/07): B2 via backblaze.com/docs, Wasabi via docs.wasabi.com, AWS via docs.aws.amazon.com/general, DO Spaces via docs.digitalocean.com, R2 via developers.cloudflare.com.","**Circular update prevention**: a userEditedRef ensures inference only flows from user-typed fields into fields the user has not yet touched. Editing an auto-filled field marks it as user-owned and stops inference from overwriting it."]},{version:"1.15.4",date:"2026-06-06",title:"Profile reliability: provider inference, update-in-place, reload consistency, hint labels",changes:[`**Provider override no longer carries over from auto-detection**: CredentialForm previously initialized the provider-override dropdown from the stored/detected provider, so switching a form pre-filled with B2 credentials to a Wasabi endpoint would silently submit provider: 'b2'. The dropdown now only pre-selects a value when it genuinely differs from what detectProvider would return for the current endpoint \u2014 i.e., only for real overrides (MinIO on a generic URL, a reverse proxy, etc.). Auto-detected providers always start at "Auto-detect from endpoint".`,`**Profile save updates in place**: "Save current as profile\u2026" previously always created a new profile (id: Date.now()), making it impossible to update an existing one. When a profile is currently selected, the button now reads "Update profile\u2026" and saves with the existing profile's id, replacing it rather than duplicating it. The name input pre-fills with the profile's current name.`,"**Reload prefers flat credentials over profile data**: on page load, the app previously always loaded the last-selected profile's data, which overwrote credentials saved by a manually-entered connection that was never saved as a profile. Flat credentials (written on every handleConnect) are now used when present; the profile is used only as a fallback when flat credentials are absent (i.e. after a disconnect or first load).",'**Profile list hint shows full provider names**: the hint line under each profile name now uses PROVIDER_LABELS ("Backblaze B2 \xB7 bucket") instead of the raw key uppercased ("B2 \xB7 bucket").']},{version:"1.15.3",date:"2026-06-06",title:"Upload UI cleanup: hide when denied, drop zone removed, empty-state hint",changes:["**Upload UI hidden when denied**: entire upload section (destination folder, file/folder picker buttons) is now hidden when capabilities.upload === 'denied' rather than shown in a disabled/greyed state. When unknown or permitted, everything shows as before.",'**Dedicated drop zone removed**: the "Drop files or folders here" element in UploadQueue is gone. The window-wide overlay (v1.15.2) covers the same surface area; the zone was redundant. handleDrop and dragOver state removed from UploadQueue.','**Empty-state hint**: when the queue is empty and upload is available, a line reads "Drag files or folders anywhere in this window to upload, or use the buttons above." \u2014 the first-use teaching moment.',"**Window overlay respects upload capability**: the document dragenter listener and the overlay render are both gated on capabilities.upload !== 'denied'.","**Error handling on detached drops**: .catch(() => {}) added to the collectFileEntries().then() chains in handleWindowDrop (App.jsx) and handleTableDrop (Browser.jsx) to prevent silent promise rejections."]},{version:"1.15.2",date:"2026-06-05",title:"Window-wide drag-and-drop overlay",changes:["**Drop anywhere on the window to upload**: document-level dragenter/dragleave/dragover listeners in App.jsx activate a full-screen fixed overlay (z-index 500, below modals at 1000) whenever files are dragged over the viewport while connected.","**Modal suppression**: dragenter checks document.querySelector('.modal-overlay') \u2014 the overlay is not activated while any modal is open.","**Overlay captures the drop**: ondrop on the overlay fires collectFileEntries as a detached .then(), routing files to the same addFilesRef destination as all other drop paths.","**Existing zone-specific handlers unchanged**: Browser table drop and UploadQueue upload-zone drop continue to work as before; the window overlay is the primary path when connected."]},{version:"1.15.1",date:"2026-06-05",title:"Synchronous drop capture, parallel folder traversal, pending-drop indicator",changes:["**Drop handlers are now synchronous** (handleTableDrop in Browser.jsx, handleDrop in UploadQueue.jsx): FileSystemEntry objects are captured synchronously before any await, then collectFileEntries fires as a detached .then(). The handler returns immediately so rapid consecutive drops are captured right away rather than waiting for the previous traversal to complete.","**Parallel top-level traversal in collectFileEntries**: changed for\u2026await over root entries to Promise.all, so independent folder subtrees are walked concurrently rather than one at a time.",'**Pending-drop indicator in UploadQueue**: while folder traversal is running a pendingDrops counter drives a "Counting files in N folders\u2026" message beneath the drop zone, giving the user immediate feedback that the drop was accepted.']},{version:"1.15.0",date:"2026-06-05",title:"Refactor + accessibility: usePreview hook, cancellation guard, htmlFor labels, progress ARIA",changes:["**T4-1** Extract all preview state, handlePreview, and closePreview into src/lib/usePreview.js; Browser.jsx now consumes the hook","**T4-2** Add gen-ref cancellation guard to handlePreview \u2014 every await is followed by if (gen !== genRef.current) return to drop stale async callbacks when the user opens a new preview","**T4-6** Add htmlFor + id to all standalone <label> elements in CredentialForm.jsx (6) and SettingsPanel.jsx (7) \u2014 screen readers and click-to-focus now work correctly",'**T5-9** Add role="progressbar" + aria-valuenow/min/max + aria-label to progress bar elements in UploadQueue.jsx \u2014 upload progress is now exposed to the accessibility tree']},{version:"1.14.4",date:"2026-06-04",title:"Quality batch: concurrency cap, format guards, build invariants, provider accuracy, UI polish",changes:["**T4-3** Cap discoverPrefixKeys concurrency at 8 with worker-pool; removes bare Promise.all(prefixes.map) that could throttle on large folder-delete operations","**T4-4** Guard formatBytes against null/undefined/NaN/negative/Infinity \u2014 all return '\u2014' instead of crashing",'**T4-5** Remove stale "No delete, rename, copy" and "N=2 concurrency" claims from docs/QUESTIONS.md',"**T5-1** Add build test: production bundle must have no source map comments (regression guard)","**T5-2** Add build invariant: dist/index.html must not exceed 600 KB ceiling","**T5-3** Export shellQuote from cors-config.js; use in corsCmd() to prevent shell injection from bucket/endpoint names",'**T5-4** Add <meta http-equiv="Content-Security-Policy"> to src/index.html for S3/R2/B2 static-hosting deployments',"**T5-5** Replace module-level let _sessionFirstMount in Browser.jsx with isFirstMount prop derived from browserKey === 0 in App.jsx",'**T5-6** Distinguish empty-bucket copy ("This bucket is empty. Upload files to get started.") from empty-prefix copy',"**T5-7** Show filename in delete confirmation modal for single-file deletes","**T5-8** Add inline hint to CapabilityPanel explaining permissions are detected automatically","**T5-11** Add dotted-bucket SSL caveat to Wasabi SetupGuide step","**T5-12** Correct requiresPathStyle comment \u2014 B2 supports both styles; we use path-style because users supply a plain endpoint","**T5-13** Correct defaultMaxKeys comment \u2014 B2 Class C is not billed per call; 200 is a UX latency choice","**T5-14** Map Wasabi legacy alias region slugs (nl-1\u2192eu-central-1, de-1\u2192eu-central-2, uk-1\u2192eu-west-1, fr-1\u2192eu-west-2, uk-2\u2192eu-west-3, it-1\u2192eu-south-1) to canonical SigV4 names to prevent signing failures"]},{version:"1.14.3",date:"2026-06-04",title:"Provider-specific fixes: Wasabi billing warnings, R2 versioning gate, AWS region patterns, SetupGuide improvements",changes:["**T3-1:** Delete confirmation dialogs now show a Wasabi-specific 90-day minimum retention warning when provider === 'wasabi' \u2014 both DeleteQueue (file/folder delete) and HiddenVersions purge-all confirmation. Prevents silent billing surprises for deleted test data.",'**T3-2:** HiddenVersions now accepts a provider prop (threaded from Browser). Cloudflare R2 buckets render a "versioning not supported" message instead of a confusing empty panel, because R2 does not implement ListObjectVersions.',"**T3-3:** extractRegion() for AWS S3 now handles virtual-hosted bucket URLs (bucket.s3.region.amazonaws.com), dualstack endpoints (s3.dualstack.region.amazonaws.com), FIPS endpoints (s3-fips.region.amazonaws.com), and legacy dash-style endpoints (s3-region.amazonaws.com). Pasting a URL from the AWS Console no longer silently falls back to us-east-1.","**T3-4:** GuideMinIO in SetupGuide now includes an explicit mixed-content warning: browsers block HTTP requests from an HTTPS-served Bucketer to an HTTP MinIO server, and the error only appears in DevTools.","**T3-5:** GuideB2 now mentions that application keys must have the listAllBucketNames capability \u2014 a single-bucket key without it causes AWS SDK v3 initialisation to fail entirely.","**T3-6:** GuideR2 now tells users where to find their Account ID (dashboard sidebar), that a payment method is required even on the free tier, and the difference between account-scoped and bucket-scoped token scope."]},{version:"1.14.2",date:"2026-06-04",title:"Correctness and security fixes: settings preservation, resume parallelism, purge-all error recovery, endpoint URL guard, CSP docs",changes:["**T2-1:** clearCredentials() now only removes credential fields (endpoint, bucket, keyId, provider, regionOverride). Settings keys (partSize, concurrency, etc.) survive disconnect \u2014 split LS_KEYS into CREDENTIAL_KEYS and SETTINGS_KEYS; resetSettings() now uses the canonical SETTINGS_KEYS set.","**T2-2:** Multipart resume path now uses the same uploadPartsWithPool worker pool as fresh uploads, matching the configured PART_CONCURRENCY. Extracted helper exported from src/lib/upload-queue.js with unit tests asserting concurrency.","**T2-3:** HiddenVersions.handlePurgeAllConfirm now continues through all batches on S3 Errors entries instead of throwing on the first \u2014 reports aggregate failure count in the dialog rather than abandoning remaining batches silently.","**T2-4:** readUrlParams() now validates the endpoint parameter (must be a parseable http: or https: URL) and the bucket parameter (no slashes or .. traversal sequences). Prevents crafted share links from pre-filling the credential form with attacker-controlled values.","**T2-5:** Fixed README.md nginx and Caddy CSP examples to include img-src data: https:; media-src https:; frame-src https:;. Previous img-src data: only directive silently blocked all presigned S3 preview URLs. Added note about unsafe-inline being structurally required and a future hash-based alternative.","**T2-6:** handleDeleteConfirm in App.jsx now wraps runDeleteOperation in try/catch. An uncaught throw previously left the delete panel stuck in discovering or deleting phase indefinitely with no dismiss path."]},{version:"1.14.1",date:"2026-06-04",title:"Fix rename: add missing DeleteObjectCommand import; add Command import invariant",changes:["**Bug fix (T1-1):** Browser.jsx was missing DeleteObjectCommand from its @aws-sdk/client-s3 import. Every rename threw ReferenceError after the copy step succeeded, leaving a duplicate file. Lost during the v1.14.0 unified-delete refactor.","**Test invariant (T1-2):** Added source-level assertion to test/source-invariants.test.js that scans every src/ file importing from @aws-sdk/client-s3 and asserts every new XCommand() usage has a matching named import. Prevents this class of bug from silently shipping again."]},{version:"1.14.0",date:"2026-06-03",title:"Unified delete, preview prefetch, collapsible upload queue, global queue actions",changes:[{group:"Unified delete workflow",items:["Replaced three separate delete code paths (single-file, multi-file, multi-folder) with a single unified flow","All delete requests \u2014 one file, many files, one folder, many folders, or any mix \u2014 go through the same confirm \u2192 discover \u2192 delete \u2192 done pipeline","Folder checkboxes added to the file listing; select-all now covers both files and folders",'Batch bar counts files and folders separately ("X files, Y folders selected")',"Non-blocking execution: the confirm modal starts the operation then dismisses; progress appears in a panel in App.jsx that survives folder navigation (same pattern as UploadQueue)","Each delete operation shows spinner during discover/delete phases, \u2713 on clean completion (auto-dismisses after 3 s), \u2715 with expandable error detail on failure","Delete batches run at CONCURRENCY=8 (up from 3) with exponential-backoff retry on 503/429/SlowDown throttling responses",'Fixed: selection bar ("X files, Y folders selected") now clears as items are removed from the listing after a successful delete',"src/lib/delete-queue.js \u2014 new execution module","src/components/DeleteQueue.jsx \u2014 new UI component: confirm modal overlay + collapsible progress entries"]},{group:"Preview signed-URL cache",items:["Signed URLs for previewed items are cached for 55 minutes (5-minute buffer before the 1-hour expiry); re-opening the same file within that window skips the HeadObject and URL-signing round-trip entirely and lets the browser serve the image from its own HTTP cache","Cache is cleared on folder navigation to prevent unbounded growth"]},{group:"Preview prefetch",items:["After the current preview item loads, the next and previous items are prefetched in the background so navigation feels instant",'Level 1 (all previewable types): HeadObject + signed URL generated and cached \u2014 eliminates the "thinking" delay on navigation',"Level 2 (images and text): image content downloaded via a hidden Image element if within the configured size limit; text fetched via the existing range request and stored in the cache so navigation requires zero network activity","Audio, video, and PDF: Level 1 only \u2014 URL cached, no content download",'New setting "Preview prefetch" in Settings: Off / 1 MB / 5 MB (default) / 10 MB / 25 MB \u2014 takes effect immediately without a page reload']},{group:"Small image preview",items:["Images smaller than 128\xD7128 px now fill the preview container (object-fit: contain at 100% width/height) so they are no longer uselessly tiny","Images detected as pixel art (natural size < 128\xD7128) get image-rendering: pixelated so they scale up crisply without blurring"]},{group:"Collapsible upload queue",items:["Each batch of dropped/selected files is now a collapsible row in the upload panel, independent of other batches",'Batches with few files start expanded; larger batches start collapsed \u2014 configurable via new "Upload queue expand threshold" setting in Settings (default: 5)',"Collapsed view shows a one-liner summary (file count, progress, speed, ETA)","Batches auto-collapse 3 seconds after all files complete","A Dismiss button appears once a batch is fully settled (no active or queued items); removes it from the panel","Cancel button is now per-batch rather than clearing the entire queue",'Desktop notifications changed from per-file to one summary notification per batch when it settles ("3 files uploaded", "2 uploaded \xB7 1 failed", etc.)']},{group:"Global queue actions bar",items:["A compact action bar appears above the batch list when multiple batches are present or when actions span batches",'"Dismiss all done" \u2014 removes all settled batches in one click (shown when 2+ batches are fully settled)','"Retry all failed" \u2014 re-queues every failed item across all batches (shown when any item has error status)','"Cancel all" \u2014 cancels all active and queued batches; uses the same two-click confirm pattern as per-batch cancel (shown when any upload is active or queued)','"Collapse all" / "Expand all" \u2014 toggle visibility of all batch rows at once (shown when 2+ batches exist with at least 2 in the same state)']},{group:"Upload speed display improvements",items:["Batch transfer rate now uses a rolling 6-second derivative of confirmed bytes rather than summing per-item speeds; small files (single PutObject, no progress events) contribute the same as large files (continuous multipart updates), so the rate is accurate and uniform regardless of file size",'Completed items in the per-file list now show their measured average upload speed ("\u2713 Complete \xB7 2.1 MB/s"), giving a consistent display between in-progress large files and finished small files']},{group:"Browser extension upload blocking detection",items:['Uploads blocked by ad/content blockers (uBlock Origin, etc.) now show an actionable warning rather than a cryptic network error: "Request may have been blocked by a browser extension" with guidance to disable the extension for the page or allowlist the destination domain','Detection covers all three browsers: Firefox ("NetworkError when attempting to fetch resource"), Chrome ("Failed to fetch"), Safari ("Load failed"); correctly ignored when an HTTP response was received (genuine server errors are unaffected)']},{group:"Failed upload visibility",items:["Batches containing failed items now show a red left accent border, making them immediately scannable across a long queue without expanding anything","Failed items float to the top of their batch's expanded list so they are visible without scrolling",'Batches are force-expanded the first time an error appears, so failures are never hidden behind a collapsed "Show" button']},{group:"In-app changelog grouping",items:["The changelog modal now renders a second level of hierarchy: **Bold section headers** in CHANGELOG.md become labelled groups with their items nested beneath them; entries without headers render as a flat list as before
