        .bk-icon-inner { transform-box: fill-box; transform-origin: center; }

        /* Per-icon vectors pointing from each icon's center to the hole at (24, 87).
           Values are in the icon's local (rotated) coordinate space so the icon
           lands on the hole in world space despite its parent rotation. */
        .bk-icon-1 .bk-icon-inner { --tx: -11px; --ty: 31px; }
        .bk-icon-2 .bk-icon-inner { --tx: -34px; --ty: 42px; }
        .bk-icon-3 .bk-icon-inner { --tx: -20px; --ty: 17px; }
        .bk-icon-4 .bk-icon-inner { --tx:  -6px; --ty:  7px; }
        .bk-icon-5 .bk-icon-inner { --tx: -43px; --ty:  7px; }
        .bk-icon-6 .bk-icon-inner { --tx: -29px; --ty:  0px; }

        /* Hole \u2014 visible during leak, mop, bandage; hidden during refill + full */
        .bk-hole { opacity: 0; transition: opacity 0.3s; }
        .logo-phase-leak    .bk-hole,
        .logo-phase-mop     .bk-hole,
        .logo-phase-bandage .bk-hole { opacity: 1; }

        /* Drip animation \u2014 6 staggered drips during leak */
        .bk-drip { opacity: 0; }
        .logo-phase-leak .bk-drip-1 { animation: bk-drip 0.6s ease-in 0.5s forwards; }
        .logo-phase-leak .bk-drip-2 { animation: bk-drip 0.6s ease-in 1.3s forwards; }
        .logo-phase-leak .bk-drip-3 { animation: bk-drip 0.6s ease-in 2.1s forwards; }
        .logo-phase-leak .bk-drip-4 { animation: bk-drip 0.6s ease-in 2.9s forwards; }
        .logo-phase-leak .bk-drip-5 { animation: bk-drip 0.6s ease-in 3.7s forwards; }
        .logo-phase-leak .bk-drip-6 { animation: bk-drip 0.6s ease-in 4.5s forwards; }

        @keyframes bk-drip {
          0%   { opacity: 1; transform: translateY(0); }
          85%  { opacity: 1; transform: translateY(28px); }
          100% { opacity: 0; transform: translateY(30px); }
        }

        /* Icons \u2014 drain (shrink + fade) sequentially during leak */
        .logo-phase-leak .bk-icon-1 .bk-icon-inner { animation: bk-drain 0.85s ease-in 0.2s forwards; }
        .logo-phase-leak .bk-icon-2 .bk-icon-inner { animation: bk-drain 0.85s ease-in 1.0s forwards; }
        .logo-phase-leak .bk-icon-3 .bk-icon-inner { animation: bk-drain 0.85s ease-in 1.8s forwards; }
        .logo-phase-leak .bk-icon-4 .bk-icon-inner { animation: bk-drain 0.85s ease-in 2.6s forwards; }
        .logo-phase-leak .bk-icon-5 .bk-icon-inner { animation: bk-drain 0.85s ease-in 3.4s forwards; }
        .logo-phase-leak .bk-icon-6 .bk-icon-inner { animation: bk-drain 0.85s ease-in 4.2s forwards; }

        /* During mop and bandage, icons stay hidden */
        .logo-phase-mop     .bk-icon-inner,
        .logo-phase-bandage .bk-icon-inner { opacity: 0; transform: scale(0); }

        @keyframes bk-drain {
          0%   { opacity: 1; transform: translate(0, 0) scale(1); }
          70%  { opacity: 1; transform: translate(calc(var(--tx) * 0.85), calc(var(--ty) * 0.85)) scale(0.65); }
          100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.05); }
        }

        /* Puddle \u2014 6 stacked ellipses, each fades in as a drip lands */
        .bk-puddle { opacity: 0; }
        .logo-phase-leak .bk-puddle-1 { animation: bk-puddle 0.3s ease-out 1.0s forwards; }
        .logo-phase-leak .bk-puddle-2 { animation: bk-puddle 0.3s ease-out 1.8s forwards; }
        .logo-phase-leak .bk-puddle-3 { animation: bk-puddle 0.3s ease-out 2.6s forwards; }
        .logo-phase-leak .bk-puddle-4 { animation: bk-puddle 0.3s ease-out 3.4s forwards; }
        .logo-phase-leak .bk-puddle-5 { animation: bk-puddle 0.3s ease-out 4.2s forwards; }
        .logo-phase-leak .bk-puddle-6 { animation: bk-puddle 0.3s ease-out 5.0s forwards; }

        /* During mop, each puddle ring fades out timed to a mop plunge */
        .logo-phase-mop .bk-puddle { opacity: 0.55; }
        .logo-phase-mop .bk-puddle-6 { animation: bk-puddle-fade 0.25s ease-out 0.55s forwards; }
        .logo-phase-mop .bk-puddle-5 { animation: bk-puddle-fade 0.25s ease-out 0.85s forwards; }
        .logo-phase-mop .bk-puddle-4 { animation: bk-puddle-fade 0.25s ease-out 1.25s forwards; }
        .logo-phase-mop .bk-puddle-3 { animation: bk-puddle-fade 0.25s ease-out 1.55s forwards; }
        .logo-phase-mop .bk-puddle-2 { animation: bk-puddle-fade 0.25s ease-out 1.85s forwards; }
        .logo-phase-mop .bk-puddle-1 { animation: bk-puddle-fade 0.25s ease-out 2.15s forwards; }

        @keyframes bk-puddle {
          0%   { opacity: 0; }
          100% { opacity: 0.55; }
        }

        @keyframes bk-puddle-fade {
          0%   { opacity: 0.55; }
          100% { opacity: 0; }
        }

        /* Mop \u2014 enters from right, attacks puddle at three spots with angled plunges */
        .bk-mop { opacity: 0; transform: translate(60px, 0) rotate(0deg); transform-box: fill-box; transform-origin: 50% 0%; }
        .logo-phase-mop .bk-mop { animation: bk-mop 2.4s ease-in-out 0.15s forwards; }

        @keyframes bk-mop {
          0%   { opacity: 0; transform: translate(60px, 0) rotate(0deg); }
          8%   { opacity: 1; transform: translate(28px, 0)  rotate(0deg); }

          /* Right attack: two angled plunges */
          16%  { opacity: 1; transform: translate(26px, 2px) rotate(-22deg); }
          22%  { opacity: 1; transform: translate(28px, 0)   rotate(14deg); }
          28%  { opacity: 1; transform: translate(26px, 2px) rotate(-18deg); }

          /* Travel to center */
          35%  { opacity: 1; transform: translate(6px, -1px) rotate(0deg); }

          /* Center attack: two angled plunges */
          43%  { opacity: 1; transform: translate(4px, 2px)  rotate(20deg); }
          50%  { opacity: 1; transform: translate(8px, 0)    rotate(-16deg); }
          57%  { opacity: 1; transform: translate(4px, 2px)  rotate(18deg); }

          /* Travel to left */
          65%  { opacity: 1; transform: translate(-16px, -1px) rotate(0deg); }

          /* Left attack: two angled plunges */
          73%  { opacity: 1; transform: translate(-18px, 2px) rotate(-20deg); }
          80%  { opacity: 1; transform: translate(-14px, 0)   rotate(16deg); }
          87%  { opacity: 1; transform: translate(-18px, 2px) rotate(-14deg); }

          /* Exit left */
          95%  { opacity: 1; transform: translate(-50px, 0)  rotate(0deg); }
          100% { opacity: 0; transform: translate(-70px, 0)  rotate(0deg); }
        }

        /* Refill \u2014 icons drop in from above the rim, sequentially */
        .logo-phase-refill .bk-icon-1 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 0.0s backwards; }
        .logo-phase-refill .bk-icon-2 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 0.4s backwards; }
        .logo-phase-refill .bk-icon-3 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 0.8s backwards; }
        .logo-phase-refill .bk-icon-4 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 1.2s backwards; }
        .logo-phase-refill .bk-icon-5 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 1.6s backwards; }
        .logo-phase-refill .bk-icon-6 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 2.0s backwards; }

        @keyframes bk-settle {
          0%   { opacity: 0; transform: translateY(-70px) scale(1); }
          70%  { opacity: 1; transform: translateY(2px) scale(1); }
          100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Bandages \u2014 slide in from the left during the bandage phase, form an X */
        .bk-bandaid { opacity: 0; transform-box: fill-box; transform-origin: center; }

        /* Final resting state, visible whenever patched */
        .bk-patched.logo-phase-full   .bk-bandaid-1,
        .bk-patched.logo-phase-refill .bk-bandaid-1 { opacity: 1; transform: translateX(0) rotate(45deg); }
        .bk-patched.logo-phase-full   .bk-bandaid-2,
        .bk-patched.logo-phase-refill .bk-bandaid-2 { opacity: 1; transform: translateX(0) rotate(-45deg); }

        /* Bandage phase: slide in sequentially from the left */
        .bk-patched.logo-phase-bandage .bk-bandaid-1 {
          animation: bk-bandaid-in-1 0.5s cubic-bezier(.34,1.3,.64,1) 0.15s forwards;
        }
        .bk-patched.logo-phase-bandage .bk-bandaid-2 {
          animation: bk-bandaid-in-2 0.5s cubic-bezier(.34,1.3,.64,1) 0.65s forwards;
        }

        @keyframes bk-bandaid-in-1 {
          0%   { opacity: 0; transform: translateX(-50px) rotate(45deg); }
          70%  { opacity: 1; transform: translateX(3px)   rotate(45deg); }
          100% { opacity: 1; transform: translateX(0)     rotate(45deg); }
        }
        @keyframes bk-bandaid-in-2 {
          0%   { opacity: 0; transform: translateX(-50px) rotate(-45deg); }
          70%  { opacity: 1; transform: translateX(3px)   rotate(-45deg); }
          100% { opacity: 1; transform: translateX(0)     rotate(-45deg); }
        }

es to prevent signing failures"]},{version:"1.14.3",date:"2026-06-04",title:"Provider-specific fixes: Wasabi billing warnings, R2 versioning gate, AWS region patterns, SetupGuide improvements",changes:["**T3-1:** Delete confirmation dialogs now show a Wasabi-specific 90-day minimum retention warning when provider === 'wasabi' \u2014 both DeleteQueue (file/folder delete) and HiddenVersions purge-all confirmation. Prevents silent billing surprises for deleted test data.",'**T3-2:** HiddenVersions now accepts a provider prop (threaded from Browser). Cloudflare R2 buckets render a "versioning not supported" message instead of a confusing empty panel, because R2 does not implement ListObjectVersions.',"**T3-3:** extractRegion() for AWS S3 now handles virtual-hosted bucket URLs (bucket.s3.region.amazonaws.com), dualstack endpoints (s3.dualstack.region.amazonaws.com), FIPS endpoints (s3-fips.region.amazonaws.com), and legacy dash-style endpoints (s3-region.amazonaws.com). Pasting a URL from the AWS Console no longer silently falls back to us-east-1.","**T3-4:** GuideMinIO in SetupGuide now includes an explicit mixed-content warning: browsers block HTTP requests from an HTTPS-served Bucketer to an HTTP MinIO server, and the error only appears in DevTools.","**T3-5:** GuideB2 now mentions that application keys must have the listAllBucketNames capability \u2014 a single-bucket key without it causes AWS SDK v3 initialisation to fail entirely.","**T3-6:** GuideR2 now tells users where to find their Account ID (dashboard sidebar), that a payment method is required even on the free tier, and the difference between account-scoped and bucket-scoped token scope."]},{version:"1.14.2",date:"2026-06-04",title:"Correctness and security fixes: settings preservation, resume parallelism, purge-all error recovery, endpoint URL guard, CSP docs",changes:["**T2-1:** clearCredentials() now only removes credential fields (endpoint, bucket, keyId, provider, regionOverride). Settings keys (partSize, concurrency, etc.) survive disconnect \u2014 split LS_KEYS into CREDENTIAL_KEYS and SETTINGS_KEYS; resetSettings() now uses the canonical SETTINGS_KEYS set.","**T2-2:** Multipart resume path now uses the same uploadPartsWithPool worker pool as fresh uploads, matching the configured PART_CONCURRENCY. Extracted helper exported from src/lib/upload-queue.js with unit tests asserting concurrency.","**T2-3:** HiddenVersions.handlePurgeAllConfirm now continues through all batches on S3 Errors entries instead of throwing on the first \u2014 reports aggregate failure count in the dialog rather than abandoning remaining batches silently.","**T2-4:** readUrlParams() now validates the endpoint parameter (must be a parseable http: or https: URL) and the bucket parameter (no slashes or .. traversal sequences). Prevents crafted share links from pre-filling the credential form with attacker-controlled values.","**T2-5:** Fixed README.md nginx and Caddy CSP examples to include img-src data: https:; media-src https:; frame-src https:;. Previous img-src data: only directive silently blocked all presigned S3 preview URLs. Added note about unsafe-inline being structurally required and a future hash-based alternative.","**T2-6:** handleDeleteConfirm in App.jsx now wraps runDeleteOperation in try/catch. An uncaught throw previously left the delete panel stuck in discovering or deleting phase indefinitely with no dismiss path."]},{version:"1.14.1",date:"2026-06-04",title:"Fix rename: add missing DeleteObjectCommand import; add Command import invariant",changes:["**Bug fix (T1-1):** Browser.jsx was missing DeleteObjectCommand from its @aws-sdk/client-s3 import. Every rename threw ReferenceError after the copy step succeeded, leaving a duplicate file. Lost during the v1.14.0 unified-delete refactor.","**Test invariant (T1-2):** Added source-level assertion to test/source-invariants.test.js that scans every src/ file importing from @aws-sdk/client-s3 and asserts every new XCommand() usage has a matching named import. Prevents this class of bug from silently shipping again."]},{version:"1.14.0",date:"2026-06-03",title:"Unified delete, preview prefetch, collapsible upload queue, global queue actions",changes:[{group:"Unified delete workflow",items:["Replaced three separate delete code paths (single-file, multi-file, multi-folder) with a single unified flow","All delete requests \u2014 one file, many files, one folder, many folders, or any mix \u2014 go through the same confirm \u2192 discover \u2192 delete \u2192 done pipeline","Folder checkboxes added to the file listing; select-all now covers both files and folders",'Batch bar counts files and folders separately ("X files, Y folders selected")',"Non-blocking execution: the confirm modal starts the operation then dismisses; progress appears in a panel in App.jsx that survives folder navigation (same pattern as UploadQueue)","Each delete operation shows spinner during discover/delete phases, \u2713 on clean completion (auto-dismisses after 3 s), \u2715 with expandable error detail on failure","Delete batches run at CONCURRENCY=8 (up from 3) with exponential-backoff retry on 503/429/SlowDown throttling responses",'Fixed: selection bar ("X files, Y folders selected") now clears as items are removed from the listing after a successful delete',"src/lib/delete-queue.js \u2014 new execution module","src/components/DeleteQueue.jsx \u2014 new UI component: confirm modal overlay + collapsible progress entries"]},{group:"Preview signed-URL cache",items:["Signed URLs for previewed items are cached for 55 minutes (5-minute buffer before the 1-hour expiry); re-opening the same file within that window skips the HeadObject and URL-signing round-trip entirely and lets the browser serve the image from its own HTTP cache","Cache is cleared on folder navigation to prevent unbounded growth"]},{group:"Preview prefetch",items:["After the current preview item loads, the next and previous items are prefetched in the background so navigation feels instant",'Level 1 (all previewable types): HeadObject + signed URL generated and cached \u2014 eliminates the "thinking" delay on navigation',"Level 2 (images and text): image content downloaded via a hidden Image element if within the configured size limit; text fetched via the existing range request and stored in the cache so navigation requires zero network activity","Audio, video, and PDF: Level 1 only \u2014 URL cached, no content download",'New setting "Preview prefetch" in Settings: Off / 1 MB / 5 MB (default) / 10 MB / 25 MB \u2014 takes effect immediately without a page reload']},{group:"Small image preview",items:["Images smaller than 128\xD7128 px now fill the preview container (object-fit: contain at 100% width/height) so they are no longer uselessly tiny","Images detected as pixel art (natural size < 128\xD7128) get image-rendering: pixelated so they scale up crisply without blurring"]},{group:"Collapsible upload queue",items:["Each batch of dropped/selected files is now a collapsible row in the upload panel, independent of other batches",'Batches with few files start expanded; larger batches start collapsed \u2014 configurable via new "Upload queue expand threshold" setting in Settings (default: 5)',"Collapsed view shows a one-liner summary (file count, progress, speed, ETA)","Batches auto-collapse 3 seconds after all files complete","A Dismiss button appears once a batch is fully settled (no active or queued items); removes it from the panel","Cancel button is now per-batch rather than clearing the entire queue",'Desktop notifications changed from per-file to one summary notification per batch when it settles ("3 files uploaded", "2 uploaded \xB7 1 failed", etc.)']},{group:"Global queue actions bar",items:["A compact action bar appears above the batch list when multiple batches are present or when actions span batches",'"Dismiss all done" \u2014 removes all settled batches in one click (shown when 2+ batches are fully settled)','"Retry all failed" \u2014 re-queues every failed item across all batches (shown when any item has error status)','"Cancel all" \u2014 cancels all active and queued batches; uses the same two-click confirm pattern as per-batch cancel (shown when any upload is active or queued)','"Collapse all" / "Expand all" \u2014 toggle visibility of all batch rows at once (shown when 2+ batches exist with at least 2 in the same state)']},{group:"Upload speed display improvements",items:["Batch transfer rate now uses a rolling 6-second derivative of confirmed bytes rather than summing per-item speeds; small files (single PutObject, no progress events) contribute the same as large files (continuous multipart updates), so the rate is accurate and uniform regardless of file size",'Completed items in the per-file list now show their measured average upload speed ("\u2713 Complete \xB7 2.1 MB/s"), giving a consistent display between in-progress large files and finished small files']},{group:"Browser extension upload blocking detection",items:['Uploads blocked by ad/content blockers (uBlock Origin, etc.) now show an actionable warning rather than a cryptic network error: "Request may have been blocked by a browser extension" with guidance to disable the extension for the page or allowlist the destination domain','Detection covers all three browsers: Firefox ("NetworkError when attempting to fetch resource"), Chrome ("Failed to fetch"), Safari ("Load failed"); correctly ignored when an HTTP response was received (genuine server errors are unaffected)']},{group:"Failed upload visibility",items:["Batches containing failed items now show a red left accent border, making them immediately scannable across a long queue without expanding anything","Failed items float to the top of their batch's expanded list so they are visible without scrolling",'Batches are force-expanded the first time an error appears, so failures are never hidden behind a collapsed "Show" button']},{group:"In-app changelog grouping",items:["The changelog modal now renders a second level of hierarchy: **Bold section headers** in CHANGELOG.md become labelled groups with their items nested beneath them; entries without headers render as a flat list as before (no change to older releases)"]},{group:"Upload queue bug fixes",items:['Fixed page freeze (Firefox "Script terminated by timeout") caused by Preact diffing 15 000+ UploadLog rows on every queue update; upload history now renders at most 200 rows (all entries still counted for summary stats)',"Fixed upload history panel popping in and out during active uploads; the panel no longer hides after initial load",'Fixed re-dragging a previously cancelled folder showing files as "paused"; cancel now deletes the IndexedDB resume record','Fixed race condition where cancelling a batch during the resume-record lookup could set cancelled items back to "paused"']}]},{version:"1.13.22",date:"2026-06-03",title:"Remove redundant preview button from file row actions",changes:["The filename is already clickable (accent colour, underline on hover) and opens","Removing it reduces the actions column from 5 buttons to 4"]},{version:"1.13.21",date:"2026-06-03",title:"Fix preview modal layout jank with fixed-height content stage",changes:["Preview content area now has a fixed height (clamp(300px, 70vh, 700px)) so the","Added --surface-raised background on the stage so the loading spinner and","Audio previews use a compact 140px stage instead of the full height; for files","Image and video max-height changed from 72vh to 100% \u2014 container is now","PDF height changed from 70vh to 100%; text preview fills and scrolls"]},{version:"1.13.20",date:"2026-06-03",title:"Parallelize DeleteObjectsCommand batches (3 concurrent)",changes:["Both batch-delete (selected files) and folder-delete now send up to 3","For a 10,000-object delete this reduces round-trips from 10 serial requests","Folder-delete uses per-batch .catch() so a single failing request does"]},{version -02",title:"Add Open Graph meta tags and OG preview image",changes:["Add og:title, og:description, og:image, og:url, and Twitter Card meta tags to src/index.html","Add src/assets/og-image.png (1200\xD7630, optimized with oxipng) for link preview cards","Update build.mjs to copy og-image.png to dist/ on every build"]},{version:"1.12.19",date:"2026-06-02",title:"Inline header logo as component",changes:["Convert header logo from static <img> to inline Preact component","Bump logo size to 3rem for better visibility"]},{version:"1.12.18",date:"2026-06-01",title:"Update footer with Bucketer repo link",changes:['Footer now reads "Bucketer \u2014 Copyright \xA9 2026 HidayahTech, LLC"','"Bucketer" links to the canonical GitLab repo so visitors can find the source']},{version:"1.12.17",date:"2026-06-01",title:"Fix version tag push timing",changes:["Fix pre-push hook so version tags are pushed immediately rather than one commit late","Hook now explicitly pushes the new tag itself instead of relying on push.followTags","Tag-only recursive pushes skip the build/test cycle to avoid redundant work"]},{version:"1.12.16",date:"2026-06-01",title:"Upstream release check in changelog",changes:['Add "Check for upstream release" button to the changelog modal',"Fetches the latest GitLab release via API and displays the release badge alongside a status line (up to date / update available with link)","Result is cached for the duration of the tab session"]},{version:"1.12.15",date:"2026-06-01",title:"README badges",changes:["Add pipeline status, latest release, and AGPL v3 license badges to README"]},{version:"1.12.14",date:"2026-06-01",title:"CI release job",changes:["Added scripts/release.mjs \u2014 uploads dist/index.html to the Package Registry and creates a GitLab Release with CHANGELOG description and asset link",".gitlab-ci.yml now has two stages: test and release","Release job runs only on version tags (v*.*.*), depends on the test job, uses CI_JOB_TOKEN (no PAT needed)","Test job passes dist/index.html as an artifact to the release job"]},{version:"1.12.13",date:"2026-06-01",title:"Auto-tag on push",changes:["Pre-push hook now runs npm run build before npm test (full local validation)","Pre-push hook auto-creates an annotated version tag if one does not exist for the current package.json version","push.followTags true configured by npm install via the prepare script \u2014 tags travel with every push automatically","CLAUDE.md updated to document the tagging guarantee"]},{version:"1.12.12",date:"2026-06-01",title:"Build before test in GitLab CI",changes:["GitLab CI now runs npm run build before npm test","CI validates the build from source in a clean environment, then tests its own output rather than the committed dist file"]},{version:"1.12.11",date:"2026-06-01",title:"Link copyright footer to HidayahTech website",changes:["Copyright notice in the app footer now links to https://hidayahtech.com","Link inherits the muted footer color; accent color on hover"]},{version:"1.12.10",date:"2026-06-01",title:"Add copyright footer to app UI",changes:['Added a footer bar at the bottom of the app displaying "Copyright \xA9 2026 HidayahTech, LLC"',"Styled with --text-muted and a top border; adapts to dark mode automatically"]},{version:"1.12.9",date:"2026-06-01",title:"Add copyright notices",changes:["Added Copyright (C) 2026 HidayahTech, LLC to the top of all 24 source files (src/**/*.js, src/**/*.jsx)","build.mjs injects the notice into the generated src/lib/changelog.js so it survives rebuilds","Added copyright line to top of LICENSE file","Added License section to README.md with copyright and AGPL-3.0 reference"]},{version:"1.12.8",date:"2026-06-01",title:"Extract preparePutBody and add BUG-003 tests",changes:["Extracted preparePutBody(file) from UploadQueue.jsx into src/lib/upload-queue.js (exported)","uploadSmall now calls preparePutBody(file) instead of inlining the conversion","BUG-003 regression tests added to test/calc-part-size.test.js: return "2026-06-01",title:"IndexedDB resume record and file hash tests",changes:["Added fake-indexeddb as devDependency to provide an in-memory IndexedDB in Node","New test/indexeddb-storage.test.js: 11 tests covering saveResumeRecord, loadResumeRecord, deleteResumeRecord, and computeFileHash","Resume record tests: round-trip fidelity, null return for missing key, overwrite at same key, independent keys","Delete tests: removal confirmed, no-op delete resolves cleanly, sibling keys are preserved","computeFileHash tests: determinism, content sensitivity, and the partial-hash invariant (only head+tail 64 KB are hashed \u2014 two files with identical endpoints but different middle produce the same hash)"]},{version:"1.11.9",date:"2026-06-01",title:"Extract calcPartSize and add tests",changes:["Moved calcPartSize from UploadQueue.jsx into src/lib/upload-queue.js (exported) so it can be tested without loading JSX","New test/calc-part-size.test.js: 11 tests covering the 5 MB floor, 10,000-part ceiling, preferred size override, and falsy preferred values","Also fixed test/build.test.js to operate on the HTML frame and JS bundle separately \u2014 whole-file string matching produced false positives when changelog text contained tag-like strings as data"]},{version:"1.11.8",date:"2026-06-01",title:"Add build output structural tests",changes:["New test/build.test.js: 14 assertions on dist/index.html verifying production build invariants","BUG-001 regression: placeholder must not survive into dist; output must be a valid HTML document","BUG-002 regression: Preact JSX transform must be active; no React runtime artifacts in output","BUG-012 regression: CORS template must include DELETE in AllowedMethods","Version consistency: app-version meta tag must match package.json version","Single-bundle assertions: HTML frame has no injected tags before the bundle; no external script or stylesheet references"]},{version:"1.11.7",date:"2026-06-01",title:"Add indexeddb pure-function tests",changes:[ les documenting design intent, spec references, and non-obvious invariants","Covers all 9 lib/ modules and all 14 components including Browser.jsx and UploadQueue.jsx","Key invariants documented: resume record saved before first part upload, text preview forces text/plain for security, listing cache invalidated on every mutation, rename uses copy-before-delete, dragCounter debounce for nested drag events"]},{version:"1.11.3",date:"2026-06-01",title:"Anchor provider detection to hostname",changes:["Provider detection now parses the endpoint URL and tests patterns against the hostname only, preventing false matches on paths or query strings","Detection regexes anchored with $ to prevent suffix-based misdetection"]},{version:"1.11.2",date:"2026-06-01",title:"Document update poller in README",changes:["Expanded security model section to explicitly state the update poll targets the app's own URL only, never a third-party host, and stops once a new build is detected"]},{version:"1.11.1",date:"2026-06-01",title:"Sandbox PDF preview iframe",changes:['Added sandbox="" to the PDF preview <iframe> \u2014 disables scripts, forms, popups, same-origin access, and top navigation; native PDF rendering is unaffected']},{version:"1.11.0",date:"2026-06-01",title:"SVG favicon, drop favicon.ico",changes:["Favicon is now an inline SVG data URL \u2014 the same SVG already imported for the app logo is reused, adding zero bytes to the bundle","dist/favicon.ico removed from the repo; ImageMagick build dependency dropped",`<link rel="icon"> in the HTML shell carries a placeholder href="data:image/svg+xml," to suppress the browser's default /favicon.ico auto-request before JS runs`,"JS overwrites the placeholder with the real logo URL at module init; null-guarded to prevent a crash if the element is ever absent","Updated README: dist/favicon.ico is no longer committed"]},{version:"1.10.9",date:"2026-06-01",title:"Tighten Caddy CSP connect-src",changes:["Caddy deployment example now uses the sa
