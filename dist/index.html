        .bk-icon-inner { transform-box: fill-box; transform-origin: center; }

        /* Per-icon vectors pointing from each icon's center to the hole at (24, 87).
           Values are in the icon's local (rotated) coordinate space so the icon
           lands on the hole in world space despite its parent rotation. */
        .bk-icon-1 .bk-icon-inner { --tx: -11px; --ty: 31px; }
        .bk-icon-2 .bk-icon-inner { --tx: -34px; --ty: 42px; }
        .bk-icon-3 .bk-icon-inner { --tx: -20px; --ty: 17px; }
        .bk-icon-4 .bk-icon-inner { --tx:  -6px; --ty:  7px; }
        .bk-icon-5 .bk-icon-inner { --tx: -43px; --ty:  7px; }
        .bk-icon-6 .bk-icon-inner { --tx: -29px; --ty:  0px; }

        /* Hole \u2014 visible during leak, mop, bandage; hidden during refill + full */
        .bk-hole { opacity: 0; transition: opacity 0.3s; }
        .logo-phase-leak    .bk-hole,
        .logo-phase-mop     .bk-hole,
        .logo-phase-bandage .bk-hole { opacity: 1; }

        /* Drip animation \u2014 6 staggered drips during leak */
        .bk-drip { opacity: 0; }
        .logo-phase-leak .bk-drip-1 { animation: bk-drip 0.6s ease-in 0.5s forwards; }
        .logo-phase-leak .bk-drip-2 { animation: bk-drip 0.6s ease-in 1.3s forwards; }
        .logo-phase-leak .bk-drip-3 { animation: bk-drip 0.6s ease-in 2.1s forwards; }
        .logo-phase-leak .bk-drip-4 { animation: bk-drip 0.6s ease-in 2.9s forwards; }
        .logo-phase-leak .bk-drip-5 { animation: bk-drip 0.6s ease-in 3.7s forwards; }
        .logo-phase-leak .bk-drip-6 { animation: bk-drip 0.6s ease-in 4.5s forwards; }

        @keyframes bk-drip {
          0%   { opacity: 1; transform: translateY(0); }
          85%  { opacity: 1; transform: translateY(28px); }
          100% { opacity: 0; transform: translateY(30px); }
        }

        /* Icons \u2014 drain (shrink + fade) sequentially during leak */
        .logo-phase-leak .bk-icon-1 .bk-icon-inner { animation: bk-drain 0.85s ease-in 0.2s forwards; }
        .logo-phase-leak .bk-icon-2 .bk-icon-inner { animation: bk-drain 0.85s ease-in 1.0s forwards; }
        .logo-phase-leak .bk-icon-3 .bk-icon-inner { animation: bk-drain 0.85s ease-in 1.8s forwards; }
        .logo-phase-leak .bk-icon-4 .bk-icon-inner { animation: bk-drain 0.85s ease-in 2.6s forwards; }
        .logo-phase-leak .bk-icon-5 .bk-icon-inner { animation: bk-drain 0.85s ease-in 3.4s forwards; }
        .logo-phase-leak .bk-icon-6 .bk-icon-inner { animation: bk-drain 0.85s ease-in 4.2s forwards; }

        /* During mop and bandage, icons stay hidden */
        .logo-phase-mop     .bk-icon-inner,
        .logo-phase-bandage .bk-icon-inner { opacity: 0; transform: scale(0); }

        @keyframes bk-drain {
          0%   { opacity: 1; transform: translate(0, 0) scale(1); }
          70%  { opacity: 1; transform: translate(calc(var(--tx) * 0.85), calc(var(--ty) * 0.85)) scale(0.65); }
          100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.05); }
        }

        /* Puddle \u2014 6 stacked ellipses, each fades in as a drip lands */
        .bk-puddle { opacity: 0; }
        .logo-phase-leak .bk-puddle-1 { animation: bk-puddle 0.3s ease-out 1.0s forwards; }
        .logo-phase-leak .bk-puddle-2 { animation: bk-puddle 0.3s ease-out 1.8s forwards; }
        .logo-phase-leak .bk-puddle-3 { animation: bk-puddle 0.3s ease-out 2.6s forwards; }
        .logo-phase-leak .bk-puddle-4 { animation: bk-puddle 0.3s ease-out 3.4s forwards; }
        .logo-phase-leak .bk-puddle-5 { animation: bk-puddle 0.3s ease-out 4.2s forwards; }
        .logo-phase-leak .bk-puddle-6 { animation: bk-puddle 0.3s ease-out 5.0s forwards; }

        /* During mop, each puddle ring fades out timed to a mop plunge */
        .logo-phase-mop .bk-puddle { opacity: 0.55; }
        .logo-phase-mop .bk-puddle-6 { animation: bk-puddle-fade 0.25s ease-out 0.55s forwards; }
        .logo-phase-mop .bk-puddle-5 { animation: bk-puddle-fade 0.25s ease-out 0.85s forwards; }
        .logo-phase-mop .bk-puddle-4 { animation: bk-puddle-fade 0.25s ease-out 1.25s forwards; }
        .logo-phase-mop .bk-puddle-3 { animation: bk-puddle-fade 0.25s ease-out 1.55s forwards; }
        .logo-phase-mop .bk-puddle-2 { animation: bk-puddle-fade 0.25s ease-out 1.85s forwards; }
        .logo-phase-mop .bk-puddle-1 { animation: bk-puddle-fade 0.25s ease-out 2.15s forwards; }

        @keyframes bk-puddle {
          0%   { opacity: 0; }
          100% { opacity: 0.55; }
        }

        @keyframes bk-puddle-fade {
          0%   { opacity: 0.55; }
          100% { opacity: 0; }
        }

        /* Mop \u2014 enters from right, attacks puddle at three spots with angled plunges */
        .bk-mop { opacity: 0; transform: translate(60px, 0) rotate(0deg); transform-box: fill-box; transform-origin: 50% 0%; }
        .logo-phase-mop .bk-mop { animation: bk-mop 2.4s ease-in-out 0.15s forwards; }

        @keyframes bk-mop {
          0%   { opacity: 0; transform: translate(60px, 0) rotate(0deg); }
          8%   { opacity: 1; transform: translate(28px, 0)  rotate(0deg); }

          /* Right attack: two angled plunges */
          16%  { opacity: 1; transform: translate(26px, 2px) rotate(-22deg); }
          22%  { opacity: 1; transform: translate(28px, 0)   rotate(14deg); }
          28%  { opacity: 1; transform: translate(26px, 2px) rotate(-18deg); }

          /* Travel to center */
          35%  { opacity: 1; transform: translate(6px, -1px) rotate(0deg); }

          /* Center attack: two angled plunges */
          43%  { opacity: 1; transform: translate(4px, 2px)  rotate(20deg); }
          50%  { opacity: 1; transform: translate(8px, 0)    rotate(-16deg); }
          57%  { opacity: 1; transform: translate(4px, 2px)  rotate(18deg); }

          /* Travel to left */
          65%  { opacity: 1; transform: translate(-16px, -1px) rotate(0deg); }

          /* Left attack: two angled plunges */
          73%  { opacity: 1; transform: translate(-18px, 2px) rotate(-20deg); }
          80%  { opacity: 1; transform: translate(-14px, 0)   rotate(16deg); }
          87%  { opacity: 1; transform: translate(-18px, 2px) rotate(-14deg); }

          /* Exit left */
          95%  { opacity: 1; transform: translate(-50px, 0)  rotate(0deg); }
          100% { opacity: 0; transform: translate(-70px, 0)  rotate(0deg); }
        }

        /* Refill \u2014 icons drop in from above the rim, sequentially */
        .logo-phase-refill .bk-icon-1 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 0.0s backwards; }
        .logo-phase-refill .bk-icon-2 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 0.4s backwards; }
        .logo-phase-refill .bk-icon-3 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 0.8s backwards; }
        .logo-phase-refill .bk-icon-4 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 1.2s backwards; }
        .logo-phase-refill .bk-icon-5 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 1.6s backwards; }
        .logo-phase-refill .bk-icon-6 .bk-icon-inner { animation: bk-settle 0.9s cubic-bezier(.34,1.5,.64,1) 2.0s backwards; }

        @keyframes bk-settle {
          0%   { opacity: 0; transform: translateY(-70px) scale(1); }
          70%  { opacity: 1; transform: translateY(2px) scale(1); }
          100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Bandages \u2014 slide in from the left during the bandage phase, form an X */
        .bk-bandaid { opacity: 0; transform-box: fill-box; transform-origin: center; }

        /* Final resting state, visible whenever patched */
        .bk-patched.logo-phase-full   .bk-bandaid-1,
        .bk-patched.logo-phase-refill .bk-bandaid-1 { opacity: 1; transform: translateX(0) rotate(45deg); }
        .bk-patched.logo-phase-full   .bk-bandaid-2,
        .bk-patched.logo-phase-refill .bk-bandaid-2 { opacity: 1; transform: translateX(0) rotate(-45deg); }

        /* Bandage phase: slide in sequentially from the left */
        .bk-patched.logo-phase-bandage .bk-bandaid-1 {
          animation: bk-bandaid-in-1 0.5s cubic-bezier(.34,1.3,.64,1) 0.15s forwards;
        }
        .bk-patched.logo-phase-bandage .bk-bandaid-2 {
          animation: bk-bandaid-in-2 0.5s cubic-bezier(.34,1.3,.64,1) 0.65s forwards;
        }

        @keyframes bk-bandaid-in-1 {
          0%   { opacity: 0; transform: translateX(-50px) rotate(45deg); }
          70%  { opacity: 1; transform: translateX(3px)   rotate(45deg); }
          100% { opacity: 1; transform: translateX(0)     rotate(45deg); }
        }
        @keyframes bk-bandaid-in-2 {
          0%   { opacity: 0; transform: translateX(-50px) rotate(-45deg); }
          70%  { opacity: 1; transform: translateX(3px)   rotate(-45deg); }
          100% { opacity: 1; transform: translateX(0)     rotate(-45deg); }
        }

,"Non-blocking execution: the confirm modal starts the operation then dismisses; progress appears in a panel in App.jsx that survives folder navigation (same pattern as UploadQueue)","Each delete operation shows spinner during discover/delete phases, \u2713 on clean completion (auto-dismisses after 3 s), \u2715 with expandable error detail on failure","Delete batches run at CONCURRENCY=8 (up from 3) with exponential-backoff retry on 503/429/SlowDown throttling responses",'Fixed: selection bar ("X files, Y folders selected") now clears as items are removed from the listing after a successful delete',"src/lib/delete-queue.js \u2014 new execution module","src/components/DeleteQueue.jsx \u2014 new UI component: confirm modal overlay + collapsible progress entries"]},{group:"Preview signed-URL cache",items:["Signed URLs for previewed items are cached for 55 minutes (5-minute buffer before the 1-hour expiry); re-opening the same file within that window skips the HeadObject and URL-signing round-trip entirely and lets the browser serve the image from its own HTTP cache","Cache is cleared on folder navigation to prevent unbounded growth"]},{group:"Preview prefetch",items:["After the current preview item loads, the next and previous items are prefetched in the background so navigation feels instant",'Level 1 (all previewable types): HeadObject + signed URL generated and cached \u2014 eliminates the "thinking" delay on navigation',"Level 2 (images and text): image content downloaded via a hidden Image element if within the configured size limit; text fetched via the existing range request and stored in the cache so navigation requires zero network activity","Audio, video, and PDF: Level 1 only \u2014 URL cached, no content download",'New setting "Preview prefetch" in Settings: Off / 1 MB / 5 MB (default) / 10 MB / 25 MB \u2014 takes effect immediately without a page reload']},{group:"Small image preview",items:["Images smaller than 128\xD7128 px now fill the preview container (object-fit: contain at 100% width/height) so they are no longer uselessly tiny","Images detected as pixel art (natural size < 128\xD7128) get image-rendering: pixelated so they scale up crisply without blurring"]},{group:"Collapsible upload queue",items:["Each batch of dropped/selected files is now a collapsible row in the upload panel, independent of other batches",'Batches with few files start expanded; larger batches start collapsed \u2014 configurable via new "Upload queue expand threshold" setting in Settings (default: 5)',"Collapsed view shows a one-liner summary (file count, progress, speed, ETA)","Batches auto-collapse 3 seconds after all files complete","A Dismiss button appears once a batch is fully settled (no active or queued items); removes it from the panel","Cancel button is now per-batch rather than clearing the entire queue",'Desktop notifications changed from per-file to one summary notification per batch when it settles ("3 files uploaded", "2 uploaded \xB7 1 failed", etc.)']},{group:"Global queue actions bar",items:["A compact action bar appears above the batch list when multiple batches are present or when actions span batches",'"Dismiss all done" \u2014 removes all settled batches in one click (shown when 2+ batches are fully settled)','"Retry all failed" \u2014 re-queues every failed item across all batches (shown when any item has error status)','"Cancel all" \u2014 cancels all active and queued batches; uses the same two-click confirm pattern as per-batch cancel (shown when any upload is active or queued)','"Collapse all" / "Expand all" \u2014 toggle visibility of all batch rows at once (shown when 2+ batches exist with at least 2 in the same state)']},{group:"Upload speed display improvements",items:["Batch transfer rate now uses a rolling 6-second derivative of confirmed bytes rather than summing per-item speeds; small files (single PutObject, no progress events) contribute the same as large files (continuous multipart updates), so the rate is accurate and uniform regardless of file size",'Completed items in the per-file list now show their measured average upload speed ("\u2713 Complete \xB7 2.1 MB/s"), giving a consistent display between in-progress large files and finished small files']},{group:"Browser extension upload blocking detection",items:['Uploads blocked by ad/content blockers (uBlock Origin, etc.) now show an actionable warning rather than a cryptic network error: "Request may have been blocked by a browser extension" with guidance to disable the extension for the page or allowlist the destination domain','Detection covers all three browsers: Firefox ("NetworkError when attempting to fetch resource"), Chrome ("Failed to fetch"), Safari ("Load failed"); correctly ignored when an HTTP response was received (genuine server errors are unaffected)']},{group:"Failed upload visibility",items:["Batches containing failed items now show a red left accent border, making them immediately scannable across a long queue without expanding anything","Failed items float to the top of their batch's expanded list so they are visible without scrolling",'Batches are force-expanded the first time an error appears, so failures are never hidden behind a collapsed "Show" button']},{group:"In-app changelog grouping",items:["The changelog modal now renders a second level of hierarchy: **Bold section headers** in CHANGELOG.md become labelled groups with their items nested beneath them; entries without headers render as a flat list as before (no change to older releases)"]},{group:"Upload queue bug fixes",items:['Fixed page freeze (Firefox "Script terminated by timeout") caused by Preact diffing 15 000+ UploadLog rows on every queue update; upload history now renders at most 200 rows (all entries still counted for summary stats)',"Fixed upload history panel popping in and out during active uploads; the panel no longer hides after initial load",'Fixed re-dragging a previously cancelled folder showing files as "paused"; cancel now deletes the IndexedDB resume record','Fixed race condition where cancelling a batch during the resume-record lookup could set cancelled items back to "paused"']}]},{version:"1.13.22",date:"2026-06-03",title:"Remove redundant preview button from file row actions",changes:["The filename is already clickable (accent colour, underline on hover) and opens","Removing it reduces the actions column from 5 buttons to 4"]},{version:"1.13.21",date:"2026-06-03",title:"Fix preview modal layout jank with fixed-height content stage",changes:["Preview content area now has a fixed height (clamp(300px, 70vh, 700px)) so the","Added --surface-raised background on the stage so the loading spinner and","Audio previews use a compact 140px stage instead of the full height; for files","Image and video max-height changed from 72vh to 100% \u2014 container is now","PDF height changed from 70vh to 100%; text preview fills and scrolls"]},{version:"1.13.20",date:"2026-06-03",title:"Parallelize DeleteObjectsCommand batches (3 concurrent)",changes:["Both batch-delete (selected files) and folder-delete now send up to 3","For a 10,000-object delete this reduces round-trips from 10 serial requests","Folder-delete uses per-batch .catch() so a single failing request does"]},{version:"1.13.19",date:"2026-06-03",title:"Batch rAF-aligned updateItem calls; add slow-mock latency option",changes:["Extracted createUpdateBatcher (src/lib/update-batcher.js) \u2014 coalesces","All 14 status-change updateItem call sites in UploadQueue.jsx now pass","Added 14 unit tests covering merge semantics, urgent/non-urgent paths, and","Added MOCK_S3_LATENCY_MS env var to perf/mock-s3.mjs for realistic","BatchSummary self-time: 877ms \u2192 724ms (\u221217%) at 1000 files, 0ms latency"]},{version:"1.13.18",date:"2026-06-03",title:"Replace 8 filter/reduce passes in BatchSummary with a single loop",changes:["Replaced 8 separate filter/reduce calls in BatchSummary (run on every"]},{version:"1.13.17",date:"2026-06
