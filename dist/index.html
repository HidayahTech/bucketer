ull;async function p(){try{let g=(window.location.pathname||"/")+"?_v="+Date.now();if(m!==null){let y=await t3(g);if(y!==null&&y===m){u=setTimeout(p,Nc(++d));return}}let b=await IG(g);if(b===null){u=setTimeout(p,Nc(++d));return}if(b.buildId===l){let y=await t3(g);y&&(m=y),u=setTimeout(p,Nc(++d));return}o(b.appVersion),r(!0)}catch{u=setTimeout(p,Nc(++d))}}return u=setTimeout(p,Nc(d)),()=>clearTimeout(u)},[e]),!t||i?null:s("div",{class:"banner banner-info",role:"status",children:[s("div",{class:"banner-body",children:[n?`Version ${n} is available.`:"A new version is available."," ",s("button",{class:"btn btn-ghost btn-sm",style:{marginLeft:".25rem"},onClick:()=>window.location.reload(),children:"Refresh to update"})]}),s("button",{class:"banner-close",onClick:()=>a(!0),"aria-label":"Dismiss",children:"\u2715"})]})}var Ts="1.27.0",n3=[{version:"1.27.0",date:"2026-06-21",title:"Privacy: Referrer-Policy `no-referrer`",changes:['**<meta name="referrer" content="no-referrer"> added to the document head.** Presigned S3 URLs and',"**Build invariant** added to build.test.js: asserts the tag is present and set to no-referrer."]},{version:"1.26.3",date:"2026-06-20",title:"Fix: drag-dropped uploads landed at root; sub-folder not shown until reload",changes:["**Drag-dropped uploads now target the current folder, not the bucket root (#2, BUG-031).** UploadQueue","**A sub-folder created by an upload into the current view now appears without a manual reload (#4, BUG-032).**",'**Refresh control is now labelled "\u21BA Refresh"** (was an unlabelled \u21BA icon) and its tooltip notes it pulls',"**e2e regression coverage** for all of the above, plus an Android-emulated check that uploading into a"]},{version:"1.26.2",date:"2026-06-20",title:"Fix: file checkboxes were unclickable (BUG-030) + P1 e2e coverage",changes:["Node: presigned GET full + Range (206) + content-disposition override.","Browser: multi-select batch delete & batch move, select-all, filter, sort, copy-link popover; the","Mock server: batch DeleteObjects now creates delete markers on a versioned bucket; e2e files run"]},{version:"1.26.1",date:"2026-06-20",title:"End-to-end test coverage on the stateful mock S3 server",changes:["**Mock server extensions** (test/e2e/mock-s3/server.mjs): ListParts pagination (the BUG-007","**Node-integration layer** (test/e2e/node/): the destructive failure modes asserted against real","**Browser layer** (test/e2e/browser/): real-browser proofs that unit tests can't give \u2014 BUG-028","**Source data-testid hooks** (inert): app-connected, file-row:<name>, folder-row:<name>,","**Scripts/CI**: npm run test:e2e (+ :node/:browser); a non-blocking GitLab e2e job. The e2e"]},{version:"1.26.0",date:"2026-06-19",title:"Drag-and-drop moving",changes:["**Drop targets you can already see** \u2014 folder rows in the listing (move *into* a subfolder) and breadcrumb crumbs for the current folder's parent and any ancestor up to root (move *up*). A target highlights only while it is a valid destination; dropping a folder into itself/a descendant, or onto its current location, is rejected with a no-drop cursor.","**Selection-aware** \u2014 dragging a row that is part of the current selection moves the whole selection; dragging an unselected row moves just that row, leaving any selection intact.",`**Internal vs. external drags** \u2014 object moves are distinguished from OS file drags by the Files DataTransfer type, so dragging an object no longer raises the "Drop files to upload" overlay (handleTableDragEnter and the table's onDragOver now gate on it).`,"**Pure decision logic** in new src/lib/move-drag.js (dragPayload, dropAccepted) \u2014 unit-tested in isolation since DragEvent/DataTransfer don't exist under the test runner; the Browser/Breadcrumb wiring is a thin shell over it. Breadcrumb.jsx gained opt-in move-drop props (the picker's use is unchanged)."]},{version:"1.25.0",date:"2026-06-19",title:"Move files & folders into another folder",changes:[`**Folder-tree destination picker** (src/components/MovePickerModal.jsx) \u2014 drill into prefixes (ListObjectsV2 with Delimiter:'/') and click **Move here**. The picker is the confirmation step; a structural guard (src/lib/move-guards.js) disables "Move here" with an inline reason for invalid destinations (a folder into itself or a descendant, or a no-op move).`,"**Copy-before-delete, per object** (src/lib/move-queue.js, runMoveOperation) \u2014 each object's source is deleted only after its copy is confirmed, so an object is always in a clean state (source-only / both / destination-only). Source rows are removed incrementally as they complete; a worker pool (8) with throttling backoff (src/lib/s3-retry.js) handles large folder moves.","**Any size, from day one** \u2014 objects \u2264 5 GiB use a single CopyObject (MetadataDirective:'COPY'); objects > 5 GiB use multipart UploadPartCopy (src/lib/move-multipart.js), carrying Content-Type and custom metadata forward via a source HeadObject (UploadPartCopy copies bytes only) and aborting any orphaned multipart session on failure. New constant COPY_MULTIPART_THRESHOLD (5 GiB), distinct from the 5 MiB upload MULTIPART_THRESHOLD.","**Never overwrites** \u2014 a single destination-prefix scan pre-detects collisions (and intra-batch duplicate target keys); a colliding object is skipped with both source and destination left untouched. Skips are surfaced in the move panel (src/components/MoveQueue.jsx) distinctly from genuine failures. If a copy succeeds but the source delete is denied, the object now exists in both places \u2014 this is reported as a distinct error and the source is left in place (never auto-deleted).","**Cross-provider** \u2014 server-side copy is permitted by the existing CORS template (PUT + x-amz-copy-source via the x-amz-* rule) on all supported providers; no CORS change is needed. Move is gated on both write (upload) and delete capabilities.","**Key remapping** (src/lib/move-key.js) preserves a moved folder's own name and nested sub-prefix structure under the destination, including the 0-byte folder-marker object."]},{version:"1.24.0",date:"2026-06-18",title:"Duplicate detection: durable results + scrollable report",changes:['**Durable scan results** \u2014 a scan is no longer discarded when the report closes. Results are persisted per (endpoint, bucket) in a new IndexedDB store (bucketer_dedup_scans; DB schema bumped v2 \u2192 v3) and **restored on reopen**, so a large scan never has to be repeated. Keeper choices and byte-for-byte verifications are saved as they are made (transient progress flags are stripped, so a reload never shows a stuck spinner). The report shows a "Last scan: \u2026 \xB7 N objects \xB7 timestamp \xB7 restored from cache" line with **Re-scan** and **Clear saved** controls. Persistence is best-effort: when IndexedDB is unavailable it degrades to a no-op rather than failing the scan. New module src/lib/dedup-scan-store.js.',"**Scrollable, wider report** \u2014 the duplicates dialog is now min(94vw, 920px) wide and height-capped at 88vh, with the match list scrolling inside the dialog instead of overflowing the viewport. Long keys/paths wrap rather than truncating.","**Test infrastructure** \u2014 test/helpers/with-dom.js now installs a non-recursive performance.now(). jsdom's own performance.now() recurses into itself once installed as the global performance, overflowing the stack under an async component re-render; this removes that long-standing hazard and unblocks async component tests."]},{version:"1.23.0",date:"2026-06-17",title:"Duplicate detection (iteration 1: scan + verify, read-only)",changes:["**Tiered, provider-agnostic detection** (src/lib/dedup-scan.js) \u2014 narrows candidates cheaply: free size grouping \u2192 one HeadObject per same-size object (deriving a trusted single-part ETag-MD5, our content-hash stamp, and the multipart/encryption flags) \u2192 an opportunistic, **AWS-only** GetObjectAttributes checksum adapter. The engine only ever lists and HEADs; it never mutates an object.","**Byte-for-byte verification is the only deletion gate** (src/lib/verify-bytes.js). No hash decides identity: MD5 and SHA-1 are broken for collision resistance and even SHA-256 is a hash, so matches are shown as **candidates** and a streaming byte-for-byte comparison (immune to any hash collision, low memory, early-abort) is what promotes a group to **verified**.","**Content-hash stamp on upload** \u2014 every upload now records x-amz-meta-bucketer-content-hash with a self-describing value (sha256-ht64k:<hex>, the existing head/tail sample) as a cheap candidate filter for future scans. The hash is computed once and reused for the multipart resume record. Works on every provider, including those that expose no usable server-side checksum.","**Strict, fail-loud provider adapter** (src/lib/provider-checksum.js) \u2014 accepts a provider checksum only in an exact full-object shape, falls back to the universal tiers otherwise, and console.warns genuinely unexpected shapes so they can be reported and the adapter refined from real data. Other providers get an adapter only once probe output confirms one.","**Report UI** (src/components/DuplicatesModal.jsx) \u2014 candidate/verified badges, per-group keep-selection (default: oldest copy), and read-only per-object download/preview/copy-link. **Delete others** and **Move others** render as disabled stubs in this iteration."]},{version:"1.22.4",date:"2026-06-16",title:"Fix: upload completion no longer resets browser to root (BUG-029)",changes:[]},{version:"1.22.3",date:"2026-06-14",title:"Chore: reconcile package-lock.json version",changes:[]},{version:"1.22.2",date:"2026-06-14",title:"Internal: extract ConfirmDialog from StorageModal",changes:[]},{version:"1.22.1",date:"2026-06-13",title:"Move integrity check pre-auth into the version modal",changes:[]},{version:"1.22.0",date:"2026-06-13",title:"Build integrity check (honest-host)",changes:["**Honest framing** \u2014 the match/mismatch UI explicitly states that this proves the host is serving the canonical artifact, not that the running JavaScript was not modified. A malicious host could rewrite both.","**Build pipeline** \u2014 build.mjs now emits dist/integrity.json alongside dist/index.html (sha256 in an extensible hashes object \u2014 sha512/blake3 can be added later without a schema migration).","**Release pipeline** \u2014 scripts/release.mjs uploads the manifest to the same GitLab Generic Package Registry path as the HTML and lists it among the Release assets.","**CI reproducibility guard** \u2014 .gitlab-ci.yml gains a reproducibility stage that builds twice and diffs both index.html and integrity.json. The release job now depends on this stage. Catches any future regression that leaks nondeterminism into the build.","**Result states** \u2014 match (green), mismatch (red with both hashes), no-manifest (yellow, for versions predating this feature), unknown-algorithm (yellow), network error (yellow).","Default off \u2014 enabling the toggle is the only thing that triggers any network call to GitLab."]},{version:"1.21.1",date:"2026-06-12",title:"Fix custom metadata invisible in browser (BUG-028)",changes:[]},{version:"1.21.0",date:"2026-06-12",title:"File modification time tracking",changes:[]},{version:"1.20.0",date:"2026-06-11",title:"In-page preview on download links",changes:["**PreviewMedia component** (src/components/PreviewMedia.jsx) \u2014 shared renderer for image, audio, video, PDF, and text kinds; replaces the equivalent inline JSX in Browser.","**DownloadPage preview** \u2014 detects the file type from the extension and renders the appropriate preview element using the presigned URL as the source directly. Text files are fetched in a useEffect (range-limited to 100 KB, same as the browser preview).","**Browser refactor** \u2014 preview rendering in Browser.jsx now delegates to PreviewMedia with no behaviour change."]},{version:"1.19.0",date:"2026-06-11",title:"Presigned URL sharing",changes:["**Share via Bucketer** button in the file copy-link popover (single-file only; preset durations: 1 h, 24 h, 7 d).","**DownloadPage** \u2014 recipients open the link in Bucketer and see a clean download card showing the file name, expiry countdown, and a Download button. No S3 credentials required.",'**Expired link handling** \u2014 if the presigned URL has passed its expiry, the download button is replaced with an "This link has expired" notice.',"**base64url encoding** \u2014 synchronous, universally supported (including Safari), no compression API required."]},{version:"1.18.0",date:"2026-06-11",title:"Adaptive upload concurrency",changes:["**Adaptive/Manual toggle** in Settings (adaptive is the default). In adaptive mode the part and file concurrency sliders are hidden.","**Sort-by-size**: files in a batch are enqueued smallest-first so small files complete quickly and part concurrency scales up sooner for large files.","**Budget rebalancer**: as active uploads drop, partsPerFile scales up automatically (4 files \u2192 4 parts/file, 2 files \u2192 8 parts/file, 1 file \u2192 16 parts/file), keeping total in-flight streams near 16.","**Per-file probe** (files \u2265 100 MB): uploads one warm-up part then times a baseline and candidate (+4) concurrency phase; holds the faster result for the rest of the file. Inconclusive probes (measurement < 10 ms) fall back to baseline.","**Memory cap**: part concurrency is clamped so total ArrayBuffer usage across all concurrent files stays within 200 MiB, preventing tab crashes on very large files where calcPartSize raises the part size beyond 5 MiB.","**Strategy column** in Upload history showing mode, peak part concurrency, and probe outcome per file.","**Console debug output** via localStorage.setItem('s3b_debug_concurrency', '1'): logs rebalance events (only when partsPerFile changes) and per-file file-complete summaries with speed and probe results.","New pure module src/lib/concurrency-strategy.js (calcAdaptiveConcurrency, createProbeState, resolveProbe, capConcurrencyByMemory) \u2014 fully unit-tested."]},{version:"1.17.0",date:"2026-06-08",title:"Component decomposition: extract sub-components from UploadQueue and Browser",changes:["BatchSummary.jsx, UploadItem.jsx, ErrorDetailsPanel.jsx \u2014 from UploadQueue.jsx (1053L \u2192 697L)","CopyLinkPopover.jsx, Breadcrumb.jsx, SortTh.jsx \u2014 from Browser.jsx (1130L \u2192 1015L)"]},{version:"1.16.0",date:"2026-06-08",title:"Code simplification: shared utilities, deduplication, indexeddb split",changes:["**lib/constants.js**: centralises MULTIPART_THRESHOLD, LARGE_FILE_WARN, PRESIGN_EXPIRES, TEXT_PREVIEW_LIMIT, COPY_LINK_PRESETS, and concurrency defaults previously scattered across UploadQueue.jsx and Browser.jsx. One place to change a threshold.","**lib/upload-status.js**: isActive / isFailed / isSettled / isPaused / isDone / isAborted predicate functions, replacing inline i.status === 'uploading' || i.status === 'resuming' || ... chains duplicated 4+ times in UploadQueue.jsx.","**lib/upload-cleanup.js**: abortMultipartSession(client, params) \u2014 abort + deleteResumeRecord were copy-pasted in three best-effort cleanup paths; now a single tested helper with a doc comment explaining which callers must stay inline (those that surface errors to the UI).","**lib/sort.js**: nameComparator / numericComparator factories extracted from Browser.jsx. Locale-comparison options (sensitivity: 'base') defined in one place.","**lib/validate-object-name.js**: shared validation (non-empty, no slashes) for both rename and folder-create; rules cannot silently diverge between the two callers.","**lib/purge-versions.js**: purgeAllVersions() and collectHiddenVersions() extracted from HiddenVersions.jsx. The 57-line async pagination + batched DeleteObjectsCommand loop is now independently testable with a mock S3 client (6 new tests).","**lib/indexeddb.js \u2192 barrel over four focused modules**: indexeddb-core.js (shared openDB, schema constants), resume-records.js, file-identity.js, active-uploads.js, upload-log.js. Each module owns one concern; the barrel preserves all existing import paths.","**lib/storage.js factory refactor**: 8 near-identical load<Setting> / save<Setting> function pairs collapsed into a makeSettingAccessors() factory. All exported function names are identical \u2014 callers are unchanged.",`**hooks/useDoubleClickSafety.js**: the "prime for 3 s, confirm on second click" timer pattern was duplicated between the main UploadQueue cancel-all button and BatchSummary's per-batch cancel button. Extracted as a hook + pure applyClickSafety() function (tested with injected timer stubs).`,"**hooks/useInterpolatedProgress.js**: rAF byte-counter animation extracted from UploadItem. Pure interpolateBytes() function tested separately from the Preact hook.","**hooks/useWindowDragDrop.js**: ~60 lines of dragenter / dragleave / dragover event listener setup, counter management, and the handleWindowDrop file-entry resolver extracted from App.jsx.","**hooks/useModalStates.js**: App-level changelog / about / storage modal open-state grouped so new modals have a canonical home.","**UploadQueue.jsx** (\u221275 lines): uses useDoubleClickSafety, useInterpolatedProgress, status predicates, abortMultipartSession, and constants. ErrorDetailsPanel extracted as a named sub-component. MultipartFailureConsequence moved to its own file (components/MultipartFailureConsequence.jsx) since it has no dependency on UploadQueue state.","**Browser.jsx** (\u221271 lines): CopyLinkPopover and BatchCopyLinkPopover merged into one parameterised component \u2014 fileKey for single, fileKeys for batch. Uses nameComparator / numericComparator, validateObjectName, and constants.","**App.jsx** (\u221267 lines): dead statusLabel variable removed (declared but never read). Drag-drop logic extracted to useWindowDragDrop; modal open-state extracted to useModalStates.","**HiddenVersions.jsx** (\u221241 lines): delegates purge to purgeAllVersions(); uses collectHiddenVersions.","**StorageModal.jsx**: internal Confirm sub-component renamed ConfirmDialog for clarity."]},{version:"1.15.6",date:"2026-06-07",title:"Credential form and profile management bug fixes",changes:['**Region inference restored for loaded profiles (BUG-026)**: loading a saved profile silently marked the region as "user-edited" regardless of whether its stored value matched what the endpoint would give. The _initExtractedRegion IIFE bailed out early when initial.regionOverride was set, making the comparison against the extracted value impossible. Removed the early bail; now the stored region is compared to the extracted one and treated as inferred (allowing endpoint changes to update it) when they match. The "Auto-filled from endpoint URL" hint also reappears for profile-loaded regions that are endpoint-derived.',"**Post-disconnect form repopulated from selected profile (BUG-027)**: disconnecting cleared credentials to all-empty but left selectedProfileId pointing to the last profile, leaving the splash screen with a highlighted profile row and a blank form. Clicking the row was a no-op (same key, no CredentialForm remount). handleDisconnect now repopulates credentials and liveFormData from the selected profile minus the secret key, so the user only needs to re-enter the secret key to reconnect.",'**Default profile name now includes provider (Issue 3)**: defaultName in ProfilePicker read formData.provider, which is absent when liveFormData comes from live form edits (those carry providerOverride instead). Now resolves providerOverride || provider || detectProvider(endpoint) so the suggested name reflects what the form shows \u2014 "B2 \u2014 my-bucket" instead of just "my-bucket".','**Profile delete requires confirmation (Issue 4)**: clicking \u2715 on a profile row previously deleted it immediately with no undo. Now shows an inline "Delete? [Confirm] [Cancel]" confirmation in the row; the Confirm button is styled in danger-red. Clicking the row itself also dismisses the confirmation without selecting the profile.']},{version:"1.15.5",date:"2026-06-07",title:"Bidirectional endpoint\u2194region inference in credential form",changes:['**Region auto-filled from endpoint**: the region field is now always visible and is automatically populated when the endpoint URL embeds a region (B2, Wasabi, AWS, DO Spaces). Previously the extracted region was only shown as a sidebar hint; now it appears as an editable value with an "Auto-filled from endpoint URL" indicator.',`**Endpoint auto-filled from provider + region**: selecting a provider from the override dropdown and typing a region constructs and auto-fills the canonical endpoint URL ("Auto-filled from provider and region"). Provider-specific exceptions are handled: Wasabi's us-east-1 produces https://s3.wasabisys.com (bare legacy hostname) rather than the na\xEFve template. R2 auto-fills the region with 'auto' (endpoint requires account ID and cannot be constructed). MinIO and Generic providers do not infer endpoints.`,"**Endpoint patterns verified against official docs** (all fetched 2026-06-04/07): B2 via backblaze.com/docs, Wasabi via docs.wasabi.com, AWS via docs.aws.amazon.com/general, DO Spaces via docs.digitalocean.com, R2 via developers.cloudflare.com.","**Circular update prevention**: a userEditedRef ensures inference only flows from user-typed fields into fields the user has not yet touched. Editing an auto-filled field marks it as user-owned and stops inference from overwriting it."]},{version:"1.15.4",date:"2026-06-06",title:"Profile reliability: provider inference, update-in-place, reload consistency, hint labels",changes:[`**Provider override no longer carries over from auto-detection**: CredentialForm previously initialized the provider-override dropdown from the stored/detected provider, so switching a form pre-filled with B2 credentials to a Wasabi endpoint would silently submit provider: 'b2'. The dropdown now only pre-selects a value when it genuinely differs from what detectProvider would return for the current endpoint \u2014 i.e., only for real overrides (MinIO on a generic URL, a reverse proxy, etc.). Auto-detected providers always start at "Auto-detect from endpoint".`,`**Profile save updates in place**: "Save current as profile\u2026" previously always created a new profile (id: Date.now()), making it impossible to update an existing one. When a profile is currently selected, the button now reads "Update profile\u2026" and saves with the existing profile's id, replacing it rather than duplicating it. The name input pre-fills with the profile's current name.`,"**Reload prefers flat credentials over profile data**: on page load, the app previously always loaded the last-selected profile's data, which overwrote credentials saved by a manually-entered connection that was never saved as a profile. Flat credentials (written on every handleConnect) are now used when present; the profile is used only as a fallback when flat credentials are absent (i.e. after a disconnect or first load).",'**Profile list hint shows full provider names**: the hint line under each profile name now uses PROVIDER_LABELS ("Backblaze B2 \xB7 bucket") instead of the raw key uppercased ("B2 \xB7 bucket").']},{version:"1.15.3",date:"2026-06-06",title:"Upload UI cleanup: hide when denied, drop zone removed, empty-state hint",changes:["**Upload UI hidden when denied**: entire upload section (destination folder, file/folder picker buttons) is now hidden when capabilities.upload === 'denied' rather than shown in a disabled/greyed state. When unknown or permitted, everything shows as before.",'**Dedicated drop zone removed**: the "Drop files or folders here" element in UploadQueue is gone. The window-wide overlay (v1.15.2) covers the same surface area; the zone was redundant. handleDrop and dragOver state removed from UploadQueue.','**Empty-state hint**: when the queue is empty and upload is available, a line reads "Drag files or folders anywhere in this window to upload, or use the buttons above." \u2014 the first-use teaching moment.',"**Window overlay respects upload capability**: the document dragenter listener and the overlay render are both gated on capabilities.upload !== 'denied'.","**Error handling on detached drops**: .catch(() => {}) added to the collectFileEntries().then() chains in handleWindowDrop (App.jsx) and handleTableDrop (Browser.jsx) to prevent silent promise rejections."]},{version:"1.15.2",date:"2026-06-05",title:"Window-wide drag-and-drop overlay",changes:["**Drop anywhere on the window to upload**: document-level dragenter/dragleave/dragover listeners in App.jsx activate a full-screen fixed overlay (z-index 500, below modals at 1000) whenever files are dragged over the viewport while connected.","**Modal suppression**: dragenter checks document.querySelector('.modal-overlay') \u2014 the overlay is not activated while any modal is open.","**Overlay captures the drop**: ondrop on the overlay fires collectFileEntries as a detached .then(), routing files to the same addFilesRef destination as all other drop paths.","**Existing zone-specific handlers unchanged**: Browser table drop and UploadQueue upload-zone drop continue to work as before; the window overlay is the primary path when connected."]},{version:"1.15.1",date:"2026-06-05",title:"Synchronous drop capture, parallel folder traversal, pending-drop indicator",changes:["**Drop handlers are now synchronous** (handleTableDrop in Browser.jsx, handleDrop in UploadQueue.jsx): FileSystemEntry objects are captured synchronously before any await, then collectFileEntries fires as a detached .then(). The handler returns immediately so rapid consecutive drops are captured right away rather than waiting for the previous traversal to complete.","**Parallel top-level traversal in collectFileEntries**: changed for\u2026await over root entries to Promise.all, so independent folder subtrees are walked concurrently rather than one at a time.",'**Pending-drop indicator in UploadQueue**: while folder traversal is running a pendingDrops counter drives a "Counting files in N folders\u2026" message beneath the drop zone, giving the user immediate feedback that the drop was accepted.']},{version:"1.15.0",date:"2026-06-05",title:"Refactor + accessibility: usePreview hook, cancellation guard, htmlFor labels, progress ARIA",changes:["**T4-1** Extract all preview state, handlePreview, and closePreview into src/lib/usePreview.js; Browser.jsx now consumes the hook","**T4-2** Add gen-ref cancellation guard to handlePreview \u2014 every await is followed by if (gen !== genRef.current) return to drop stale async callbacks when the user opens a new preview","**T4-6** Add htmlFor + id to all standalone <label> elements in CredentialForm.jsx (6) and SettingsPanel.jsx (7) \u2014 screen readers and click-to-focus now work correctly",'**T5-9** Add role="progressbar" + aria-valuenow/min/max + aria-label to progress bar elements in UploadQueue.jsx \u2014 upload progress is now exposed to the accessibility tree']},{version:"1.14.4",date:"2026-06-04",title:"Quality batch: concurrency cap, format guards, build invariants, provider accuracy, UI polish",changes:["**T4-3** Cap discoverPrefixKeys concurrency at 8 with worker-pool; removes bare Promise.all(prefixes.map) that could throttle on large folder-delete operations","**T4-4** Guard formatBytes against null/undefined/NaN/negative/Infinity \u2014 all return '\u2014' instead of crashing",'**T4-5** Remove stale "No delete, rename, copy" and "N=2 concurrency" claims from docs/QUESTIONS.md',"**T5-1** Add build test: production bundle must have no source map comments (regression guard)","**T5-2** Add build invariant: dist/index.html must not exceed 600 KB ceiling","**T5-3** Export shellQuote from cors-config.js; use in corsCmd() to prevent shell injection from bucket/endpoint names",'**T5-4** Add <meta http-equiv="Content-Security-Policy"> to src/index.html for S3/R2/B2 static-hosting deployments',"**T5-5** Replace module-level let _sessionFirstMount in Browser.jsx with isFirstMount prop derived from browserKey === 0 in App.jsx",'**T5-6** Distinguish empty-bucket copy ("This bucket is empty. Upload files to get started.") from empty-prefix copy',"**T5-7** Show filename in delete confirmation modal for single-file deletes","**T5-8** Add inline hint to CapabilityPanel explaining permissions are detected automatically","**T5-11** Add dotted-bucket SSL caveat to Wasabi SetupGuide step","**T5-12** Correct requiresPathStyle comment \u2014 B2 supports both styles; we use path-style because users supply a plain endpoint","**T5-13** Correct defaultMaxKeys comment \u2014 B2 Class C is not billed per call; 200 is a UX latency choice","**T5-14** Map Wasabi legacy alias region slugs (nl-1\u2192eu-central-1, de-1\u2192eu-central-2, uk-1\u2192eu-west-1, fr-1\u2192eu-west-2, uk-2\u2192eu-west-3, it-1\u2192eu-south-1) to canonical SigV4 names to prevent signing failures"]},{version:"1.14.3",date:"2026-06-04",title:"Provider-specific fixes: Wasabi billing warnings, R2 versioning gate, AWS region patterns, SetupGuide improvements",changes:["**T3-1:** Delete confirmation dialogs now show a Wasabi-specific 90-day minimum retention warning when provider === 'wasabi' \u2014 both DeleteQueue (file/folder delete) and HiddenVersions purge-all confirmation. Prevents silent billing surprises for deleted test data.",'**T3-2:** HiddenVersions now accepts a provider prop (threaded from Browser). Cloudflare R2 buckets render a "versioning not supported" message instead of a confusing empty panel, because R2 does not implement ListObjectVersions.',"**T3-3:** extractRegion() for AWS S3 now handles virtual-hosted bucket URLs (bucket.s3.region.amazonaws.com), dualstack endpoints (s3.dualstack.region.amazonaws.com), FIPS endpoints (s3-fips.region.amazonaws.com), and legacy dash-style endpoints (s3-region.amazonaws.com). Pasting a URL from the AWS Console no longer silently falls back to us-east-1.","**T3-4:** GuideMinIO in SetupGuide now includes an explicit mixed-content warning: browsers block HTTP requests from an HTTPS-served Bucketer to an HTTP MinIO server, and the error only appears in DevTools.","**T3-5:** GuideB2 now mentions that application keys must have the listAllBucketNames capability \u2014 a single-bucket key without it causes AWS SDK v3 initialisation to fail entirely.","**T3-6:** GuideR2 now tells users where to find their Account ID (dashboard sidebar), that a payment method is required even on the free tier, and the difference between account-scoped and bucket-scoped token scope."]},{version:"1.14.2",date:"2026-06-04",title:"Correctness and security fixes: settings preservation, resume parallelism, purge-all error recovery, endpoint URL guard, CSP docs",changes:["**T2-1:** clearCredentials() now only removes credential fields (endpoint, bucket, keyId, provider, regionOverride). Settings keys (partSize, concurrency, etc.) survive disconnect \u2014 split LS_KEYS into CREDENTIAL_KEYS and SETTINGS_KEYS; resetSettings() now uses the canonical SETTINGS_KEYS set.","**T2-2:** Multipart resume path now uses the same uploadPartsWithPool worker pool as fresh uploads, matching the configured PART_CONCURRENCY. Extracted helper exported from src/lib/upload-queue.js with unit tests asserting concurrency.","**T2-3:** HiddenVersions.handlePurgeAllConfirm now continues through all batches on S3 Errors entries instead of throwing on the first \u2014 reports aggregate failure count in the dialog rather than abandoning remaining batches silently.","**T2-4:** readUrlParams() now validates the endpoint parameter (must be a parseable http: or https: URL) and the bucket parameter (no slashes or .. traversal sequences). Prevents crafted share links from pre-filling the credential form with attacker-controlled values.","**T2-5:** Fixed README.md nginx and Caddy CSP examples to include img-src data: https:; media-src https:; frame-src https:;. Previous img-src data: only directive silently blocked all presigned S3 preview URLs. Added note about unsafe-inline being structurally required and a future hash-based alternative.","**T2-6:** handleDeleteConfirm in App.jsx now wraps runDeleteOperation in try/catch. An uncaught throw previously left the delete panel stuck in discovering or deleting phase indefinitely with no dismiss path."]},{version:"1.14.1",date:"2026-06-04",title:"Fix rename: add missing DeleteObjectCommand import; add Command import invariant",changes:["**Bug fix (T1-1):** Browser.jsx was missing DeleteObjectCommand from its @aws-sdk/client-s3 import. Every rename threw ReferenceError after the copy step succeeded, leaving a duplicate file. Lost during the v1.14.0 unified-delete refactor.","**Test invariant (T1-2):** Added source-level assertion to test/source-invariants.test.js that scans every src/ file importing from @aws-sdk/client-s3 and asserts every new XCommand() usage has a matching named import. Prevents this class of bug from silently shipping again."]},{version:"1.14.0",date:"2026-06-03",title:"Unified delete, preview prefetch, collapsible upload queue, global queue actions",changes:[{group:"Unified delete workflow",items:["Replaced three separate delete code paths (single-file, multi-file, multi-folder) with a single unified flow","All delete requests \u2014 one file, many files, one folder, many folders, or any mix \u2014 go through the same confirm \u2192 discover \u2192 delete \u2192 done pipeline","Folder checkboxes added to the file listing; select-all now covers both files and folders",'Batch bar counts files and folders separately ("X files, Y folders selected")',"Non-blocking execution: the confirm modal starts the operation then dismisses; progress appears in a panel in App.jsx that survives folder navigation (same pattern as UploadQueue)","Each delete operation shows spinner during discover/delete phases, \u2713 on clean completion (auto-dismisses after 3 s), \u2715 with expandable error detail on failure","Delete batches run at CONCURRENCY=8 (up from 3) with exponential-backoff retry on 503/429/SlowDown throttling responses",'Fixed: selection bar ("X files, Y folders selected") now clears as items are removed from the listing after a successful delete',"src/lib/delete-queue.js \u2014 new execution module","src/components/DeleteQueue.jsx \u2014 new UI component: confirm modal overlay + collapsible progress entries"]},{group:"Preview signed-URL cache",items:["Signed URLs for previewed items are cached for 55 minutes (5-minute buffer before the 1-hour expiry); re-opening the same file within that window skips the HeadObject and URL-signing round-trip entirely and lets the browser serve the image from its own HTTP cache","Cache is cleared on folder navigation to prevent unbounded growth"]},{group:"Preview prefetch",items:["After the current preview item loads, the next and previous items are prefetched in the background so navigation feels instant",'Level 1 (all previewable types): HeadObject + signed URL generated and cached \u2014 eliminates the "thinking" delay on navigation',"Level 2 (images and text): image content downloaded via a hidden Image element if within the configured size limit; text fetched via the existing range request and stored in the cache so navigation requires zero network activity","Audio, video, and PDF: Level 1 only \u2014 URL cached, no content download",'New setting "Preview prefetch" in Settings: Off / 1 MB / 5 MB (default) / 10 MB / 25 MB \u2014 takes effect immediately without a page reload']},{group:"Small image preview",items:["Images smaller than 128\xD7128 px now fill the preview container (object-fit: contain at 100% width/height) so they are no longer uselessly tiny","Images detected as pixel art (natural size < 128\xD7128) get image-rendering: pixelated so they scale up crisply without blurring"]},{group:"Collapsible upload queue",items:["Each batch of dropped/selected files is now a collapsible row in the upload panel, independent of other batches",'Batches with few files start expanded; larger batches start collapsed \u2014 configurable via new "Upload queue expand threshold" setting in Settings (default: 5)',"Collapsed view shows a one-liner summary (file count, progress, speed, ETA)","Batches auto-collapse 3 seconds after all files complete","A Dismiss button appears once a batch is fully settled (no active or queued items); removes it from the panel","Cancel button is now per-batch rather than clearing the entire queue",'Desktop notifications changed from per-file to one summary notification per batch when it settles ("3 files uploaded", "2 uploaded \xB7 1 failed", etc.)']},{group:"Global queue actions bar",items:["A compact action bar appears above the batch list when multiple batches are present or when actions span batches",'"Dismiss all done" \u2014 removes all settled batches in one click (shown when 2+ batches are fully settled)','"Retry all failed" \u2014 re-queues every failed item across all batches (shown when any item has error status)','"Cancel all" \u2014 cancels all active and queued batches; uses the same two-click confirm pattern as per-batch cancel (shown when any upload is active or queued)','"Collapse all" / "Expand all" \u2014 toggle visibility of all batch rows at once (shown when 2+ batches exist with at least 2 in the same state)']},{group:"Upload speed display improvements",items:["Batch transfer rate now uses a rolling 6-second derivative of confirmed bytes rather than summing per-item speeds; small files (single PutObject, no progress events) contribute the same as large files (continuous multipart updates), so the rate is accurate and uniform regardless of file size",'Completed items in the per-file list now show their measured average upload speed ("\u2713 Complete \xB7 2.1 MB/s"), giving a consistent display between in-progress large files and finished small files']},{group:"Browser extension upload blocking detection",items:['Uploads blocked by ad/content blockers (uBlock Origin, etc.) now show an actionable warning rather than a cryptic network error: "Request may have been blocked by a browser extension" with guidance to disable the extension for the page or allowlist the destination domain','Detection covers all three browsers: Firefox ("NetworkError when attempting to fetch resource"), Chrome ("Failed to fetch"), Safari ("Load failed"); correctly ignored when an HTTP response was received (genuine server errors are unaffected)']},{group:"Failed upload visibility",items:["Batches containing failed items now show a red left accent border, making them immediately scannable across a long queue without expanding anything","Failed items float to the top of their batch's expanded list so they are visible without scrolling",'Batches are force-expanded the first time an error appears, so failures are never hidden behind a collapsed "Show" button']},{group:"In-app changelog grouping",items:["The changelog modal now renders a second level of hierarchy: **Bold section headers** in CHANGELOG.md become labelled groups with their items nested beneath them; entries without headers render as a flat list as before (no change to older releases)"]},{group:"Upload queue bug fixes",items:['Fixed page freeze (Firefox "Script terminated by timeout") caused by Preact diffing 15 000+ UploadLog rows on every queue update; upload history now renders at most 200 rows (all entries still counted for summary stats)',"Fixed upload history panel popping in and out during active uploads; the panel no longer hides after initial load",'Fixed re-dragging a previously cancelled folder showing files as "paused"; cancel now deletes the IndexedDB resume record','Fixed race condition where cancelling a batch during the resume-record lookup could set cancelled items back to "paused"']}]},{version:"1.13.22",date:"2026-06-03",title:"Remove redundant preview button from file row actions",changes:["The filename is already clickable (accent colour, underline on hover) and opens","Removing it reduces the actions column from 5 buttons to 4"]},{version:"1.13.21",date:"2026-06-03",title:"Fix preview modal layout jank with fixed-height content stage",changes:["Preview content area now has a fixed height (clamp(300px, 70vh, 700px)) so the","Added --surface-raised background on the stage so the loading spinner and","Audio previews use a compact 140px stage instead of the full height; for files","Image and video max-height changed from 72vh to 100% \u2014 container is now","PDF height changed from 70vh to 100%; text preview fills and scrolls"]},{version:"1.13.20",date:"2026-06-03",title:"Parallelize DeleteObjectsCommand batches (3 concurrent)",changes:["Both batch-delete (selected files) and folder-delete now send up to 3","For a 10,000-object delete this reduces round-trips from 10 serial requests","Folder-delete uses per-batch .catch() so a single failing request does"]},{version:"1.13.19",date:"2026-06-03",title:"Batch rAF-aligned updateItem calls; add slow-mock latency option",changes:["Extracted createUpdateBatcher (src/lib/update-batcher.js) \u2014 coalesces","All 14 status-change updateItem call sites in UploadQueue.jsx now pass","Added 14 unit tests covering merge semantics, urgent/non-urgent paths, and","Added MOCK_S3_LATENCY_MS env var to perf/mock-s3.mjs for realistic","BatchSummary self-time: 877ms \u2192 724ms (\u221217%) at 1000 files, 0ms latency"]},{version:"1.13.18",date:"2026-06-03",title:"Replace 8 filter/reduce passes in BatchSummary with a single loop",changes:["Replaced 8 separate filter/reduce calls in BatchSummary (run on every"]},{version:"1.13.17",date:"2026-06-03",title:"Cache formatted timestamps in UploadLog and raise bench default to 1000 files",changes:["Added module-level Map cache to formatCompletedAt in UploadLog.jsx so","Changed default BENCH_FILES from 200 to 1000 in perf/bench-browser.mjs"]},{version:"1.13.16",date:"2026-06-03",title:"Throttle rAF animation loops to 15fps and skip when tab hidden",changes:["Both animation loops in UploadQueue.jsx (BatchSummary bytes counter and"]},{version:"1.13.15",date:"2026-06-03",title:"Use version string as build-id for deterministic builds",changes:["build-id meta tag now contains the version string (e.g. 1.13.15) instead"]},{version:"1.13.14",date:"2026-06-03",title:"Debounce setLogKey to eliminate dominant CPU hotspot",changes:["Debounced onLogEntry callback in App.jsx (fires at most every 500ms) to"]},{version:"1.13.13",date:"2026-06-03",title:"Add performance benchmarking harness and unify build modes",changes:["Added npm run perftest \u2014 full browser benchmark using Playwright + CDP profiling","Added npm run bench \u2014 fast algorithmic microbenchmarks (no browser required)","Unified build configuration in build.mjs with explicit --mode=prod|dev|perf;","Simplified serve.mjs to delegate build logic to build.mjs --mode=dev","Perf builds write to perf/index.html; dist/ is never touched by benchmarks","Added data-testid attributes to upload queue file input and completion indicator"]},{version:"1.13.12",date:"2026-06-03",title:"Add design-intent documentation for all components and libraries",changes:["Added docs/intent/ documentation set (baseline v1.11.3): architecture overview,"]},{version:"1.13.11",date:"2026-06-03",title:"Fix file concurrency setting not taking effect mid-queue",changes:["Changing the file concurrency setting while uploads are in progress had","Fix: re-read loadFileConcurrency() in runUpload's finally block,"]},{version:"1.13.10",date:"2026-06-03",title:"Add per-queue desktop notification mute toggle",changes:['Add "Notifs on / Notifs off" toggle button to the batch summary header.',"State is queue-scoped (resets when the queue is cleared) and does not"]},{version:"1.13.9",date:"2026-06-03",title:"Fix profile save capturing empty fields and clearing the form",changes:["handleSaveProfile was reading from credentials state (only updated","Fix: build the profile from liveFormData; sync credentials after"]},{version:"1.13.8",date:"2026-06-03",title:"Trim surrounding whitespace from pasted credential values",changes:["Pasting a value with leading or trailing whitespace into any credential"]},{version:"1.13.7",date:"2026-06-03",title:"Fix profile save button not enabling as form is filled",changes:['"Save as profile\u2026" was always disabled while typing because ProfilePicker']},{version:"1.13.6",date:"2026-06-03",title:"Fix Wasabi bare endpoint region auto-detection",changes:["s3.wasabisys.com (no region segment) is Wasabi's documented legacy"]},{version:"1.13.5",date:"2026-06-03",title:"Add serve link to file:// banner and fix banner link color",changes:['Add a "Run npm run serve for a local server" link to the file://',"Set .banner a color to --accent so links in banners are readable"]},{version:"1.13.4",date:"2026-06-03",title:"Require valid fields before saving a profile",changes:['Disable "Save as profile\u2026" button unless endpoint is a valid URL,',"Add canSaveProfile() to credential-validation.js (pure, tested).","Disabled button shows a tooltip explaining what is needed.","Add 13 new tests for canSaveProfile covering presence, URL validity,"]},{version:"1.13.3",date:"2026-06-03",title:"Storage & Privacy viewer",changes:['Add "Storage & Privacy" modal (footer link, always accessible regardless of',"Six collapsible sections: Connection, Saved Profiles, Upload History,",'Secret key shown as presence indicator only ("Present (session only)" /','"Clear All App Data" removes every localStorage, sessionStorage, and IndexedDB',"New wipeAllAppData(), resetSettings(), deleteAllProfiles() in storage.js.","New loadAllResumeRecords(), clearAllResumeRecords(), deleteDatabase(),","Storage catalog documented in docs/storage-catalog.md; feature design in"]},{version:"1.13.2",date:"2026-06-03",title:"Fix saved profile not populating form fields on load",changes:["Fix: selecting a saved profile after disconnect left the credential form blank.","Mount useEffect now uses profile data as the base for auto-connect, matching"]},{version:"1.13.1",date:"2026-06-03",title:"Credential field validation and storage write-boundary enforcement (BUG-016)",changes:["Add repairStorageInvariants(): runs on every mount before migration; clears","loadCredentials(): sanitize provider on read \u2014 return null for any value that","saveCredentials(): sanitize provider on write \u2014 write '' if the value is","readUrlParams(): validate provider hash param before accepting \u2014 ignore any","CredentialForm: inline validation errors block submit when key ID, secret key,","Extract credentialErrors() to src/lib/credential-validation.js (pure, tested)","Add 27 new tests across storage, url-params, and credential-validation suites"]},{version:"1.13.0",date:"2026-06-02",title:"Multi-profile credential management",changes:["Add named profile storage: save N connection profiles (endpoint, bucket, key ID,","Profile picker on connect screen: select a saved profile to pre-fill the form",'"Save as profile" explicit action with user-defined display name',"Delete profile from picker","Silent migration: existing credentials become a named default profile on first load","Current profile name shown in connected sidebar","Storage layer: versioned envelope ({ version: 1, profiles: [] }), upsert primitive,","Profile keys stored outside LS_KEYS so clearCredentials() does not wipe them"]},{version:"1.12.24",date:"2026-06-02",title:"Make background update check toggleable in settings",changes:["Add loadUpdateCheckEnabled / saveUpdateCheckEnabled to storage.js","UpdateBanner accepts enabled prop; polling starts/stops reactively via useEffect dependency",'SettingsPanel exposes a "Background update checks" checkbox with immediate effect (no Save needed)',"Defaults to enabled \u2014 no behaviour change for existing users"]},{version:"1.12.23",date:"2026-06-02",title:"Add live instance link and canonical repo note to README",changes:['Add "Try it live" link to bucketer.hidayahtech.net and canonical GitLab repo reference below the badges']},{version:"1.12.22",date:"2026-06-02",title:"Add About modal and expand README intro",changes:["Add AboutModal component with five-pitch product overview and personal author note",'About modal accessible from footer "About" link and splash screen "Learn more \u2192"','Splash screen "About Bucketer" section replaced with full narrative description',"README intro rebuilt: five-pitch marketing section, narrative, author note with Palestine solidarity statement","Save prose narrative to docs/narrative-description.md for reuse elsewhere"]},{version:"1.12.21",date:"2026-06-02",title:"Expand app title to full descriptive name",changes:["Set appTitle constant in build.mjs as single source for <title>, og:title, and twitter:title",'Title is now "Bucketer \u2014 In-Browser S3-Compatible Bucket Manager" across all three tags']},{version:"1.12.20",date:"2026-06-02",title:"Add Open Graph meta tags and OG preview image",changes:["Add og:title, og:description, og:image, og:url, and Twitter Card meta tags to src/index.html","Add src/assets/og-image.png (1200\xD7630, optimized with oxipng) for link preview cards","Update build.mjs to copy og-image.png to dist/ on every build"]},{version:"1.12.19",date:"2026-06-02",title:"Inline header logo as component",changes:["Convert header logo from static <img> to inline Preact component","Bump logo size to 3rem for better visibility"]},{version:"1.12.18",date:"2026-06-01",title:"Update footer with Bucketer repo link",changes:['Footer now reads "Bucketer \u2014 Copyright \xA9 2026 HidayahTech, LLC"','"Bucketer" links to the canonical GitLab repo so visitors can find the source']},{version:"1.12.17",date:"2026-06-01",title:"Fix version tag push timing",changes:["Fix pre-push hook so version tags are pushed immediately rather than one commit late","Hook now explicitly pushes the new tag itself instead of relying on push.followTags","Tag-only recursive pushes skip the build/test cycle to avoid redundant work"]},{version:"1.12.16",date:"2026-06-01",title:"Upstream release check in changelog",changes:['Add "Check for upstream release" button to the changelog modal',"Fetches the latest GitLab release via API and displays the release badge alongside a status line (up to date / update available with link)","Result is cached for the duration of the tab session"]},{version:"1.12.15",date:"2026-06-01",title:"README badges",changes:["Add pipeline status, latest release, and AGPL v3 license badges to README"]},{version:"1.12.14",date:"2026-06-01",title:"CI release job",changes:["Added scripts/release.mjs \u2014 uploads dist/index.html to the Package Registry and creates a GitLab Release with CHANGELOG description and asset link",".gitlab-ci.yml now has two stages: test and release","Release job runs only on version tags (v*.*.*), depends on the test job, uses CI_JOB_TOKEN (no PAT needed)","Test job passes dist/index.html as an artifact to the release job"]},{version:"1.12.13",date:"2026-06-01",title:"Auto-tag on push",changes:["Pre-push hook now runs npm run build before npm test (full local validation)","Pre-push hook auto-creates an annotated version tag if one does not exist for the current package.json version","push.followTags true configured by npm install via the prepare script \u2014 tags travel with every push automatically","CLAUDE.md updated to document the tagging guarantee"]},{version:"1.12.12",date:"2026-06-01",title:"Build before test in GitLab CI",changes:["GitLab CI now runs npm run build before npm test","CI validates the build from source in a clean environment, then tests its own output rather than the committed dist file"]},{version:"1.12.11",date:"2026-06-01",title:"Link copyright footer to HidayahTech website",changes:["Copyright notice in the app footer now links to https://hidayahtech.com","Link inherits the muted footer color; accent color on hover"]},{version:"1.12.10",date:"2026-06-01",title:"Add copyright footer to app UI",changes:['Added a footer bar at the bottom of the app displaying "Copyright \xA9 2026 HidayahTech, LLC"',"Styled with --text-muted and a top border; adapts to dark mode automatically"]},{version:"1.12.9",date:"2026-06-01",title:"Add copyright notices",changes:["Added Copyright (C) 2026 HidayahTech, LLC to the top of all 24 source files (src/**/*.js, src/**/*.jsx)","build.mjs injects the notice into the generated src/lib/changelog.js so it survives rebuilds","Added copyright line to top of LICENSE file","Added License section to README.md with copyright and AGPL-3.0 reference"]},{version:"1.12.8",date:"2026-06-01",title:"Extract preparePutBody and add BUG-003 tests",changes:["Extracted preparePutBody(file) from UploadQueue.jsx into src/lib/upload-queue.js (exported)","uploadSmall now calls preparePutBody(file) instead of inlining the conversion","BUG-003 regression tests added to test/calc-part-size.test.js: returns Uint8Array, never Blob, content preserved, empty file produces empty array","Added **Coverage:** line for BUG-003 in BUG-LOG.md","Test count: 272 \u2192 276"]},{version:"1.12.7",date:"2026-06-01",title:"Document test suite in CLAUDE.md and update BUG-LOG",changes:['Added "Test Suite" section to CLAUDE.md: lists all 14 test files with their scope, explains the two-layer structure (unit vs build-output), and documents how to add new tests',"Updated BUG-LOG.md: added **Coverage:** lines to BUG-001, BUG-002, BUG-007, BUG-008, BUG-012, BUG-013, BUG-015 linking each to its implementing test file and suite"]},{version:"1.12.6",date:"2026-06-01",title:"Fill remaining test gaps",changes:["mimeType() tests added to test/media.test.js: 11 tests covering MIME type lookup, case-insensitivity, unknown/no-extension returns null, nested path handling","Upload log tests added to test/indexeddb-storage.test.js: saveUploadLogEntry, loadUploadLog (newest-first ordering, field preservation), clearUploadLog","Test count: 256 \u2192 272"]},{version:"1.12.5",date:"2026-06-01",title:"Extract corsJson and buildFileIdentityWithHash; add tests",changes:["Extracted corsJson(origin) from SetupGuide.jsx into src/lib/cors-config.js (exported)","New test/cors-config.test.js: 11 tests \u2014 structure, AllowedMethods (BUG-012), AllowedHeaders (SDK headers must be explicit), ExposeHeaders","Extracted buildFileIdentityWithHash(file) into src/lib/indexeddb.js (exported); UploadQueue.jsx now calls it instead of inlining the three-line pattern","BUG-008 regression tests added to test/indexeddb-storage.test.js: contentHash present, deterministic, content-sensitive","The SDK headers amz-sdk-invocation-id and amz-sdk-request must appear explicitly \u2014 the x-amz-* wildcard does not cover them"]},{version:"1.12.4",date:"2026-06-01",title:"Extract collectParts and add BUG-007 tests",changes:["Extracted collectParts(client, {bucket, key, uploadId}) from UploadQueue.jsx into src/lib/upload-queue.js (exported)","ListPartsCommand import moved from the component to the lib module","New test/collect-parts.test.js: 7 tests using a mock S3 client","BUG-007 regression tests: two-page and three-page pagination, stops on IsTruncated=false, handles missing Parts field, preserves ETag through pagination"]},{version:"1.12.3",date:"2026-06-01",title:"Add s3-client.js tests",changes:["New test/s3-client.test.js: 12 tests for createS3Client region resolution and forcePathStyle","Region priority: regionOverride > extractRegion() > us-east-1 fallback; all three tiers tested","R2 region is always auto; B2 and AWS extract from endpoint subdomain","forcePathStyle true for B2 and MinIO; false for R2, AWS, generic"]},{version:"1.12.2",date:"2026-06-01",title:"Add file-entries.js tests",changes:["New test/file-entries.test.js: 10 tests for collectFileEntries using a pure JS FileSystemEntry mock","Flat list, nested folder traversal, mixed root entries, and correct relative path construction","Pagination invariant: folders with 150 and 250 files (simulated with batches of 100) must collect all entries \u2014 not just the first 100","Error resilience: unreadable file entries are silently skipped without throwing"]},{version:"1.12.1",date:"2026-06-01",title:"Add storage.js tests",changes:["New test/storage.test.js: 23 tests covering the full credential and settings persistence layer","Security invariant: secretKey must go to sessionStorage, not localStorage; asserted at the storage-value level","Credential round-trip: all fields saved and loaded correctly; provider returns null (not empty string) when absent","clearCredentials wipes both stores; clearCapabilities resets to defaults","Settings round-trips for all settings functions: maxKeys, partConcurrency, partSizeMB, fileConcurrency","listingCacheTTL edge case: 0 (disable cache) must not be treated as falsy \u2014 checked explicitly","loadCapabilities returns defaults when storage is empty or contains corrupted JSON"]},{version:"1.12.0",date:"2026-06-01",title:"IndexedDB resume record and file hash tests",changes:["Added fake-indexeddb as devDependency to provide an in-memory IndexedDB in Node","New test/indexeddb-storage.test.js: 11 tests covering saveResumeRecord, loadResumeRecord, deleteResumeRecord, and computeFileHash","Resume record tests: round-trip fidelity, null return for missing key, overwrite at same key, independent keys","Delete tests: removal confirmed, no-op delete resolves cleanly, sibling keys are preserved","computeFileHash tests: determinism, content sensitivity, and the partial-hash invariant (only head+tail 64 KB are hashed \u2014 two files with identical endpoints but different middle produce the same hash)"]},{version:"1.11.9",date:"2026-06-01",title:"Extract calcPartSize and add tests",changes:["Moved calcPartSize from UploadQueue.jsx into src/lib/upload-queue.js (exported) so it can be tested without loading JSX","New test/calc-part-size.test.js: 11 tests covering the 5 MB floor, 10,000-part ceiling, preferred size override, and falsy preferred values","Also fixed test/build.test.js to operate on the HTML frame and JS bundle separately \u2014 whole-file string matching produced false positives when changelog text contained tag-like strings as data"]},{version:"1.11.8",date:"2026-06-01",title:"Add build output structural tests",changes:["New test/build.test.js: 14 assertions on dist/index.html verifying production build invariants","BUG-001 regression: placeholder must not survive into dist; output must be a valid HTML document","BUG-002 regression: Preact JSX transform must be active; no React runtime artifacts in output","BUG-012 regression: CORS template must include DELETE in AllowedMethods","Version consistency: app-version meta tag must match package.json version","Single-bundle assertions: HTML frame has no injected tags before the bundle; no external script or stylesheet references"]},{version:"1.11.7",date:"2026-06-01",title:"Add indexeddb pure-function tests",changes:["New test/indexeddb-pure.test.js: 18 tests covering pure functions and localStorage-based tab conflict detection","BUG-015 regression tests: uploadExpiryWarningMs('b2') must return null; R2 and generic must return 7 days","buildFileIdentity and fileIdentityMatches: identity construction and all three mismatch cases","Tab conflict detection: this-tab vs other-tab discrimination, inactive cleanup, multi-key independence, other-tab entry not removed by this tab's markUploadInactive"]},{version:"1.11.6",date:"2026-06-01",title:"Add url-params test suite",changes:["New test/url-params.test.js: 19 tests covering buildShareUrl, readUrlParams, hasUrlParams, and pushPrefixHistory","BUG-013 regression test: params must live in the hash fragment, never the query string","Credential exclusion test: keyId and secretKey must never appear in share URLs","pushPrefixHistory tests: hash vs query string, pushState vs replaceState, param preservation, root navigation removes prefix key"]},{version:"1.11.5",date:"2026-06-01",title:"Improve test suite quality",changes:["Removed redundant lookup-table assertions from media.test.js; kept one representative per category plus tests that exercise actual logic (case-insensitivity, path handling, charset stripping)","Added explicit HTML/JS security invariant tests to mediaKind and mimeKind (these kinds must resolve to 'text', never a rendered type)","Added hostname false-positive tests to detectProvider: provider domain in a URL path or as a hostname suffix must not match","Added MinIO and DO Spaces to defaultMaxKeys coverage","Added Code-vs-name precedence test to parseS3Error","Removed misleading BUG-007 comment from leafName tests",'Removed "all tasks eventually complete" from UploadQueue tests (no specific invariant)',"Test count: 133 \u2192 117 (16 removed were duplicate code-path assertions)"]},{version:"1.11.4",date:"2026-06-01",title:"Apply intent comments to all source files",changes:["Added WHY-focused comments to all JS/JSX source files documenting design intent, spec references, and non-obvious invariants","Covers all 9 lib/ modules and all 14 components including Browser.jsx and UploadQueue.jsx","Key invariants documented: resume record saved before first part upload, text preview forces text/plain for security, listing cache invalidated on every mutation, rename uses copy-before-delete, dragCounter debounce for nested drag events"]},{version:"1.11.3",date:"2026-06-01",title:"Anchor provider detection to hostname",changes:["Provider detection now parses the endpoint URL and tests patterns against the hostname only, preventing false matches on paths or query strings","Detection regexes anchored with $ to prevent suffix-based misdetection"]},{version:"1.11.2",date:"2026-06-01",title:"Document update poller in README",changes:["Expanded security model section to explicitly state the update poll targets the app's own URL only, never a third-party host, and stops once a new build is detected"]},{version:"1.11.1",date:"2026-06-01",title:"Sandbox PDF preview iframe",changes:['Added sandbox="" to the PDF preview <iframe> \u2014 disables scripts, forms, popups, same-origin access, and top navigation; native PDF rendering is unaffected']},{version:"1.11.0",date:"2026-06-01",title:"SVG favicon, drop favicon.ico",changes:["Favicon is now an inline SVG data URL \u2014 the same SVG already imported for the app logo is reused, adding zero bytes to the bundle","dist/favicon.ico removed from the repo; ImageMagick build dependency dropped",`<link rel="icon"> in the HTML shell carries a placeholder href="data:image/svg+xml," to suppress the browser's default /favicon.ico auto-request before JS runs`,"JS overwrites the placeholder with the real logo URL at module init; null-guarded to prevent a crash if the element is ever absent","Updated README: dist/favicon.ico is no longer committed"]},{version:"1.10.9",date:"2026-06-01",title:"Tighten Caddy CSP connect-src",changes:["Caddy deployment example now uses the same scoped connect-src provider list as the nginx example, replacing the permissive connect-src https: (any HTTPS host)"]},{version:"1.10.8",date:"2026-06-01",title:"Add security model section to README",changes:['Added "Security model" section to README covering trust boundaries, credential storage, and the role of connect-src CSP as a mitigation against dependency exfiltration']},{version:"1.10.7",date:"2026-06-01",title:"Move internal planning docs to docs/",changes:["Moved IMPROVEMENT-PLAN.md, SPEC-DRIFT.md, QUESTIONS.md, TODO.md, and s3-browser-spec-v0.15.md from the repo root into docs/"]},{version:"1.10.6",date:"2026-06-01",title:"Drop full fetch from update checker",changes:["Update checker no longer pre-fetches the full page when a new build is detected","app-version is now extracted from the same 512-byte range fetch as build-id (both are within the range boundary guaranteed by the build invariant)","Polling stops as soon as a different build-id is confirmed; the user decides when to reload"]},{version:"1.10.5",date:"2026-06-01",title:"Unified changelog pipeline",changes:["CHANGELOG.md is now the single source of truth for version history \u2014 src/lib/changelog.js is generated by build.mjs on every build and must not be edited directly","Changelog headings now carry a title field: ## [version] \u2014 date \u2014 Title","Build fails if package.json version does not match the top CHANGELOG.md entry","Added missing v1.10.1 entry to CHANGELOG.md"]},{version:"1.10.4",date:"2026-06-01",title:"AGPL-3.0 license",changes:["Added LICENSE file: GNU Affero General Public License v3.0 (AGPL-3.0)"]},{version:"1.10.3",date:"2026-06-01",title:"README correction",changes:["Fixed README: dist/index.html and dist/favicon.ico are committed to the repo (not gitignored) \u2014 updated docs to reflect this and explain the rationale (auditability)"]},{version:"1.10.2",date:"2026-05-31",title:"Developer tooling cleanup",changes:["Moved @anthropic-ai/claude-code out of project dependencies into a gitignored .tools/ directory \u2014 it no longer appears in package.json or package-lock.json","Added .tools/ to .gitignore","Updated CLAUDE.md with Claude Code setup instructions and corrected the workflow note about the package"]},{version:"1.10.1",date:"2026-05-28",title:"Spec drift documentation",changes:["Added SPEC-DRIFT.md \u2014 documents all implementation drift from spec v0.15, including features implemented beyond original scope"]},{version:"1.10.0",date:"2026-05-28",title:"Smarter update check",changes:["Update check now uses a HEAD request as a fast first step \u2014 if ETag/Last-Modified headers match, no body is fetched at all","Falls back to a 512-byte Range request to compare build IDs when HEAD is inconclusive, instead of fetching the full page every poll","Once a real update is confirmed, fetches the full page with default cache mode so the browser can cache it for the user's subsequent reload",'Update banner now shows the specific version number: "Version 1.10.0 is available."']},{version:"1.9.0",date:"2026-05-28",title:"Build invariants and app-version metadata",changes:['App version is now embedded in the built HTML as a <meta name="app-version"> tag, available to the update checker',"Build script enforces a build invariants check: both build-id and app-version meta tags must fall within the first 512 bytes of the output, matching the update checker's range fetch boundary","Build fails loudly with a clear message if a structural change would push metadata past the byte limit"]},{version:"1.8.0",date:"2026-05-28",title:"Listing cache and refresh button",changes:["Folder listings are cached in memory to avoid redundant network calls when revisiting folders","Cache TTL is configurable in Settings: Off, 30 s, 2 min (default), or 10 min","Mutations (delete, rename, create folder, upload) always invalidate the cache for the affected folder","Refresh button (\u21BA) in the browser toolbar forces a fresh listing regardless of cache state","Cache is session-scoped (in-memory only) and resets on reconnect \u2014 no stale data across sessions"]},{version:"1.7.0",date:"2026-05-28",title:"Dark mode",changes:["Full dark mode support via prefers-color-scheme: dark \u2014 no manual toggle needed","All UI surfaces, modals, tables, and status indicators adapt automatically to the system theme"]},{version:"1.6.0",date:"2026-05-28",title:"Drag-and-drop upload",changes:["Files and folders can now be dropped directly onto the file browser to queue them for upload","Visual drop target overlay appears while dragging over the browser area","Folder drops preserve directory structure (same as the upload queue's folder picker)","Dropped files are queued into the existing upload queue targeting the current folder"]},{version:"1.5.0",date:"2026-05-28",title:"File properties panel",changes:["Properties button (\u2139) on each file row opens a panel showing HeadObject metadata","Displays Content-Type, file size, last modified date, ETag, storage class, version ID, and any custom x-amz-meta-* headers"]},{version:"1.4.0",date:"2026-05-28",title:"Rename files",changes:["Rename button (\u270E) on each file row activates an inline edit field","Confirm with Enter or the \u2713 button; cancel with Escape or \u2715","Validates that the new name is non-empty, contains no slashes, and is not already taken","Implemented as a server-side copy + delete to preserve all object metadata"]},{version:"1.3.0",date:"2026-05-28",title:"Multi-select and batch operations",changes:["Checkboxes on file rows and a select-all header checkbox for bulk selection","Batch delete: confirm and delete all selected files in one operation","Batch copy links: generate presigned URLs for all selected files (one per line) with the same duration picker as single-file copy","Selection is cleared automatically on folder navigation"]},{version:"1.2.0",date:"2026-05-28",title:"Create folder",changes:["New folder button in the browser toolbar creates a folder at the current prefix","Validates the name (no slashes, no duplicates) before creating","Folder appears immediately in the listing without a full reload"]},{version:"1.1.0",date:"2026-05-28",title:"Filter and search",changes:["Filter bar above the file table to search files and folders by name in real time","Shows a match count (X of Y) when a filter is active","Filter resets automatically when navigating into a different folder","Preview navigation respects the active filter so arrow keys stay within results"]},{version:"1.0.0",date:"2026-05-28",title:"Initial release",changes:["Object browser with folder navigation, sorting by name/size/date, and paginated listing","File preview for images, audio, video, PDF, and plain text (100 KB cap)","File upload with queue management, per-file progress, and editable destination folder","Download files via presigned S3 URLs","Copy shareable link with configurable expiry: 1 hr / 24 hr / 7 days / custom duration","Delete individual files and folders with progress reporting","Support for AWS S3, Backblaze B2, Cloudflare R2, and other S3-compatible providers","Credentials stored locally in browser (IndexedDB) \u2014 never sent to any server","Permission capability detection for list, download, upload, and delete operations","Shareable connection URL (endpoint + bucket, no credentials)"]}];var MG=[{id:"sha256",subtleName:"SHA-256"}],LG="hidayahtech%2Fbucketer";function NG(e){return`https://gitlab.com/api/v4/projects/${LG}/packages/generic/bucketer/${e}/bucketer-v${e}.integrity.json`}function UG(e){let t=new Uint8Array(e),r="";for(let n=0;n<t.length;n++)r+=t[n].toString(16).padStart(2,"0");return r}async function o3({version:e,pageUrl:t,fetchFn:r,subtle:n}){let o;try{let p=await r(t,{cache:"no-store"});if(!p.ok)return{status:"network-error",version:e,message:`Page fetch returned HTTP ${p.status}`};o=await p.arrayBuffer()}catch(p){return{status:"network-error",version:e,message:`Page fetch failed: ${p.message}`}}let i;try{let p=await r(NG(e));if(p.status===404)return{status:"no-manifest",version:e};if(!p.ok)return{status:"network-error",version:e,message:`Manifest fetch returned HTTP ${p.status}`};i=await p.json()}catch(p){return{status:"network-error",version:e,message:`Manifest fetch failed: ${p.message}`}}let a=i&&i.hashes;if(!a||typeof a!="object")return{status:"network-error",version:e,message:"Manifest missing hashes object"};let l=MG.find(p=>typeof a[p.id]=="string");if(!l)return{status:"unknown-algorithm",version:e,algorithms:Object.keys(a)};let d=a[l.id],u=await n.digest(l.subtleName,o),m=UG(u);return m===d?{status:"match",version:e,algorithm:l.id,hash:m}:{status:"mismatch",version:e,algorithm:l.id,actual:m,expected:d}}function $G({version:e,pageUrl:t}){return o3({version:e,pageUrl:t,fetchFn:window.fetch.bind(window),subtle:window.crypto.subtle})}function FG(){let e=document.querySelector('meta[name="app-version"]');return e?e.getAttribute("content"):null}function F0(e){return e.length>16?e.slice(0,16)+"\u2026":e}functi
