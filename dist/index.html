ersion","push.followTags true configured by npm install via the prepare script \u2014 tags travel with every push automatically","CLAUDE.md updated to document the tagging guarantee"]},{version:"1.12.12",date:"2026-06-01",title:"Build before test in GitLab CI",changes:["GitLab CI now runs npm run build before npm test","CI validates the build from source in a clean environment, then tests its own output rather than the committed dist file"]},{version:"1.12.11",date:"2026-06-01",title:"Link copyright footer to HidayahTech website",changes:["Copyright notice in the app footer now links to https://hidayahtech.com","Link inherits the muted footer color; accent color on hover"]},{version:"1.12.10",date:"2026-06-01",title:"Add copyright footer to app UI",changes:['Added a footer bar at the bottom of the app displaying "Copyright \xA9 2026 HidayahTech, LLC"',"Styled with --text-muted and a top border; adapts to dark mode automatically"]},{version:"1.12.9",date:"2026-06-01",title:"Add copyright notices",changes:["Added Copyright (C) 2026 HidayahTech, LLC to the top of all 24 source files (src/**/*.js, src/**/*.jsx)","build.mjs injects the notice into the generated src/lib/changelog.js so it survives rebuilds","Added copyright line to top of LICENSE file","Added License section to README.md with copyright and AGPL-3.0 reference"]},{version:"1.12.8",date:"2026-06-01",title:"Extract preparePutBody and add BUG-003 tests",changes:["Extracted preparePutBody(file) from UploadQueue.jsx into src/lib/upload-queue.js (exported)","uploadSmall now calls preparePutBody(file) instead of inlining the conversion","BUG-003 regression tests added to test/calc-part-size.test.js: returns Uint8Array, never Blob, content preserved, empty file produces empty array","Added **Coverage:** line for BUG-003 in BUG-LOG.md","Test count: 272 \u2192 276"]},{version:"1.12.7",date:"2026-06-01",title:"Document test suite in CLAUDE.md and update BUG-LOG",changes:['Added "Test Suite" section to CLAUDE.md: lists all 14 test files with their scope, explains the two-layer structure (unit vs build-output), and documents how to add new tests',"Updated BUG-LOG.md: added **Coverage:** lines to BUG-001, BUG-002, BUG-007, BUG-008, BUG-012, BUG-013, BUG-015 linking each to its implementing test file and suite"]},{version:"1.12.6",date:"2026-06-01",title:"Fill remaining test gaps",changes:["mimeType() tests added to test/media.test.js: 11 tests covering MIME type lookup, case-insensitivity, unknown/no-extension returns null, nested path handling","Upload log tests added to test/indexeddb-storage.test.js: saveUploadLogEntry, loadUploadLog (newest-first ordering, field preservation), clearUploadLog","Test count: 256 \u2192 272"]},{version:"1.12.5",date:"2026-06-01",title:"Extract corsJson and buildFileIdentityWithHash; add tests",changes:["Extracted corsJson(origin) from SetupGuide.jsx into src/lib/cors-config.js (exported)","New test/cors-config.test.js: 11 tests \u2014 structure, AllowedMethods (BUG-012), AllowedHeaders (SDK headers must be explicit), ExposeHeaders","Extracted buildFileIdentityWithHash(file) into src/lib/indexeddb.js (exported); UploadQueue.jsx now calls it instead of inlining the three-line pattern","BUG-008 regression tests added to test/indexeddb-storage.test.js: contentHash present, deterministic, content-sensitive","The SDK headers amz-sdk-invocation-id and amz-sdk-request must appear explicitly \u2014 the x-amz-* wildcard does not cover them"]},{version:"1.12.4",date:"2026-06-01",title:"Extract collectParts and add BUG-007 tests",changes:["Extracted collectParts(client, {bucket, key, uploadId}) from UploadQueue.jsx into src/lib/upload-queue.js (exported)","ListPartsCommand import moved from the component to the lib module","New test/collect-parts.test.js: 7 tests using a mock S3 client","BUG-007 regression tests: two-page and three-page pagination, stops on IsTruncated=false, handles missing Parts field, preserves ETag through pagination"]},{version:"1.12.3",date:"2026-06-01",title:"Add s3-client.js tests",changes:["New test/s3-client.test.js: 12 tests for createS3Client region resolution and forcePathStyle","Region priority: regionOverride > extractRegion() > us-east-1 fallback; all three tiers tested","R2 region is always auto; B2 and AWS extract from endpoint subdomain","forcePathStyle true for B2 and MinIO; false for R2, AWS, generic"]},{version:"1.12.2",date:"2026-06-01",title:"Add file-entries.js tests",changes:["New test/file-entries.test.js: 10 tests for collectFileEntries using a pure JS FileSystemEntry mock","Flat list, nested folder traversal, mixed root entries, and correct relative path construction","Pagination invariant: folders with 150 and 250 files (simulated with batches of 100) must collect all entries \u2014 not just the first 100","Error resilience: unreadable file entries are silently skipped without throwing"]},{version:"1.12.1",date:"2026-06-01",title:"Add storage.js tests",changes:["New test/storage.test.js: 23 tests covering the full credential and settings persistence layer","Security invariant: secretKey must go to sessionStorage, not localStorage; asserted at the storage-value level","Credential round-trip: all fields saved and loaded correctly; provider returns null (not empty string) when absent","clearCredentials wipes both stores; clearCapabilities resets to defaults","Settings round-trips for all settings functions: maxKeys, partConcurrency, partSizeMB, fileConcurrency","listingCacheTTL edge case: 0 (disable cache) must not be treated as falsy \u2014 checked explicitly","loadCapabilities returns defaults when storage is empty or contains corrupted JSON"]},{version:"1.12.0",date:"2026-06-01",title:"IndexedDB resume record and file hash tests",changes:["Added fake-indexeddb as devDependency to provide an in-memory IndexedDB in Node","New test/indexeddb-storage.test.js: 11 tests covering saveResumeRecord, loadResumeRecord, deleteResumeRecord, and computeFileHash","Resume record tests: round-trip fidelity, null return for missing key, overwrite at same key, independent keys","Delete tests: removal confirmed, no-op delete resolves cleanly, sibling keys are preserved","computeFileHash tests: determinism, content sensitivity, and the partial-hash invariant (only head+tail 64 KB are hashed \u2014 two files with identical endpoints but different middle produce the same hash)"]},{version:"1.11.9",date:"2026-06-01",title:"Extract calcPartSize and add tests",changes:["Moved calcPartSize from UploadQueue.jsx into src/lib/upload-queue.js (exported) so it can be tested without loading JSX","New test/calc-part-size.test.js: 11 tests covering the 5 MB floor, 10,000-part ceiling, preferred size override, and falsy preferred values","Also fixed test/build.test.js to operate on the HTML frame and JS bundle separately \u2014 whole-file string matching produced false positives when changelog text contained tag-like strings as data"]},{version:"1.11.8",date:"2026-06-01",title:"Add build output structural tests",changes:["New test/build.test.js: 14 assertions on dist/index.html verifying production build invariants","BUG-001 regression: placeholder must not survive into dist; output must be a valid HTML document","BUG-002 regression: Preact JSX transform must be active; no React runtime artifacts in output","BUG-012 regression: CORS template must include DELETE in AllowedMethods","Version consistency: app-version meta tag must match package.json version","Single-bundle assertions: HTML frame has no injected tags before the bundle; no external script or stylesheet references"]},{version:"1.11.7",date:"2026-06-01",title:"Add indexeddb pure-function tests",changes:["New test/indexeddb-pure.test.js: 18 tests covering pure functions and localStorage-based tab conflict detection","BUG-015 regression tests: uploadExpiryWarningMs('b2') must return null; R2 and generic must return 7 days","buildFileIdentity and fileIdentityMatches: identity construction and all three mismatch cases","Tab conflict detection: this-tab vs other-tab discrimination, inactive cleanup, multi-key independence, other-tab entry not removed by this tab's markUploadInactive"]},{version:"1.11.6",date:"2026-06-01",title:"Add url-params test suite",changes:["New test/url-params.test.js: 19 tests covering buildShareUrl, readUrlParams, hasUrlParams, and pushPrefixHistory","BUG-013 regression test: params must live in the hash fragment, never the query string","Credential exclusion test: keyId and secretKey must never appear in share URLs","pushPrefixHistory tests: hash vs query string, pushState vs replaceState, param preservation, root navigation removes prefix key"]},{version:"1.11.5",date:"2026-06-01",title:"Improve test suite quality",changes:["Removed redundant lookup-table assertions from media.test.js; kept one representative per category plus tests that exercise actual logic (case-insensitivity, path handling, charset stripping)","Added explicit HTML/JS security invariant tests to mediaKind and mimeKind (these kinds must resolve to 'text', never a rendered type)","Added hostname false-positive tests to detectProvider: provider domain in a URL path or as a hostname suffix must not match","Added MinIO and DO Spaces to defaultMaxKeys coverage","Added Code-vs-name precedence test to parseS3Error","Removed misleading BUG-007 comment from leafName tests",'Removed "all tasks eventually complete" from UploadQueue tests (no specific invariant)',"Test count: 133 \u2192 117 (16 removed were duplicate code-path assertions)"]},{version:"1.11.4",date:"2026-06-01",title:"Apply intent comments to all source files",changes:["Added WHY-focused comments to all JS/JSX source files documenting design intent, spec references, and non-obvious invariants","Covers all 9 lib/ modules and all 14 components including Browser.jsx and UploadQueue.jsx","Key invariants documented: resume record saved before first part upload, text preview forces text/plain for security, listing cache invalidated on every mutation, rename uses copy-before-delete, dragCounter debounce for nested drag events"]},{version:"1.11.3",date:"2026-06-01",title:"Anchor provider detection to hostname",changes:["Provider detection now parses the endpoint URL and tests patterns against the hostname only, preventing false matches on paths or query strings","Detection regexes anchored with $ to prevent suffix-based misdetection"]},{version:"1.11.2",date:"2026-06-01",title:"Document update poller in README",changes:["Expanded security model section to explicitly state the update poll targets the app's own URL only, never a third-party host, and stops once a new build is detected"]},{version:"1.11.1",date:"2026-06-01",title:"Sandbox PDF preview iframe",changes:['Added sandbox="" to the PDF preview <iframe> \u2014 disables scripts, forms, popups, same-origin access, and top navigation; native PDF rendering is unaffected']},{version:"1.11.0",date:"2026-06-01",title:"SVG favicon, drop favicon.ico",changes:["Favicon is now an inline SVG data URL \u2014 the same SVG already imported for the app logo is reused, adding zero bytes to the bundle","dist/favicon.ico removed from the repo; ImageMagick build dependency dropped",`<link rel="icon"> in the HTML shell carries a placeholder href="data:image/svg+xml," to suppress the browser's default /favicon.ico auto-request before JS runs`,"JS overwrites the placeholder with the real logo URL at module init; null-guarded to prevent a crash if the element is ever absent","Updated README: dist/favicon.ico is no longer committed"]},{version:"1.10.9",date:"2026-06-01",title:"Tighten Caddy CSP connect-src",changes:["Caddy deployment example now uses the same scoped connect-src provider list as the nginx example, replacing the permissive connect-src https: (any HTTPS host)"]},{version:"1.10.8",date:"2026-06-01",title:"Add security model section to README",changes:['Added "Security model" section to README covering trust boundaries, credential storage, and the role ion",changes:["Added SPEC-DRIFT.md \u2014 documents all implementation drift from spec v0.15, including features implemented beyond original scope"]},{version:"1.10.0",date:"2026-05-28",title:"Smarter update check",changes:["Update check now uses a HEAD request as a fast first step \u2014 if ETag/Last-Modified headers match, no body is fetched at all","Falls back to a 512-byte Range request to compare build IDs when HEAD is inconclusive, instead of fetching the full page every poll","Once a real update is confirmed, fetches the full page with default cache mode so the browser can cache it for the user's subsequent reload",'Update banner now shows the specific version number: "Version 1.10.0 is available."']},{version:"1.9.0",date:"2026-05-28",title:"Build invariants and app-version metadata",changes:['App version is now embedded in the built HTML as a <meta name="app-version"> tag, available to the update checker',"Build script enforces a build invariants check: both build-id and app-version meta tags must fall within the first 512 bytes of the output, matching the update checker's range fetch boundary","Build fails loudly with a clear message if a structural change would push metadata past the byte limit"]},{version:"1.8.0",date:"2026-05-28",title:"Listing cache and refresh button",changes:["Folder listings are cached in memory to avoid redundant network calls when revisiting folders","Cache TTL is configurable in Settings: Off, 30 s, 2 min (default), or 10 min","Mutations (delete, rename, create folder, upload) always invalidate the cache for the affected folder","Refresh button (\u21BA) in the browser toolbar forces a fresh listing regardless of cache state","Cache is session-scoped (in-memory only) and resets on reconnect \u2014 no stale data across sessions"]},{version:"1.7.0",date:"2026-05-28",title:"Dark mode",changes:["Full dark mode support via prefers-color-scheme: dark \u2014 no manual toggle needed","All UI surfaces, modals, tables, and status indicators
